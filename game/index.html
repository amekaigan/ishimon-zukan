<!-- window.storage: Firestore対応版（ログイン前はlocalStorage、ログイン後はFirestore） -->
<script>
// ===== GA4カスタムイベント送信ヘルパー =====
window.ga4 = {
  event: (name, params = {}) => {
    try {
      if (typeof gtag === 'function') {
        gtag('event', name, params);
      }
    } catch (_) {}
  }
};

// ユーザーのUID（ログイン後に設定される）
window._currentUid = null;
window._authReadyPromise = new Promise(function(resolve) {
  window._authReadyResolve = resolve;
});

// Firestoreのパス: users/{uid}/data/{key}
const _fsDocRef = (key) => {
  const { db, doc } = window._firebase || {};
  if (!db || !window._currentUid) return null;
  return doc(db, 'users', window._currentUid, 'data', key.replace(/[\/\.]/g, '_'));
};

// Firestoreへの保存（1MB超えの場合は分割）
const CHUNK_SIZE = 700000; // 700KB per chunk（余裕を持たせる）
const _fsSet = async (key, value) => {
  const { setDoc, deleteDoc, doc, db } = window._firebase;
  const uid = window._currentUid;
  const safeKey = key.replace(/[/.]/g, '_');
  if (value.length <= CHUNK_SIZE) {
    // 通常サイズ：1ドキュメントに保存
    const ref = doc(db, 'users', uid, 'data', safeKey);
    await setDoc(ref, { value, updatedAt: Date.now(), chunks: 0 });
    // 古い分割データがあれば削除
    for (let i = 0; i < 10; i++) {
      try { await deleteDoc(doc(db, 'users', uid, 'data', `${safeKey}_chunk_${i}`)); } catch (_) {}
    }
  } else {
    // 大きいデータ：複数ドキュメントに分割
    const chunks = [];
    for (let i = 0; i < value.length; i += CHUNK_SIZE) {
      chunks.push(value.slice(i, i + CHUNK_SIZE));
    }
    // メタドキュメント（チャンク数を記録）
    const metaRef = doc(db, 'users', uid, 'data', safeKey);
    await setDoc(metaRef, { value: '', updatedAt: Date.now(), chunks: chunks.length });
    // 各チャンクを保存
    for (let i = 0; i < chunks.length; i++) {
      const chunkRef = doc(db, 'users', uid, 'data', `${safeKey}_chunk_${i}`);
      await setDoc(chunkRef, { value: chunks[i], updatedAt: Date.now() });
    }
    console.log(`[Firestore] ${key}を${chunks.length}分割して保存`);
  }
};

// Firestoreからの読み込み（分割対応）
const _fsGet = async (key) => {
  const { getDoc, doc, db } = window._firebase;
  const uid = window._currentUid;
  const safeKey = key.replace(/[/.]/g, '_');
  const ref = doc(db, 'users', uid, 'data', safeKey);
  const snap = await getDoc(ref);
  if (!snap.exists()) return null;
  const data = snap.data();
  if (!data.chunks || data.chunks === 0) {
    // 通常保存
    return data.value;
  }
  // 分割データを結合
  let combined = '';
  for (let i = 0; i < data.chunks; i++) {
    const chunkRef = doc(db, 'users', uid, 'data', `${safeKey}_chunk_${i}`);
    const chunkSnap = await getDoc(chunkRef);
    if (chunkSnap.exists()) combined += chunkSnap.data().value;
  }
  console.log(`[Firestore] ${key}を${data.chunks}チャンクから復元`);
  return combined;
};

// Firestoreからの読み込み（updatedAtメタ情報つき）
// v2.7.4 STEP1.5: 新旧比較のため、中身だけでなく保存時刻も返す。
// 戻り値: { value, updatedAt } または null
const _fsGetWithMeta = async (key) => {
  const { getDoc, doc, db } = window._firebase;
  const uid = window._currentUid;
  const safeKey = key.replace(/[/.]/g, '_');
  const ref = doc(db, 'users', uid, 'data', safeKey);
  const snap = await getDoc(ref);
  if (!snap.exists()) return null;
  const data = snap.data();
  const updatedAt = data.updatedAt || 0;
  if (!data.chunks || data.chunks === 0) {
    return { value: data.value, updatedAt };
  }
  let combined = '';
  for (let i = 0; i < data.chunks; i++) {
    const chunkRef = doc(db, 'users', uid, 'data', `${safeKey}_chunk_${i}`);
    const chunkSnap = await getDoc(chunkRef);
    if (chunkSnap.exists()) combined += chunkSnap.data().value;
  }
  return { value: combined, updatedAt };
};

// ===== v2.7.4 STEP1.5: データ新旧比較の仕組み =====
// 巻き戻り対策。localStorage側にも保存時刻を別キーで記録し、
// 初期ロード時に Firestore と localStorage の新しい方を採用する。
// データ本体のJSON構造は変えない（互換性のため）。
const _savedAtKey = (key) => `${key}__savedAt`;
// localStorageに保存時刻を記録
const _markLocalSaved = (key, ts) => {
  try { localStorage.setItem(_savedAtKey(key), String(ts || Date.now())); } catch (_) {}
};
// localStorageの保存時刻を取得（無ければ0＝最古扱い）
const _getLocalSavedAt = (key) => {
  try {
    const v = localStorage.getItem(_savedAtKey(key));
    return v ? parseInt(v, 10) || 0 : 0;
  } catch (_) { return 0; }
};

window.storage = {
  async get(key) {
    try {
      // v2.27.1: 画像キャッシュはまずセッション中のメモリから
      if (key.startsWith('aiimg:') && window._imgMemCache && window._imgMemCache[key]) {
        return { key, value: window._imgMemCache[key], shared: false };
      }
      // ★ 認証確定まで待機（レースコンディション防止）
      if (window._authReadyPromise) {
        await Promise.race([
          window._authReadyPromise,
          new Promise(resolve => setTimeout(resolve, 25000)),
        ]);
      }
      // Firestore優先（ログイン済みの場合）
      if (window._currentUid && window._firebase) {
        const v = await _fsGet(key);
        if (v !== null) {
          if (key.startsWith('aiimg:')) {
            window._imgMemCache = window._imgMemCache || {};
            window._imgMemCache[key] = v;
          } else {
            try { localStorage.setItem(key, v); } catch (_) {}
          }
          console.log('[storage.get] Firestoreから取得:', key);
          return { key, value: v, shared: false };
        } else {
          console.log('[storage.get] Firestoreにデータなし、localStorageへフォールバック:', key);
        }
      }
      // fallback: localStorage
      const v = localStorage.getItem(key);
      if (v === null) return null;
      return { key, value: v, shared: false };
    } catch (e) { 
      console.error('[storage.get] エラー:', key, e);
      // エラー時はlocalStorageから
      try {
        const v = localStorage.getItem(key);
        return v !== null ? { key, value: v, shared: false } : null;
      } catch (_) { return null; }
    }
  },
  async set(key, value, shared) {
    try {
      // 常にlocalStorageにも保存（オフライン対応）
      // v2.27.2: 画像キャッシュ(aiimg:)はlocalStorageに置かない。base64画像が数十枚
      //   たまるとiOSの容量上限(約5MB)を超え、localStorageごと丸ごと捨てられて
      //   図鑑データまで巻き添えで消える事故の原因。画像はFirestore＋メモリにだけ持つ。
      if (key.startsWith('aiimg:')) {
        window._imgMemCache = window._imgMemCache || {};
        window._imgMemCache[key] = value;
      } else {
        try { localStorage.setItem(key, value); } catch (_) {}
      }
      // v2.7.4 STEP1.5: localStorage側にも保存時刻を記録（新旧比較用）
      _markLocalSaved(key, Date.now());
      // Firestoreにも保存（ログイン中のみ）
      // ★ v2.17.3 データ消失対策: 空/デモ状態でFirestoreの本物を上書きさせない。
      //   端末が重く認証がタイムアウトすると未ログイン扱いになり、空の初期データが
      //   生成されてFirestoreの本物を踏み潰す事故が起きていた(石モン・名前・バトル数リセット)。
      //   localStorageには従来通り保存するが、Firestoreへの「空上書き」だけを禁止する。
      let _blockFirestoreWrite = false;
      try {
        if (key === 'ishimon-player-v3') {
          const _p = JSON.parse(value);
          if (!_p || !_p.name) _blockFirestoreWrite = true; // 名前空 = オンボーディング前の初期データ
        } else if (key === 'ishimon-collection-v3') {
          const _c = JSON.parse(value);
          // 空 or 全部デモ(demo-) = サンプルしか無い初期状態
          if (!Array.isArray(_c) || _c.length === 0 ||
              _c.every(m => typeof m?.id === 'string' && m.id.startsWith('demo-'))) {
            _blockFirestoreWrite = true;
          }
        }
      } catch (_) {}
      if (_blockFirestoreWrite) {
        console.warn('[storage.set] 空/デモ状態のためFirestore書き込みをスキップ(本物を保護):', key);
      }
      if (window._currentUid && window._firebase && !_blockFirestoreWrite) {
        await _fsSet(key, value);
      }
      return { key, value, shared: !!shared };
    } catch (e) {
      try { localStorage.setItem(key, value); } catch (_) {}
      return { key, value, shared: !!shared };
    }
  },
  async delete(key) {
    try {
      localStorage.removeItem(key);
      const ref = _fsDocRef(key);
      if (ref) {
        const { deleteDoc } = window._firebase;
        await deleteDoc(ref);
      }
      return { key, deleted: true };
    } catch (e) { return null; }
  },
  async list(prefix) {
    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!prefix || k.startsWith(prefix)) keys.push(k);
      }
      return { keys, prefix };
    } catch (e) { return null; }
  },
  // ログイン後: localStorageのデータをFirestoreに一括移行
  async migrateToFirestore() {
    if (!window._currentUid || !window._firebase) return;
    const keys = ['ishimon-player-v3', 'ishimon-collection-v3', 'ishimon-settings-v1'];
    for (const key of keys) {
      try {
        const v = localStorage.getItem(key);
        if (v) {
          const { setDoc, doc } = window._firebase;
          const { db } = window._firebase;
          const ref = doc(db, 'users', window._currentUid, 'data', key.replace(/[\/\.]/g, '_'));
          await setDoc(ref, { value: v, updatedAt: Date.now() });
        }
      } catch (_) {}
    }
  },
  // ログイン後: Firestoreからlocalに復元
  async restoreFromFirestore() {
    if (!window._currentUid || !window._firebase) return false;
    const keys = ['ishimon-player-v3', 'ishimon-collection-v3', 'ishimon-settings-v1'];
    let restored = false;
    for (const key of keys) {
      try {
        const { getDoc, doc } = window._firebase;
        const { db } = window._firebase;
        const ref = doc(db, 'users', window._currentUid, 'data', key.replace(/[\/\.]/g, '_'));
        const snap = await getDoc(ref);
        if (snap.exists()) {
          localStorage.setItem(key, snap.data().value);
          restored = true;
        }
      } catch (_) {}
    }
    return restored;
  }
};
</script>

// Hugging Face画像生成
const generateImageHuggingFace = async (prompt, seed) => {

    inputs: prompt,
    parameters: { seed: seed || Math.floor(Math.random() * 1000000), width: 512, height: 512 },
  };
  const headers = { 'Content-Type': 'application/json' };
  if (HF_API_TOKEN !== 'HF_API_TOKEN_HERE') headers['Authorization'] = `Bearer ${HF_API_TOKEN}`;
  const res = await fetch(`https://api-inference.huggingface.co/models/${HF_MODEL}`, {
    method: 'POST',
    headers,
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error(`HF API ${res.status}`);
  const blob = await res.blob();
  return await new Promise((resolve, reject) => {

    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
};

// ===== GPS位置情報の取得 =====
// ユーザーの現在地を取得し、可能なら逆ジオコーディングで地名を返す
const getCurrentLocation = async () => {
  if (!navigator.geolocation) return null;
  return new Promise((resolve) => {
    const timeout = setTimeout(() => resolve(null), 8000);
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        clearTimeout(timeout);
        const { latitude, longitude } = pos.coords;
        const result = { name: null };
        // 逆ジオコーディング (OpenStreetMap Nominatim、無料・APIキー不要)
        try {
          const r = await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&accept-language=ja&zoom=14`,
            { headers: { 'User-Agent': 'IshimonZukan/1.0' } }
          );
          if (r.ok) {
            const data = await r.json();
            const a = data.address || {};
            // 「市区町村」「都道府県」レベルで取得（プライバシー配慮）
            const parts = [a.city || a.town || a.village || a.suburb, a.state || a.prefecture].filter(Boolean);
            result.name = parts.join('・') || data.display_name?.split(',').slice(0, 2).join(',') || null;
          }
        } catch (e) { /* オフラインや拒否時は名前なしで進む */ }
        resolve(result);
      },
      () => { clearTimeout(timeout); resolve(null); },
      { timeout: 6000, maximumAge: 60000, enableHighAccuracy: false }
    );
  });
};

// AI画像をfetchしてbase64で返す（エンジン切り替え対応）
const generateAiImageRaw = async (prompt, seed) => {
  // 現在のエンジン設定を取得（settingsはReact外なのでlocalStorageから読む）
  let engine = 'ishimon';
  try {
    const s = localStorage.getItem('ishimon-settings-v1');
    if (s) engine = JSON.parse(s).imageEngine || 'ishimon';
  } catch (_) {}

  if (engine === 'huggingface') {
    return await generateImageHuggingFace(prompt, seed);
  }

  // 画像Worker（ishimon=LoRA / pollinations / turbo）
  const url = buildImageUrl(prompt, seed);
  const controller = new AbortController();
  // LoRA(Replicate)はコールドスタートで時間がかかるので長め
  const abortMs = engine === 'ishimon' ? 90000 : 30000;
  const timeout = setTimeout(() => controller.abort(), abortMs);
  try {
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timeout);
    if (!res.ok) {
      const err = new Error(`API ${res.status}`);
      err.status = res.status;
      throw err;
    }
    const blob = await res.blob();
    return await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  } catch (e) {
    clearTimeout(timeout);
    console.error('AI generation failed:', e);
    throw e;
  }
};

// ===== レートリミッター付きキュー =====
// Pollinations Anonymous Tier: 16秒に1回程度。429が出ると一時的にブロックされる。
// v2.7.3: 失敗率改善のため以下を修正
//   - バックオフを +30秒×5回(最大166秒) → +15秒×3回(最大61秒) に短縮
//     （regenerateMonImage の90秒タイムアウト内に収め、待機だけでタイムアウトする
//       悪循環を解消）
//   - 失敗カウンタが成功するまで永久に減らない問題を、時間経過での自然減衰で解消
//   - 1回失敗したら即諦めず、間隔を空けて1回だけリトライ
const RATE_LIMIT_MS = 16000;     // 通常の最小間隔（16秒）
const BACKOFF_PER_FAIL_MS = 15000; // 失敗1回ごとの追加待機（15秒）
const MAX_BACKOFF_COUNT = 3;       // バックオフ加算の上限（最大 16+45=61秒）
const FAILURE_DECAY_MS = 300000;   // 最終リクエストから5分経過で失敗カウンタをリセット
let _lastRequestAt = 0;
let _consecutiveFailures = 0; // 連続失敗回数（429時に増加）
const _aiQueue = [];
let _processingQueue = false;

// キューを順次処理する内部関数
const processAiQueue = async () => {
  if (_processingQueue) return;
  _processingQueue = true;
  while (_aiQueue.length > 0) {
    const job = _aiQueue.shift();
    // 最終リクエストから十分時間が経っていれば失敗カウンタを自然減衰（悪循環防止）
    if (_lastRequestAt > 0 && Date.now() - _lastRequestAt > FAILURE_DECAY_MS) {
      _consecutiveFailures = 0;
    }
    // 前回からの経過を確認
    const elapsed = Date.now() - _lastRequestAt;
    let wait = Math.max(0, RATE_LIMIT_MS - elapsed);
    // 連続失敗があれば追加待機（上限あり）
    if (_consecutiveFailures > 0) {
      wait += Math.min(_consecutiveFailures, MAX_BACKOFF_COUNT) * BACKOFF_PER_FAIL_MS;
    }
    if (wait > 0) {
      await new Promise(r => setTimeout(r, wait));
    }
    _lastRequestAt = Date.now();

    // 生成本体（失敗時は1回だけリトライ）
    let result = null;
    for (let attempt = 0; attempt < 2; attempt++) {
      try {
        result = await generateAiImageRaw(job.prompt, job.seed);
        if (result) { _consecutiveFailures = 0; break; } // 成功でリセット
        // resultがnull（画像取得できず）→ リトライへ
      } catch (e) {
        if (e.status === 429) {
          _consecutiveFailures = Math.min(_consecutiveFailures + 1, MAX_BACKOFF_COUNT);
          console.warn(`Rate limited (429). Backoff: ${Math.min(_consecutiveFailures, MAX_BACKOFF_COUNT) * (BACKOFF_PER_FAIL_MS / 1000)}s`);
        } else {
          console.warn(`AI generation attempt ${attempt + 1} failed:`, e?.message || e);
        }
      }
      // 1回目が失敗したら、間隔を空けて2回目へ
      if (attempt === 0) {
        _lastRequestAt = Date.now();
        await new Promise(r => setTimeout(r, RATE_LIMIT_MS));
      }
    }
    job.resolve(result); // 成功なら画像、ダメならnull（アプリは継続）
  }
  _processingQueue = false;
};

// 公開関数: キュー経由で生成
const generateAiImage = (prompt, seed) => {
  return new Promise((resolve) => {
    _aiQueue.push({ prompt, seed, resolve });
    processAiQueue();
  });
};

// ===== 画像キャッシュ機構 =====
// 同じ条件のキャラ（タイプ・レア度・進化段階・名前）の画像を使い回す
// idがある場合はid優先、ない場合はname+type+rarity（旧互換）
const getMonCacheKey = (mon) => mon.id ? `aiimg:id_${mon.id}` : `aiimg:${mon.type}_${mon.rarity}_${mon.stage}_${mon.name}`;

const loadCachedImage = async (mon) => {
  try {
    const key = getMonCacheKey(mon);
    const r = await window.storage.get(key);
    return r?.value || null;
  } catch (e) { return null; }
};

const saveCachedImage = async (mon, base64) => {
  try {
    const key = getMonCacheKey(mon);
    await window.storage.set(key, base64);
  } catch (e) { console.error('cache save failed:', e); }
};

// キャッシュ優先で画像取得・なければAI生成
// 戻り値: { image, fromCache, seed, prompt }
const getOrGenerateMonImage = async (mon, seed) => {
  // キャッシュチェック
  const cached = await loadCachedImage(mon);
  if (cached) return { image: cached, fromCache: true, seed: null, prompt: null };
  // AI生成
  const usedSeed = seed || Math.floor(Math.random() * 1000000);
  const prompt = buildMonPrompt(mon);
  const generated = await generateAiImage(prompt, usedSeed);
  if (generated) {
    await saveCachedImage(mon, generated);
    return { image: generated, fromCache: false, seed: usedSeed, prompt };
  }
  return { image: null, fromCache: false, seed: usedSeed, prompt };
};

// 画像解析失敗時のフォールバック（色からランダム生成）
const analyzeImageColor = async (imageDataUrl) => {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = 32; canvas.height = 32;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, 32, 32);
      const data = ctx.getImageData(0, 0, 32, 32).data;
      let r = 0, g = 0, b = 0, count = 0;
      for (let i = 0; i < data.length; i += 4) {
        r += data[i]; g += data[i+1]; b += data[i+2]; count++;
      }
      r = Math.floor(r / count); g = Math.floor(g / count); b = Math.floor(b / count);
      resolve({ r, g, b });
    };
    img.onerror = () => resolve({ r: 128, g: 128, b: 128 });
    img.src = imageDataUrl;
  });
};

// 色からタイプを推測
// 色からタイプを推測（ベース）+ 運要素を加える
const guessTypeFromColor = ({ r, g, b }) => {
  // 30%の確率で完全ランダム選択（全7タイプ均等チャンス）
  if (Math.random() < 0.30) {
    const allTypes = ['火', '水', '土', '電気', '空', 'ドラゴン', '精霊'];
    return allTypes[Math.floor(Math.random() * allTypes.length)];
  }

  // 5%の確率でレアタイプ（ドラゴンor精霊）出現
  if (Math.random() < 0.05) {
    return Math.random() < 0.5 ? 'ドラゴン' : '精霊';
  }

  // それ以外は色ベースで判定（条件を緩めに）
  // 各色チャンネルの相対値で判定
  const max = Math.max(r, g, b);
  const min = Math.min(r, g, b);
  const brightness = (r + g + b) / 3;
  const saturation = max - min;

  // 鮮やかな色はそのタイプに（彩度高めの場合）
  if (saturation > 50) {
    if (r === max && r > g + 20 && r > b + 20) return '火'; // 赤系
    if (b === max && b > r + 20 && b > g + 20) return '水'; // 青系
    if (r > 150 && g > 150 && b < g - 20) return '電気'; // 黄系
    if (b === max && g > 100 && Math.abs(r - g) < 30) return '空'; // 水色系
    if (r > 100 && b > 100 && g < r - 20 && g < b - 20) return 'ドラゴン'; // 紫系
    if (r > 180 && g < r - 30 && b > 150) return '精霊'; // ピンク系
  }

  // 暗い・グレー系の判定: 明るさで分ける
  if (brightness < 80) return Math.random() < 0.5 ? 'ドラゴン' : '土'; // 暗い石はドラゴンの可能性
  if (brightness > 200 && saturation < 30) return Math.random() < 0.5 ? '精霊' : '空'; // 白い石は精霊の可能性

  // 茶系・グレー系のデフォルト → 土に運要素混ぜる
  // 60%土、残り40%はランダム他タイプ
  if (Math.random() < 0.6) return '土';
  const otherTypes = ['火', '水', '電気', '空', 'ドラゴン', '精霊'];
  return otherTypes[Math.floor(Math.random() * otherTypes.length)];
};

  if (r === 4) return { label: 'スーパーレア', color: '#C77DFF', glow: '#9D4EDD' };

const TYPE_LAYER = {
  '火': 1, '水': 1, '土': 1, '電気': 1, '空': 1, '氷': 1,

// ★ カードの視覚演出を1か所で決める(アプリ内カードとシェアカードが共通で参照=ズレない)
const getCardTreatment = (mon) => {
  const layer = TYPE_LAYER[mon?.type] || 1;
  const r = getRarityLabel(mon?.rarity || 1);
  const isLegend = (mon?.rarity || 1) >= 5;

  // 画像枠 = 種族の格(層)。第一層=通常 / 第二層=金 / 第三層=レインボー
  let imageFrame = 'normal';
  if (layer === 2) imageFrame = 'gold';
  else if (layer === 3) imageFrame = 'rainbow';

  // 背景効果 = でんせつ(★5)で金。ただし第三層は七色を優先(金は出さない=判断2)
  let bgEffect = 'none';
  if (isLegend) bgEffect = 'gold';
  if (layer === 3) bgEffect = 'rainbow';

  // オーラ
  let aura = (layer === 2) ? 'gold' : (layer === 3) ? 'rainbow' : 'none';

  return {
    layer,                  // 1 | 2 | 3
    outerFrame: r.color,    // 外枠色 = レア度色(でんせつ=金)
    outerGlow: r.glow,
    imageFrame,             // 'normal' | 'gold' | 'rainbow'
    bgEffect,               // 'none' | 'gold' | 'rainbow'
    aura,                   // 'none' | 'gold' | 'rainbow'
    fullBleed: (layer === 3), // エンシェントは全面レイアウト(段階4で実装)
    isLegend,
  };
};

  for (const t of TITLES) {

    try {
      if (t.check(ctx)) newly.push(t.id);
    } catch (_) { /* 評価失敗は無視 */ }
  }
  return newly;
};

// ===== 難易度別レアリティ補正 =====
// かんたん: レアが出やすい / むずかしい: レアが出にくい
// gachaRoll/撮影 共通で使用。値は ★1〜★5 の累積確率（昇順）。
// 希少性を高めるため★4★5を絞っている
const GACHA_RARITY_TABLE = {
  easy:   { r5: 0.025, r4: 0.10, r3: 0.30, r2: 0.65 }, // 残り0.35が★1
  normal: { r5: 0.012, r4: 0.06, r3: 0.20, r2: 0.52 }, // 残り0.48が★1
  hard:   { r5: 0.006, r4: 0.035, r3: 0.13, r2: 0.42 }, // 残り0.58が★1
};

const rollRarityByDifficulty = (difficulty = 'normal', guaranteeRare = false) => {
  const t = GACHA_RARITY_TABLE[difficulty] || GACHA_RARITY_TABLE.normal;
  const r = Math.random();
  if (guaranteeRare || r < t.r5) return 5;
  if (r < t.r4) return 4;
  if (r < t.r3) return 3;
  if (r < t.r2) return 2;
  return 1;
};

// 撮影で AI が決めた rarity に難易度バイアスを掛ける
// かんたん: たまに +1 / むずかしい: たまに -1
// 希少性維持のため、上振れは控えめ・下振れはやや強め
const adjustRarityByDifficulty = (rarity, difficulty = 'normal') => {
  const r = Math.random();
  if (difficulty === 'easy' && r < 0.20 && rarity < 5) return rarity + 1;
  if (difficulty === 'hard' && r < 0.35 && rarity > 1) return rarity - 1;
  // ノーマルでも★4★5は稀に1段階下げて希少性を守る
  if (difficulty === 'normal' && rarity >= 4 && r < 0.20) return rarity - 1;
  return rarity;
};

// 排出確率: 難易度に応じて変動
const gachaRoll = (guaranteeRare = false, difficulty = 'normal') => {
  const rarity = rollRarityByDifficulty(difficulty, guaranteeRare);

  // 50%でモン、50%で装備 (★1は70%モン)
  const isEquip = rarity === 1 ? Math.random() < 0.3 : Math.random() < 0.5;

  if (isEquip) {
    const pool = Object.values(EQUIPMENT).filter(e => e.rarity === rarity);
    const eq = pool.length ? pool[Math.floor(Math.random() * pool.length)] : Object.values(EQUIPMENT)[0];
    return { kind: 'equip', rarity, data: eq };
  } else {
    const pool = GACHA_MON_POOL.filter(m => m.rarity === rarity);
    const fallback = GACHA_MON_POOL.filter(m => m.rarity <= rarity);
    const template = (pool.length ? pool : fallback)[Math.floor(Math.random() * (pool.length || fallback.length))];

    // 個体値揺らぎ: baseStatsを±15%でランダム化
    const iv = () => 0.85 + Math.random() * 0.30; // 0.85〜1.15
    const baseStats = {
      hp:     Math.round(template.baseStats.hp     * iv()),
      kogeki: Math.round(template.baseStats.kogeki * iv()),
      bougyo: Math.round(template.baseStats.bougyo * iv()),
      speed:  Math.round(template.baseStats.speed  * iv()),
    };
    // growthBiasもランダム化（タイプ傾向を維持しつつ個性を出す）
    const rb = () => parseFloat((0.10 + Math.random() * 0.12).toFixed(2)); // 0.10〜0.22
    const growthBias = { hp: rb(), kogeki: rb(), bougyo: rb(), speed: rb() };

    const mon = {
      id: `gacha-${Date.now()}-${Math.random().toString(36).slice(2,6)}`,
      ...template,
      baseStats,
      growthBias,
      stage: 1, level: 1, exp: 0, wins: 0, losses: 0, equipped: {},
      description: template.description || `ガチャで てにいれた ${template.name}！`,
      imageDataUrl: null,
      capturedAt: new Date().toISOString(),
    };
    return { kind: 'mon', rarity, data: mon };
  }
};

// 装備込みのステータス計算
const getEquipBoost = (mon) => {
  const boost = { hp: 0, kogeki: 0, bougyo: 0, speed: 0 };
  if (!mon.equipped) return boost;
  for (const slot of EQUIP_SLOTS) {
    const id = mon.equipped[slot];
    if (id && EQUIPMENT[id]) {
      const b = EQUIPMENT[id].boost;
      if (b.hp) boost.hp += b.hp;
      if (b.kogeki) boost.kogeki += b.kogeki;
      if (b.bougyo) boost.bougyo += b.bougyo;
      if (b.speed) boost.speed += b.speed;
    }
  }
  return boost;
};

const getCurrentStats = (mon) => {
  if (!mon.baseStats) return mon.stats || { hp: 50, kogeki: 50, bougyo: 50, speed: 50 };
  const lv = mon.level || 1;
  const growth = (lv - 1) / (MAX_LEVEL - 1);
  const factor = (key) => 1 + growth * (mon.growthBias?.[key] ?? 0.15);
  const eq = getEquipBoost(mon);
  return {
    hp:     Math.round(mon.baseStats.hp * factor('hp')) + eq.hp,
    kogeki: Math.round(mon.baseStats.kogeki * factor('kogeki')) + eq.kogeki,
    bougyo: Math.round(mon.baseStats.bougyo * factor('bougyo')) + eq.bougyo,
    speed:  Math.round(mon.baseStats.speed * factor('speed')) + eq.speed,
  };
};

const giftRandomMon = (rarityBoost = 0) => {
  // rarityBoost が高いほどレアが出やすい
  const roll = Math.random() + rarityBoost;
  let pool;
  if (roll > 1.4) pool = GIFT_POOL.filter(g => g.rarity >= 4);
  else if (roll > 1.0) pool = GIFT_POOL.filter(g => g.rarity >= 3);
  else if (roll > 0.5) pool = GIFT_POOL.filter(g => g.rarity >= 2);
  else pool = GIFT_POOL;
  if (pool.length === 0) pool = GIFT_POOL;
  const g = pool[Math.floor(Math.random() * pool.length)];
  return {
    id: `gift-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`,
    ...g,
    stage: 1, level: 1, exp: 0, wins: 0, losses: 0, equipped: {},
    growthBias: { hp: 0.15, kogeki: 0.15, bougyo: 0.15, speed: 0.15 },
    description: `ログインボーナスで てにいれた ${g.name}！`,
    imageDataUrl: null,
    capturedAt: new Date().toISOString(),
  };
};

const todayKey = () => {
  const d = new Date();
  // 日本時間で考えるためUTC+9
  const jst = new Date(d.getTime() + 9 * 3600 * 1000);
  return jst.toISOString().slice(0, 10);
};

const daysBetween = (k1, k2) => {
  if (!k1 || !k2) return null;
  const d1 = new Date(k1 + 'T00:00:00Z').getTime();
  const d2 = new Date(k2 + 'T00:00:00Z').getTime();
  return Math.round((d2 - d1) / 86400000);
};

// 今日の3ミッション (日付シードで決定) - 同じ日なら必ず同じ3つ
const getTodayMissions = (dateKey) => {
  // 日付からシード生成
  let seed = 0;
  for (let i = 0; i < dateKey.length; i++) seed = (seed * 31 + dateKey.charCodeAt(i)) | 0;
  const random = () => {
    seed = (seed * 1103515245 + 12345) & 0x7fffffff;
    return seed / 0x7fffffff;
  };
  const pool = [...MISSION_TEMPLATES];
  const picked = [];
  for (let i = 0; i < 3 && pool.length; i++) {
    const idx = Math.floor(random() * pool.length);
    picked.push(pool[idx]);
    pool.splice(idx, 1);
  }
  return picked;
};

        const colR = await window.storage.get('ishimon-collection-v3');
        const playerR = await window.storage.get('ishimon-player-v3');
        const settingsR = await window.storage.get('ishimon-settings-v1').catch(() => null);
        const loadedCollection = colR?.value ? JSON.parse(colR.value) : []; // v2.22.0: 新規は0体スタート
        const loadedPlayer = playerR?.value ? JSON.parse(playerR.value) : null;

        // ★ STEP2移行: 旧⭐(isTaste)を新👍(taste:'up')へ一度だけ変換
        const migratedCollection = loadedCollection.map(m => {
          if (m.isTaste && !m.taste) {
            const { isTaste, ...rest } = m;
            return { ...rest, taste: 'up' };
          }
          return m;
        });
        setCollection(migratedCollection);
        if (settingsR?.value) {
          try { setSettings(prev => ({ ...prev, ...JSON.parse(settingsR.value) })); }
          catch (e) { /* デフォルト維持 */ }
        }
        if (loadedPlayer) {
          // v2.11.2: 旧コードはガチャカードを毎ログイン100枚まで補充していたが、
          //   これは初期テスト用の仕様で、ゲームバランス上不適切なため削除。
          //   既存プレイヤーのガチャカードはそのまま使う。
          let adjusted = loadedPlayer;
          // 称号関連フィールドのデフォルト補完
          if (!Array.isArray(adjusted.titles)) adjusted = { ...adjusted, titles: [] };
          if (typeof adjusted.activeTitle === 'undefined') adjusted = { ...adjusted, activeTitle: null };
          if (typeof adjusted.stoneFragments === 'undefined') adjusted = { ...adjusted, stoneFragments: 50 };
          if (!Array.isArray(adjusted.monGroups)) adjusted = { ...adjusted, monGroups: [] };
          if (!adjusted.stats) {
            adjusted = { ...adjusted, stats: { totalGacha: 0, totalEvolves: 0, consecutiveR1Count: 0 } };
          } else {
            adjusted = {
              ...adjusted,
              stats: {
                totalGacha: adjusted.stats.totalGacha || 0,
                totalEvolves: adjusted.stats.totalEvolves || 0,
                consecutiveR1Count: adjusted.stats.consecutiveR1Count || 0,
              },
            };
          }
          // 機能追加(v2.11.0): 容量フィールドの補完。
          //   既存プレイヤーが既にデフォルト上限を超えて持っている場合、自動で引き上げる。
          //   実装した瞬間に「上限超過でロック」になる事故を防ぐ保護策。
          if (typeof adjusted.monCapacity === 'undefined' || typeof adjusted.capacityExpansions === 'undefined') {
            const currentCount = loadedCollection.length;
            const safeCapacity = Math.max(MON_CAPACITY_DEFAULT, currentCount);
            adjusted = {
              ...adjusted,
              monCapacity: safeCapacity,
              capacityExpansions: adjusted.capacityExpansions || 0,
            };
            console.log(`[Capacity] 既存プレイヤーに容量を設定: ${safeCapacity}体（所有数 ${currentCount}体）`);
          }
          const ctx = { player: adjusted, collection: loadedCollection, event: 'tick' };
          const grants = evaluateTitles(ctx);
          if (grants.length > 0) {
            adjusted = { ...adjusted, titles: [...new Set([...(adjusted.titles || []), ...grants])] };
          }
          setPlayer(adjusted);
          if (adjusted !== loadedPlayer) {
            await window.storage.set('ishimon-player-v3', JSON.stringify(adjusted));
          }
          // v2.13.0: 同意状態をチェック。ポリシーか規約のバージョンが現在と不一致なら同意モーダルを出す。
          //   既存ユーザーで未同意の場合(初回 v2.13.0 を起動した時)もここでモーダルが出る。
          const needConsent =
            !adjusted.privacyPolicy ||
            adjusted.privacyPolicy.agreedVersion !== CURRENT_PRIVACY_POLICY_VERSION ||
            !adjusted.termsOfService ||
            adjusted.termsOfService.agreedVersion !== CURRENT_TERMS_OF_SERVICE_VERSION;
          if (needConsent) {
            setShowConsent(true);
          } else {
            checkLoginBonus(adjusted, loadedCollection);
          }
        } else {
          // ★ バグ修正: loadedPlayer=nullでもログイン済みならFirestoreを上書きしない
          const initialPlayer = {
            name: '',
            level: 1, exp: 0, gems: 30,
            stoneFragments: 50,
            inventory: ['sword_1', 'shield_1', 'charm_1'],
            inventoryNew: [],
            lastLogin: todayKey(), streak: 1,
            gachaCards: 5,
            missions: { date: todayKey(), list: getTodayMissions(todayKey()), progress: {}, claimed: {}, allClaimed: false },
            titles: [],
            activeTitle: null,
            stats: { totalGacha: 0, totalEvolves: 0, consecutiveR1Count: 0 },
            // 機能追加(v2.11.0): 容量
            monCapacity: MON_CAPACITY_DEFAULT,
            capacityExpansions: 0,
          };
          setPlayer(initialPlayer);
          if (!authResult.uid) {
            // 未ログイン時のみストレージへ保存
            await window.storage.set('ishimon-player-v3', JSON.stringify(initialPlayer));
            await window.storage.set('ishimon-collection-v3', JSON.stringify(loadedCollection));
          } else {
            // ログイン済みでlocalStorageが空 = 別デバイスor初回 → Firestoreを守る
            try { localStorage.setItem('ishimon-player-v3', JSON.stringify(initialPlayer)); } catch(_) {}
          }
          // v2.14.0: 新規プレイヤーはオンボーディング末尾で同意を取る方式に変更
          //   (旧 v2.13.0 では setShowConsent(true) で先に同意モーダルを出していたが、
          //    UX改善のためオンボーディングを先に見せてから同意するフローに)
          setShowOnboarding(true);
        }
        setDataReady(true); // v2.17.4: ここまで到達=playerが実データ/新規初期値で確定
      } catch (e) {
        console.error(e);
        setCollection([]); // v2.22.0: 新規は0体スタート(読込失敗時も空)
        setLoadError(true); // v2.17.4: 失敗時はホームを出さず再読み込みを促す
      } finally {
        // 機能追加(v2.9.0): 初期ロード完了。成功・失敗どちらでも必ずローディング解除。
        setInitialLoading(false);
        console.log('[初期ロード] 完了');
      }
    })();
  }, []);

  // v2.13.0: 同意フロー完了時の処理
  //   プライバシーポリシーと利用規約の両方への同意を記録し、モーダルを閉じる
  //   既存ユーザー(onboarding済み)はログインボーナス処理へ、
  //   新規ユーザーはOnboardingModalへ進む
  const handleConsentAgree = async () => {
    const now = new Date().toISOString();
    const updated = {
      ...player,
      privacyPolicy: {
        agreedVersion: CURRENT_PRIVACY_POLICY_VERSION,
        agreedAt: now,
      },
      termsOfService: {
        agreedVersion: CURRENT_TERMS_OF_SERVICE_VERSION,
        agreedAt: now,
      },
    };
    // §4: 開発協力モードの選択を settings に保存（既存ユーザーは現設定を維持）
    const isReturningUser = !!player?.privacyPolicy;
    if (!isReturningUser) {
      const newSettings = { ...settings, devCoopMode: consentDevCoop };
      setSettings(newSettings);
      await window.storage.set('ishimon-settings-v1', JSON.stringify(newSettings));
      window.ga4.event('dev_coop_consent', { agreed: consentDevCoop });
    }
    setPlayer(updated);
    await window.storage.set('ishimon-player-v3', JSON.stringify(updated));
    // v2.13.0: 同意イベントをGA4に送信(観測性のための布石)
    window.ga4.event('consent_agreed', {
      policy_version: CURRENT_PRIVACY_POLICY_VERSION,
      terms_version: CURRENT_TERMS_OF_SERVICE_VERSION,
    });
    setShowConsent(false);
    setConsentChecked(false);
    // 既存ユーザー(名前あり)はログインボーナスへ、新規ユーザーはOnboardingへ
    if (!updated.name) {
      setShowOnboarding(true);
    } else {
      checkLoginBonus(updated, collection);
    }
  };

  const savePlayer = async (p) => {
    try { await window.storage.set('ishimon-player-v3', JSON.stringify(p)); }
    catch (e) { console.error(e); }
  };
  const saveCollection = async (c) => {
    try { await window.storage.set('ishimon-collection-v3', JSON.stringify(c)); }
    catch (e) { console.error(e); }
  };

  // 強制Firestore保存（タイムアウト付き・並列実行）
  const forceSaveToFirestore = async (playerData, collectionData) => {
    if (!firebaseUser || !window._firebase) throw new Error('未ログイン');
    const { setDoc, doc, db } = window._firebase;
    const uid = firebaseUser.uid;
    // まずlocalStorageに確実に保存
    try {
      localStorage.setItem('ishimon-player-v3', JSON.stringify(playerData));
      localStorage.setItem('ishimon-collection-v3', JSON.stringify(collectionData));
    } catch (_) {}
    // Firestoreに並列保存（10秒タイムアウト）
    const withTimeout = (promise, ms) => Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms))
    ]);
    const saves = [
      { key: 'ishimon-player-v3', data: JSON.stringify(playerData) },
      { key: 'ishimon-collection-v3', data: JSON.stringify(collectionData) },
      { key: 'ishimon-settings-v1', data: localStorage.getItem('ishimon-settings-v1') || '{}' },
    ].map(({ key, data }) => {
      return withTimeout(_fsSet(key, data), 15000);
    });
    await Promise.all(saves);
  };

  // アプリを閉じる・バックグラウンド時に強制保存（iOS対応）
  useEffect(() => {
    const handleVisibilityChange = () => {
      if (document.visibilityState === 'hidden') {
        try {
          localStorage.setItem('ishimon-collection-v3', JSON.stringify(collection));
          localStorage.setItem('ishimon-player-v3', JSON.stringify(player));
        } catch (_) {}
        if (firebaseUser && window._firebase) {
          const { setDoc, doc, db } = window._firebase;
          const uid = firebaseUser.uid;
          const pushFS = (key, data) => {
            const ref = doc(db, 'users', uid, 'data', key.replace(/[\/.]/g, '_'));
            setDoc(ref, { value: data, updatedAt: Date.now() }).catch(() => {});
          };
          pushFS('ishimon-collection-v3', JSON.stringify(collection));
          pushFS('ishimon-player-v3', JSON.stringify(player));
        }
      }
    };
    const handlePageHide = () => {
      try {
        localStorage.setItem('ishimon-collection-v3', JSON.stringify(collection));
        localStorage.setItem('ishimon-player-v3', JSON.stringify(player));
      } catch (_) {}
    };
    document.addEventListener('visibilitychange', handleVisibilityChange);
    window.addEventListener('pagehide', handlePageHide);
    return () => {
      document.removeEventListener('visibilitychange', handleVisibilityChange);
      window.removeEventListener('pagehide', handlePageHide);
    };
  }, [collection, player, firebaseUser]);
  const saveSettings = async (s) => {
    setSettings(s);
    try { await window.storage.set('ishimon-settings-v1', JSON.stringify(s)); }
    catch (e) { console.error(e); }
  };

  // ===== 称号獲得チェック =====
  // どんなイベント後でも呼ぶ。新規獲得があれば player を更新してモーダル表示。
  // playerOverride: 直前に setPlayer したばかりで state が反映されてない場合に渡す
  // collectionOverride: 同様
  const grantTitlesIfAny = (event = 'tick', extra = {}, playerOverride = null, collectionOverride = null) => {
    const p = playerOverride || player;
    const c = collectionOverride || collection;
    const ctx = { player: p, collection: c, event, ...extra };
    const newlyGranted = evaluateTitles(ctx);
    if (newlyGranted.length === 0) return;
    const updated = {
      ...p,
      titles: [...new Set([...(p.titles || []), ...newlyGranted])],
    };
    setPlayer(updated);
    savePlayer(updated);
    // モーダル表示（新規獲得した称号オブジェクトの配列）
    const titleObjs = newlyGranted.map(id => getTitleById(id)).filter(Boolean);
    setNewTitleAlert({ titles: titleObjs });
  };
  const updateSetting = (key, value) => {
    saveSettings({ ...settings, [key]: value });
  };

  // ===== ログインボーナス処理（ガチャカード配布） =====
  const checkLoginBonus = (p, currentCollection) => {
    const today = todayKey();
    if (p.lastLogin === today) { ensureTodayMissions(p); return; }
    const diff = daysBetween(p.lastLogin, today);
    let newStreak = diff === 1 ? (p.streak || 0) + 1 : 1;

    // 連続日数でカード枚数が変わる
    let cardCount = 1;
    let label = `${newStreak}日目`;
    let fragmentBonus = 5; // 毎日5個
    if (newStreak === 30) { cardCount = 5; label = '30日 達成！🎉'; fragmentBonus = 30; }
    else if (newStreak === 20) { cardCount = 4; label = '20日 達成！'; fragmentBonus = 20; }
    else if (newStreak === 10) { cardCount = 3; label = '10日 達成！'; fragmentBonus = 15; }
    else if (newStreak === 7)  { cardCount = 3; label = '7日 連続！'; fragmentBonus = 15; }
    else if (newStreak >= 3)   { cardCount = 2; label = `${newStreak}日 連続！`; fragmentBonus = 8; }

    const updatedPlayer = {
      ...p,
      lastLogin: today, streak: newStreak,
      gachaCards: (p.gachaCards || 0) + cardCount,
      stoneFragments: (p.stoneFragments || 0) + fragmentBonus,
      missions: { date: today, list: getTodayMissions(today), progress: {}, claimed: {}, allClaimed: false },
    };
    setPlayer(updatedPlayer);
    savePlayer(updatedPlayer);
    setShowLoginBonus({ streak: newStreak, cardCount, label, fragmentBonus });
    // ログイン番長判定
    grantTitlesIfAny('tick', {}, updatedPlayer, currentCollection);
  };

  const ensureTodayMissions = (p) => {
    const today = todayKey();
    if (p.missions?.date !== today) {
      const updated = { ...p, missions: { date: today, list: getTodayMissions(today), progress: {}, claimed: {}, allClaimed: false } };
      setPlayer(updated);
      savePlayer(updated);
    }
  };

  // ===== ミッション進捗更新 =====
  const updateMission = async (eventType, payload = {}) => {
    setPlayer(prev => {
      ensureTodayMissions(prev);
      const missions = prev.missions || { list: [], progress: {}, claimed: {} };
      const newProgress = { ...missions.progress };
      let changed = false;
      for (const m of missions.list) {
        if (missions.claimed?.[m.id]) continue;
        if (m.type === eventType) {
          if (m.subtype && payload.type !== m.subtype) continue;
          newProgress[m.id] = (newProgress[m.id] || 0) + 1;
          changed = true;
        }
      }
      if (!changed) return prev;
      const updated = { ...prev, missions: { ...missions, progress: newProgress } };
      savePlayer(updated);
      return updated;
    });
  };

  // ミッション報酬を受け取る
  const claimMission = async (missionId) => {
    setPlayer(prev => {
      const m = prev.missions.list.find(x => x.id === missionId);
      if (!m) return prev;
      const progress = prev.missions.progress?.[missionId] || 0;
      if (progress < m.target) return prev;
      if (prev.missions.claimed?.[missionId]) return prev;
      const newClaimed = { ...prev.missions.claimed, [missionId]: true };
      const allDone = prev.missions.list.every(mm => newClaimed[mm.id]);
      const bonusGems = (allDone && !prev.missions.allClaimed) ? 20 : 0;
      const updated = {
        ...prev,
        gems: (prev.gems || 0) + m.reward + bonusGems,
        missions: { ...prev.missions, claimed: newClaimed, allClaimed: allDone || prev.missions.allClaimed },
      };
      savePlayer(updated);
      return updated;
    });
  };

  // ===== ガチャ実行 =====
  // count: 引く枚数 (1 or 10), useGems: trueならきらめき石消費
  const doGacha = async (count, useGems = false) => {
    window.ga4.event('gacha', { count, useGems, gachaCards: player.gachaCards });
    const cost = count === 10 ? 500 : 50;
    if (useGems) {
      if ((player.gems || 0) < cost) { setError('きらめき石が足りません！'); return; }
    } else {
      if ((player.gachaCards || 0) < count) { setError('ガチャカードが足りません！'); return; }
    }

    // 機能追加(v2.11.0): 容量チェック（ガチャ起動時の警告）
    //   ガチャでは石モンと装備の両方が出る可能性があるが、安全側に倒して
    //   「最大 count 体の石モンが出る可能性」で判定する。
    const cap = getMonCapacity();
    const remaining = cap - collection.length;
    if (remaining <= 0) {
      // 完全に上限到達 → ガチャ自体を中断
      setShowCapacityWarn({
        context: 'gacha',
        message: `図鑑が いっぱいです！\n${collection.length} / ${cap} 体\n\nこのまま ガチャを 引くと\nせっかくの 石モンが もらえません。\n\n古い子を 削除するか、容量を 拡張してね。`,
      });
      return;
    } else if (remaining < count) {
      // 残り枠が引く枚数より少ない → 注意して進めるか確認
      const ok = window.confirm(`図鑑の 残り枠: ${remaining}体\n${count}連ガチャ では 全部 もらえない かもしれません。\n\nそれでも 引きますか？`);
      if (!ok) return;
    }

    // 設定で有効なら確認ダイアログを表示
    if (settings.confirmGacha) {
      const costLabel = useGems ? `きらめき石 ${cost}個` : `ガチャカード ${count}枚`;
      const ok = window.confirm(`${count === 10 ? '10連' : '1回'}ガチャを引きますか？\n消費: ${costLabel}`);
      if (!ok) return;
    }

    // 10連は最後の1枚がレア以上保証
    const results = Array.from({ length: count }, (_, i) =>
      gachaRoll(count === 10 && i === count - 1, settings.difficulty)
    ).map(r => ({ ...r, revealed: false }));

    setGachaResults(results);
    setGachaPhase('flipping');

    // プレイヤーのカード/石消費
    setPlayer(prev => {
      const updated = {
        ...prev,
        gachaCards: useGems ? (prev.gachaCards || 0) : Math.max(0, (prev.gachaCards || 0) - count),
        gems: useGems ? (prev.gems || 0) - cost : (prev.gems || 0),
      };
      savePlayer(updated);
      return updated;
    });

    // === バックグラウンドでAI画像生成を開始（モンのみ、最大2体まで同時） ===
    // めくり演出中に裏で生成してキャッシュへ。完成したらレンダラーが拾う。
    const monResults = results.filter(r => r.kind === 'mon');

    // 1. まずキャッシュ済みのものを全部即時反映（並列）
    await Promise.all(monResults.map(async (monResult) => {
      const cached = await loadCachedImage(monResult.data);
      if (cached) {
        monResult.data.imageDataUrl = cached;
        setGachaResults(prev => prev.map(r =>
          r.kind === 'mon' && r.data.id === monResult.data.id
            ? { ...r, data: { ...r.data, imageDataUrl: cached } }
            : r
        ));
      }
    }));

    // 2. キャッシュ未ヒットのものをキュー投入（並列で投入、内部で順次処理）
    const uncached = monResults.filter(r => !r.data.imageDataUrl);
    uncached.forEach((monResult) => {
      // キューに投入。完了次第表示が更新される（数分〜数十分かかる可能性）
      getOrGenerateMonImage(monResult.data).then(({ image }) => {
        if (image) {
          monResult.data.imageDataUrl = image;
          setGachaResults(prev => prev.map(r =>
            r.kind === 'mon' && r.data.id === monResult.data.id
              ? { ...r, data: { ...r.data, imageDataUrl: image } }
              : r
          ));
          // collectionも更新（コレクション画面で見たときに反映）
          setCollection(prev => prev.map(c =>
            c.id === monResult.data.id ? { ...c, imageDataUrl: image } : c
          ));
        }
      });
    });

    // 1枚ずつ順番にめくるアニメ（0.5秒おき）
    for (let i = 0; i < results.length; i++) {
      await new Promise(r => setTimeout(r, i === 0 ? 400 : 600));
      setGachaResults(prev => prev.map((r, idx) => idx === i ? { ...r, revealed: true } : r));
    }
    setGachaPhase('done');

    // 獲得処理: モンはcollectionへ、装備はinventoryへ
    // ※AI画像はめくり演出中に各 monResult.data.imageDataUrl に書き込み済み（キャッシュor生成完了分）
    const newMons = results.filter(r => r.kind === 'mon').map(r => r.data);
    const newEquips = results.filter(r => r.kind === 'equip').map(r => r.data.id);

    // 機能追加(v2.11.0): 上限を超える分の石モンは取得をキャンセル
    //   doGacha 入口で警告は出すが、それでも引いた場合の最終防衛線。
    //   残り枠ぶんだけ採用し、超過分は破棄（コンソールに記録）。
    const remainingSlots = getMonCapacity() - collection.length;
    let acceptedMons = newMons;
    let droppedMons = [];
    if (newMons.length > remainingSlots) {
      acceptedMons = newMons.slice(0, Math.max(0, remainingSlots));
      droppedMons = newMons.slice(Math.max(0, remainingSlots));
      console.warn(`[Capacity] ガチャ結果のうち${droppedMons.length}体が上限超過で破棄されました`, droppedMons.map(m => m.name));
      // ユーザーへの案内
      setTimeout(() => {
        setError(`図鑑が いっぱいで ${droppedMons.length}体 もらえませんでした...`);
      }, 500);
    }

    if (acceptedMons.length) {
      const updated = [...acceptedMons, ...collection];
      setCollection(updated);
      await saveCollection(updated);
    }
    if (newEquips.length) {
      setPlayer(prev => {
        const merged = [...new Set([...(prev.inventory || []), ...newEquips])];
        // 新着フラグ用に未確認IDも追加（重複なし）
        const mergedNew = [...new Set([...(prev.inventoryNew || []), ...newEquips])];
        const updated = { ...prev, inventory: merged, inventoryNew: mergedNew };
        savePlayer(updated);
        return updated;
      });
    }

    // ===== 称号判定用：累計カウンタ更新 =====
    // 連続★1の判定: 全結果がr1なら累計、1つでも違えばリセット
    const allR1 = results.length > 0 && results.every(r => r.rarity === 1);
    // ★5排出ボーナス（1枚につき10個）
    const r5Count = results.filter(r => r.rarity === 5).length;
    setPlayer(prev => {
      const prevConsec = prev.stats?.consecutiveR1Count || 0;
      const updated = {
        ...prev,
        stoneFragments: (prev.stoneFragments || 0) + r5Count * 10,
        stats: {
          ...(prev.stats || {}),
          totalGacha: (prev.stats?.totalGacha || 0) + results.length,
          consecutiveR1Count: allR1 ? prevConsec + results.length : 0,
        },
      };
      savePlayer(updated);

      let needed = playerExpForNextLevel(lv);
      let levelUps = 0;
      let bonusGems = 0;
      while (exp >= needed && lv < MAX_PLAYER_LEVEL) {
        exp -= needed;
        lv++;
        levelUps++;
        bonusGems += 10;
        needed = playerExpForNextLevel(lv);

    let h = video.videoHeight || 480;
    if (w > h && w > max) { h = Math.round(h * max / w); w = max; }
    else if (h > max) { w = Math.round(w * max / h); h = max; }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(video, 0, 0, w, h);

      img.onload = () => {
        const canvas = document.createElement('canvas');
        const max = 512;
        let { width, height } = img;
        if (width > height && width > max) { height *= max / width; width = max; }
        else if (height > max) { width *= max / height; height = max; }
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        const compressed = canvas.toDataURL('image/jpeg', 0.7);
        setPreviewImage(compressed);

      img.src = ev.target.result;

  //   既存プレイヤーは初期ロード時に monCapacity 未設定の可能性があるためデフォルト補完。
  const getMonCapacity = (p = player) => {
    const base = p.monCapacity || MON_CAPACITY_DEFAULT;

  const expandCapacity = () => {

    setTimeout(() => setJustExpanded(false), 2500);

  // 機能追加(v2.10.0): 長押し検出ハンドラを生成するヘルパー。
  //   500ms以上のタッチ/マウス押下で onLongPress が発火、通常タップでは onClick が発火する。
  //   タッチ中にスクロール（指が動く）すれば長押しキャンセル。
  //   使い方: <button {...makeLongPressHandlers({ onClick, onLongPress })}>
  const makeLongPressHandlers = ({ onClick, onLongPress, threshold = 500, moveTolerance = 10 }) => {
    let timer = null;
    let startPos = null;
    let triggered = false;

    const clear = () => {
      if (timer) { clearTimeout(timer); timer = null; }
      startPos = null;
    };

    const start = (clientX, clientY) => {
      triggered = false;
      startPos = { x: clientX, y: clientY };
      timer = setTimeout(() => {
        triggered = true;
        timer = null;
        // iOS Safari でも触覚フィードバックがあれば実行
        if (navigator.vibrate) { try { navigator.vibrate(20); } catch (_) {} }
        onLongPress?.();
      }, threshold);
    };

    const move = (clientX, clientY) => {
      if (!startPos) return;
      const dx = Math.abs(clientX - startPos.x);
      const dy = Math.abs(clientY - startPos.y);
      if (dx > moveTolerance || dy > moveTolerance) clear();
    };

    return {
      onTouchStart: (e) => {
        const t = e.touches[0];
        start(t.clientX, t.clientY);
      },
      onTouchMove: (e) => {
        const t = e.touches[0];
        move(t.clientX, t.clientY);
      },
      onTouchEnd: (e) => {
        const wasTriggered = triggered;
        clear();
        if (!wasTriggered) {
          // 通常タップ。clickイベントは別途発火するので何もしない
        } else {
          // 長押し済み。clickの発火を防ぐ
          e.preventDefault();
        }
      },
      onTouchCancel: () => clear(),
      onMouseDown: (e) => {
        if (e.button !== 0) return;
        start(e.clientX, e.clientY);
      },
      onMouseMove: (e) => move(e.clientX, e.clientY),
      onMouseUp: () => clear(),
      onMouseLeave: () => clear(),
      onClick: (e) => {
        if (triggered) {
          e.preventDefault();
          e.stopPropagation();
          triggered = false;
          return;
        }
        onClick?.(e);
      },
    };
  };

  // ===== 石モン削除（v2.10.0） =====
  // 世界に一体の石モンを消す重い操作。安全装置として2段階確認を必須にする。
  // 1段階目: 長押しメニュー → 削除を選択
  // 2段階目: 確認モーダル → 削除ボタンは2秒間ロック
  const deleteMon = async (mon) => {
    if (!mon || !mon.id) return;
    const updated = collection.filter(c => c.id !== mon.id);
    setCollection(updated);
    setSelected(null);  // 詳細画面が開いていたら閉じる
    setLongPressMon(null);  // 長押しメニューも閉じる
    setDeleteConfirmMon(null);  // 確認モーダルも閉じる
    try {
      await saveCollection(updated);
      console.log(`[Delete] 石モン削除完了: ${mon.name} (${mon.id})`);
    } catch (err) {
      console.error('[Delete] 保存エラー:', err);
      setError('削除しましたが、保存に失敗しました。次回起動時に復元される可能性があります');
    }
  };

  // お気に入りtoggle（長押しメニューから呼ぶ用）
  const toggleFavoriteMon = (mon) => {
    if (!mon || !mon.id) return;
    const updated = collection.map(c => c.id === mon.id ? { ...c, isFav: !c.isFav } : c);
    setCollection(updated);
    saveCollection(updated);
    // 詳細画面が開いていれば、そのstateも更新
    setSelected(prev => prev && prev.id === mon.id ? { ...prev, isFav: !prev.isFav } : prev);
    setLongPressMon(null);  // メニュー閉じる
  };

  // ===== 進化 =====
  const evolveMon = async (mon) => {
    if (!mon.evolveTo || mon.stage >= 3) return;
    const cost = EVOLVE_COST[mon.rarity] || EVOLVE_COST[4];
    if ((player.stoneFragments || 0) < cost) {
      alert(`石のかけらが 足りません！\n${cost}個 必要 / 現在 ${player.stoneFragments || 0}個`);
      return;
    }
    // コスト消費
    const costDeductedPlayer = { ...player, stoneFragments: (player.stoneFragments || 0) - cost };
    setPlayer(costDeductedPlayer);
    savePlayer(costDeductedPlayer);
    setShowEvolveAnim(mon);
    try {
      // ===== 進化データの確定（ここまでが「進化処理本体」） =====
      // この部分が例外なく完了すれば、進化は「成功」とみなす。
      // 画像生成・Firestore保存の失敗は別扱い（進化自体は成功扱いに）。
      const newStage = mon.stage + 1;
      const newRarity = Math.min(5, mon.rarity + 1);

      // 機能追加(v2.8.0): 進化履歴を蓄積する。
      //   旧コードは description を「○○が 進化した すがた...」に書き換えていたため、
      //   思い出深い元の説明文が失われていた（世界に一体の石モンなのに）。
      //   新仕様：description は元のまま保持し、evolutionHistory に前の姿を記録する。
      //   既存の石モン（evolutionHistory が undefined）にも後方互換あり。
      const evolutionEntry = {
        name: mon.name,
        stage: mon.stage,
        rarity: mon.rarity,
        skill: mon.skill,
        description: mon.description,
        evolvedAt: new Date().toISOString(),
      };
      const evolutionHistory = [...(mon.evolutionHistory || []), evolutionEntry];

      const evolved = {
        ...mon,
        id: `${mon.id}_stage${newStage}`, // 進化後は新しいキャッシュキーに
        name: mon.evolveTo, stage: newStage, rarity: newRarity,
        baseStats: {
          hp: Math.round(mon.baseStats.hp * 1.4), kogeki: Math.round(mon.baseStats.kogeki * 1.4),
          bougyo: Math.round(mon.baseStats.bougyo * 1.4), speed: Math.round(mon.baseStats.speed * 1.3),
        },
        skill: `スーパー${mon.skill}`, skillDesc: `進化して パワーアップした ${mon.skill}！`,
        // description は元のまま保持（思い出を守る）
        evolveTo: newStage < 3 ? `${mon.evolveTo}X` : null,
        evolutionHistory,  // 進化履歴
      };

      // === 進化アニメ中にAI画像をバックグラウンド生成 ===
      // 進化アニメは2500ms。その間にAI画像生成（5〜15秒）が始まり、画像はキャッシュへ保存。
      // アニメ完了時点でキャッシュにあれば即適用、なければ後から自動更新する。
      //
      // バグ修正(v2.7.5): 画像生成の失敗で「進化に失敗しました」が出ていた問題。
      //   imagePromise を .catch でラップして、画像エラーは null 扱いに。
      //   進化処理は画像の有無に関わらず成功させる。
      const imagePromise = getOrGenerateMonImage(evolved).catch(err => {
        console.warn('[Evolve] 画像生成エラー（進化は成功扱い）:', err);
        return { image: null };
      });

      await new Promise(r => setTimeout(r, 2500));

      // アニメ完了。AI画像を待つ（最大10秒）
      const imageRace = await Promise.race([
        imagePromise,
        new Promise(resolve => setTimeout(() => resolve({ image: null }), 10000)),
      ]);
      if (imageRace?.image) {
        evolved.imageDataUrl = imageRace.image;
        setEvolvingImageId(null); // 画像が間に合った → オーバーレイ不要
      } else {
        // v2.23.1: 新画像がまだ来ていない。古い画像が「進化後の姿」のフリをするのを防ぐため
        //   このIDを記録 → 詳細画像に「描いています…」を表示。本物は下の .then で差し替える。
        setEvolvingImageId(evolved.id);
      }

      // 進化データをUIに反映（同期処理・失敗しない）
      const updated = collection.map(c => c.id === mon.id ? evolved : c);
      setCollection(updated);
      setShowEvolveAnim(null);
      setSelected(evolved);
      updateMission('evolve');

      // Firestore保存。失敗しても進化は成功扱い（UIには反映済み）。
      // バグ修正(v2.7.5): 旧コードは await saveCollection(updated) の失敗で
      //   catch に落ちて「進化に失敗しました」が出ていた。
      try {
        await saveCollection(updated);
      } catch (saveErr) {
        console.warn('[Evolve] Firestore保存エラー（進化は成功・後で再保存される）:', saveErr);
        setError('進化は成功しましたが、保存に失敗しました。次回起動時に復元されます。');
      }

      // 進化カウンタを更新 → 称号チェック
      const evolvedPlayer = {
        ...player,
        stats: {
          ...(player.stats || {}),
          totalEvolves: (player.stats?.totalEvolves || 0) + 1,
        },
      };
      setPlayer(evolvedPlayer);
      savePlayer(evolvedPlayer);
      grantTitlesIfAny('evolve', {}, evolvedPlayer, updated);

      // もしまだ画像が来てなかった場合、後で来たら反映
      if (!imageRace?.image) {
        imagePromise.then(({ image }) => {
          setEvolvingImageId(null); // v2.23.1: 「描いています…」を解除(画像が来ても来なくても)
          if (image) {
            const finalEvolved = { ...evolved, imageDataUrl: image };
            // バグ修正(v2.7.2): 古いcollection変数ではなく、最新stateから配列を作り、
            //   その同じ配列をUI更新と保存の両方に使う。
            //   旧コードは saveCollection(collection.map(...)) で関数定義時点の
            //   古いcollectionを保存しており、後から届いた進化画像がFirestoreに
            //   保存されず、リロードで画像が元に戻っていた。
            setCollection(prev => {
              const next = prev.map(c => c.id === finalEvolved.id ? finalEvolved : c);
              // 後追い保存も失敗しても進化UIには影響しない
              saveCollection(next).catch(err => {
                console.warn('[Evolve] 後追い画像のFirestore保存エラー:', err);
              });
              return next;
            });
            setSelected(prev => (prev && prev.id === finalEvolved.id) ? finalEvolved : prev);
          }
        });
      }
    } catch (err) {
      // ここに来るのは「進化処理本体」が本当にコケたとき
      // （mon.baseStats が無い、setState 系のエラーなど予期せぬ例外）。
      // 画像生成エラー・Firestore保存エラーは個別にハンドリング済みで、ここには来ない。
      console.error('[Evolve] 進化処理の例外:', err);
      setError('進化に失敗しました...');
      setShowEvolveAnim(null);
    }
  };

  // ===== 装備 =====
  const equipItem = async (monId, slot, equipId) => {
    const updated = collection.map(c => {
      if (c.id !== monId) return c;
      const newEq = { ...(c.equipped || {}) };
      if (equipId === null) delete newEq[slot];
      else newEq[slot] = equipId;
      return { ...c, equipped: newEq };
    });
    setCollection(updated);
    await saveCollection(updated);
    if (showEquip?.id === monId) {
      setShowEquip(updated.find(c => c.id === monId));
    }
    if (selected?.id === monId) {
      setSelected(updated.find(c => c.id === monId));
    }
  };

  // ===== 装備購入 =====
  const buyEquip = async (eq) => {
    if (player.gems < eq.price) {
      setError('きらめき石が足りません！');
      return;
    }
    if (player.inventory.includes(eq.id)) {
      setError('もう 所持中よ！');
      return;
    }
    if (player.level < eq.unlock) {
      setError(`プレイヤー Lv.${eq.unlock} で つかえるよ`);
      return;
    }
    const updated = {
      ...player,
      gems: player.gems - eq.price,
      inventory: [...player.inventory, eq.id],
      inventoryNew: [...new Set([...(player.inventoryNew || []), eq.id])],
    };
    setPlayer(updated);
    await savePlayer(updated);
  };

  // ===== バトル =====
  const DIFFICULTY_MULTIPLIER = { easy: 0.7, normal: 1.0, hard: 1.35 };
  const startBattle = (mon, stage) => {
    const enemy = createWildMon(stage);
    const mult = DIFFICULTY_MULTIPLIER[settings.difficulty] || 1.0;
    // baseStats に難易度倍率を適用（getCurrentStats での再計算でもステータス比率が保たれる）
    const adjustedEnemy = mult === 1.0 ? enemy : {
      ...enemy,
      baseStats: {
        hp:     Math.max(1, Math.round(enemy.baseStats.hp     * mult)),
        kogeki: Math.max(1, Math.round(enemy.baseStats.kogeki * mult)),
        bougyo: Math.max(1, Math.round(enemy.baseStats.bougyo * mult)),
        speed:  Math.max(1, Math.round(enemy.baseStats.speed  * mult)),
      },
    };
    const enemyStats = getCurrentStats(adjustedEnemy);
    const myStats = getCurrentStats(mon);
    setBattleStage(stage); setMyMon(mon); setEnemyMon(adjustedEnemy);
    setMyHp(myStats.hp); setEnemyHp(enemyStats.hp);
    setTurn(1);
    setBattleLog([`野生の ${enemy.name} が 現れた！`]);
    setBattlePhase('select'); setBattleResult(null); setSuperEffectiveHit(false);
    setView('battle');
    updateMission('battle');
    updateMission('battle_type', { type: mon.type });
    // 前回使った石モンIDを保存
    const updatedP = { ...player, lastBattleMonId: mon.id };
    setPlayer(updatedP);
    savePlayer(updatedP);
  };

  const battleResolve = (myAction) => {
    if (battlePhase !== 'select') return;
    setBattlePhase('resolving');
    const enemyAction = ['kogeki', 'bougyo', 'tokugi'][Math.floor(Math.random() * 3)];
    const myStats = getCurrentStats(myMon);
    const enemyStats = getCurrentStats(enemyMon);
    const typeBonus = getTypeMultiplier(myMon.type, enemyMon.type);
    const enemyTypeBonus = getTypeMultiplier(enemyMon.type, myMon.type);

    let log = [], myDmg = 0, enemyDmg = 0;
    log.push(`${turn}ターンめ！`);
    const beats = (a, b) => (
      (a === 'kogeki' && b === 'tokugi') ||
      (a === 'tokugi' && b === 'bougyo') ||
      (a === 'bougyo' && b === 'kogeki')
    );
    const actionLabel = { kogeki: 'こうげき', bougyo: 'ぼうぎょ', tokugi: 'とくぎ' };
    log.push(`${myMon.name}は ${actionLabel[myAction]}！`);
    log.push(`${enemyMon.name}は ${actionLabel[enemyAction]}！`);

    let mySuperEffective = false;

    if (myAction === enemyAction) {
      log.push('あいこ！ おたがい こうげき！');
      enemyDmg = Math.max(3, Math.round((myStats.kogeki - enemyStats.bougyo / 2) * 0.4 * typeBonus));
      myDmg = Math.max(3, Math.round((enemyStats.kogeki - myStats.bougyo / 2) * 0.4 * enemyTypeBonus));
    } else if (beats(myAction, enemyAction)) {
      log.push(`${myMon.name}の こうげきが きまった！`);
      let baseDmg = myStats.kogeki - enemyStats.bougyo / 2;
      if (myAction === 'tokugi') baseDmg *= 1.4;
      enemyDmg = Math.max(5, Math.round(baseDmg * typeBonus));
      if (typeBonus > 1) { log.push('こうかは ばつぐん！'); mySuperEffective = true; }
      if (typeBonus < 1) log.push('こうかは 今ひとつ...');
    } else {
      log.push(`${enemyMon.name}の こうげき！`);
      let baseDmg = enemyStats.kogeki - myStats.bougyo / 2;
      if (enemyAction === 'tokugi') baseDmg *= 1.4;
      myDmg = Math.max(5, Math.round(baseDmg * enemyTypeBonus));
      if (enemyTypeBonus > 1) log.push(`${myMon.name}は おおだめーじ！`);
      if (enemyTypeBonus < 1) log.push(`${myMon.name}は すこしだけ ダメージ`);
    }

    if (enemyDmg > 0) setAnimatingHit('enemy');
    else if (myDmg > 0) setAnimatingHit('me');
    setBattleLog(prev => [...prev.slice(-3), ...log]);

    setTimeout(() => {
      const newEnemyHp = Math.max(0, enemyHp - enemyDmg);
      const newMyHp = Math.max(0, myHp - myDmg);
      setEnemyHp(newEnemyHp); setMyHp(newMyHp); setAnimatingHit(null);
      if (mySuperEffective) setSuperEffectiveHit(true);

      if (newEnemyHp <= 0) finishBattle('win', mySuperEffective);
      else if (newMyHp <= 0) finishBattle('lose', false);
      else if (turn >= 5) {
        if (newMyHp > newEnemyHp) finishBattle('win', mySuperEffective);
        else if (newMyHp < newEnemyHp) finishBattle('lose', false);
        else finishBattle('draw', false);
      } else {
        setTurn(turn + 1); setBattlePhase('select');
      }
    }, 1500);
  };

  const finishBattle = async (result, wasSuperEffective) => {
    setBattlePhase('result');
    let expGained = 0;
    if (result === 'win') expGained = 30 + (enemyMon.level || 1) * 10 + (enemyMon.rarity - 1) * 10;
    else if (result === 'draw') expGained = 15 + (enemyMon.level || 1) * 4;
    else expGained = 8 + (enemyMon.level || 1) * 3;

    let newExp = (myMon.exp || 0) + expGained;
    let newLevel = myMon.level || 1;
    let needed = expForNextLevel(newLevel);
    let leveledUp = false;
    while (newExp >= needed && newLevel < MAX_LEVEL) {
      newExp -= needed; newLevel++; leveledUp = true; needed = expForNextLevel(newLevel);
    }
    const updatedMon = {
      ...myMon, level: newLevel, exp: newExp,
      wins: (myMon.wins || 0) + (result === 'win' ? 1 : 0),
      losses: (myMon.losses || 0) + (result === 'lose' ? 1 : 0),
    };
    const newCollection = collection.map(c => c.id === myMon.id ? updatedMon : c);
    setCollection(newCollection);
    // 改善(v2.8.0): saveCollection を await せず非同期化。
    //   旧コードは Firestore 書き込みを待ってから setBattleResult を呼んでいたため、
    //   ネットワーク遅延がそのまま「勝った／負けた画面が出るまでの待ち時間」になっていた。
    //   バトル結果モーダルを即座に表示し、保存はバックグラウンド処理に。
    //   保存失敗してもUIには反映済み、v2.7.4 の _savedAt 仕組みで次回起動時に巻き取られる。
    saveCollection(newCollection).catch(err => {
      console.warn('[Battle] Firestore保存エラー（バトル結果は表示済み）:', err);
    });

    // プレイヤーEXP
    const playerExp = result === 'win' ? 25 : result === 'draw' ? 12 : 8;
    addPlayerExp(playerExp);

    // 勝利時にきらめき石報酬
    let gemsGained = 0;
    let fragmentsGained = 0;
    if (result === 'win') {
      gemsGained = 5 + Math.floor(Math.random() * 6); // 5〜10
      if (wasSuperEffective) gemsGained += 3; // ボーナス
      fragmentsGained = 2 + Math.floor(Math.random() * 3); // 2〜4個
      setPlayer(prev => {
        const updated = { ...prev, gems: (prev.gems || 0) + gemsGained, stoneFragments: (prev.stoneFragments || 0) + fragmentsGained };
        savePlayer(updated);
        return updated;
      });
    } else if (result === 'draw') {
      gemsGained = 2;
      fragmentsGained = 1;
      setPlayer(prev => {
        const updated = { ...prev, gems: (prev.gems || 0) + gemsGained, stoneFragments: (prev.stoneFragments || 0) + fragmentsGained };
        savePlayer(updated);
        return updated;
      });
    }

    // ミッション
    if (result === 'win') {
      updateMission('win');
      if (wasSuperEffective) updateMission('super_effective');
    }
    if (leveledUp) updateMission('levelup');

    // 称号チェック（初陣・百戦錬磨・無敗の伝説 など）
    grantTitlesIfAny('battle', { result }, null, newCollection);

    setBattleResult({ result, expGained, leveledUp, newLevel, updatedMon, playerExp, gemsGained, fragmentsGained });
  };

  const closeBattle = () => {
    setBattlePhase('select'); setBattleResult(null);
    setMyMon(null); setEnemyMon(null); setBattleStage(null);
    setView('home');
  };

  const totalStat = (s) => s.hp + s.kogeki + s.bougyo + s.speed;
  const ranked = [...collection].sort((a, b) => {
    const sa = getCurrentStats(a), sb = getCurrentStats(b);
    return b.rarity - a.rarity || (b.level || 1) - (a.level || 1) || totalStat(sb) - totalStat(sa);
  });

  // 未受取ミッション数
  const claimableMissions = (player.missions?.list || []).filter(m => {
    const prog = player.missions.progress?.[m.id] || 0;
    return prog >= m.target && !player.missions.claimed?.[m.id];
  }).length;

  // ===========================================
  // ホーム画面（案C：撮影 + 最近の石モン + ミッション）
  // ===========================================
  const HomeView = () => {
    const recentMons = collection.slice(0, 6); // 直近6体
    return (
      <div className="px-5 pt-6 pb-32">
        {/* v2.23.0: ログイン復旧案内 — 未ログイン＆0体のときだけ表示。
            iOSの容量逼迫でローカルが消えても石モンはクラウドに残っている可能性があるため、
            「消えた!」と誤認させず、ログインで取り戻せると案内する。 */}
        {!firebaseUser && collection.length === 0 && (
          <div className="mb-4 rounded-2xl p-4"
            style={{ background: 'rgba(0,0,0,0.4)', border: '1px solid rgba(255,215,0,0.4)' }}>
            <div className="flex items-start gap-2 mb-2">
              <span className="text-xl leading-none">☁️</span>
              <div className="flex-1 min-w-0">
                <div className="text-white font-black text-sm leading-snug">前に遊んでいた方へ</div>
                <div className="text-white/70 text-xs leading-relaxed mt-1">
                  石モンたちはクラウドに残っているかもしれません。ログインすると、前のデータを取り戻せます。
                </div>
              </div>
            </div>
            <button onClick={signInWithGoogle} disabled={authLoading || !firebaseReady}
              className="w-full py-2.5 rounded-xl font-black text-sm active:scale-95 flex items-center justify-center gap-2"
              style={{ background: authLoading ? 'rgba(255,255,255,0.2)' : 'white', color: '#333', opacity: (!firebaseReady || authLoading) ? 0.7 : 1 }}>
              {authLoading ? (
                <><Loader2 className="w-4 h-4 animate-spin" />ログイン中...</>
              ) : (
                <>
                  <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.31z"/></svg>
                  Googleでログインして取り戻す
                </>
              )}
            </button>
            <div className="text-white/40 text-[10px] text-center mt-2">はじめての方は、このまま遊べます</div>
          </div>
        )}
        {/* プレイヤーステータスバー */}
        <button onClick={() => setView('profile')}
          className="flex items-center gap-3 mb-4 w-full active:scale-[0.98] transition-transform rounded-2xl px-3 py-2.5 backdrop-blur-sm"
          style={{ background: 'rgba(0,0,0,0.35)', border: '1px solid rgba(255,215,0,0.35)' }}>
          {/* 左: アバター */}
          <div className="flex-shrink-0 self-center">
            {player.avatarPhoto ? (
              <img src={player.avatarPhoto}
                className="w-11 h-11 rounded-xl object-cover"
                style={{ border: '2px solid #FFD700' }} />
            ) : (
              <div className="w-11 h-11 rounded-xl flex items-center justify-center"
                style={{ background: 'linear-gradient(135deg, #FFD700, #FF6B35)', border: '2px solid #FFD700' }}>
                <User className="w-6 h-6 text-yellow-900" strokeWidth={3} />

  // ===========================================

  const InventoryModal = () => {
    if (!showInventory) return null;
    const [tab, setTab] = useState('all');

    // 各装備を「誰が装備中か」マップ化
    const equippedByMonMap = useMemo(() => {
      const map = {};
      for (const m of collection) {
        if (!m.equipped) continue;
        for (const slot of EQUIP_SLOTS) {
          const id = m.equipped[slot];
          if (id) {
            if (!map[id]) map[id] = [];
            map[id].push(m);
          }
        }
      }
      return map;
    }, [collection]);

    // 所持装備一覧（タブでフィルタ）
    const ownedItems = (player.inventory || [])
      .map(id => EQUIPMENT[id])
      .filter(Boolean)
      .filter(eq => tab === 'all' || eq.type === tab);

    // タブ別の「新着のみ」数（バッジ用）
    const newIds = player.inventoryNew || [];
    const newCounts = {
      all:    newIds.length,
      sword:  newIds.filter(id => EQUIPMENT[id]?.type === 'sword').length,
      shield: newIds.filter(id => EQUIPMENT[id]?.type === 'shield').length,
      charm:  newIds.filter(id => EQUIPMENT[id]?.type === 'charm').length,

      if (currentNew.length === 0) return;
      const toClear = tab === 'all'
        ? currentNew
        : currentNew.filter(id => EQUIPMENT[id]?.type === tab);
      if (toClear.length === 0) return;
      const remain = currentNew.filter(id => !toClear.includes(id));
      const updated = { ...player, inventoryNew: remain };
      setPlayer(updated);
      savePlayer(updated);
    }, [showInventory, tab]);

    const tabs = [
      { id: 'all', label: 'すべて', emoji: '📦' },
      { id: 'sword', label: '剣', emoji: '🗡️' },
      { id: 'shield', label: '盾', emoji: '🛡️' },
      { id: 'charm', label: 'お守り', emoji: '🍀' },

      <div className="fixed inset-0 z-[55] overflow-y-auto p-3" style={{ background: 'rgba(0,0,0,0.85)' }}>

                <span className="text-white font-black">{(player.inventory || []).length}</span>

            </div>

            {/* 中身 */}
            {ownedItems.length === 0 ? (

                  🛍️ ショップへ行く
                </button>
              </div>
            ) : (
              <div className="space-y-2">
                {ownedItems.map(eq => {
                  const r = getRarityLabel(eq.rarity);
                  const equippedBy = equippedByMonMap[eq.id] || [];
                  const slotLabel = EQUIP_LABELS[eq.type];

                    <div key={eq.id} className="rounded-2xl p-3"

                          <div className="text-xs font-bold" style={{ color: r.color }}>{'★'.repeat(eq.rarity)} {r.label}</div>
                          <div className="text-xs text-white/80 font-bold mt-0.5">

                            {eq.boost.bougyo ? `ぼうぎょ +${eq.boost.bougyo} ` : ''}

                style={{ background: 'linear-gradient(135deg, #C77DFF, #7B2CBF)', boxShadow: '0 3px 0 #4A0E78', border: '2px solid white' }}>
                🛍️ ショップへ行く
              </button>
            )}
          </div>
        </div>
      </div>
    );

  const OnboardingModal = () => {
    if (!showOnboarding) return null;

    // v2.14.0: 親のstateを参照(再マウント時もスライド位置を保持)
    const slideIdx = onboardingSlideIdx;
    const setSlideIdx = setOnboardingSlideIdx;
    const totalSlides = 5;
    const sliderRef = useRef(null);

    // タッチスワイプ対応
    const touchStart = useRef(null);
    const handleTouchStart = (e) => { touchStart.current = e.touches[0].clientX; };
    const handleTouchEnd = (e) => {
      if (touchStart.current === null) return;
      const dx = e.changedTouches[0].clientX - touchStart.current;
      if (Math.abs(dx) > 50) {
        if (dx < 0 && slideIdx < totalSlides - 1) setSlideIdx(i => i + 1);
        if (dx > 0 && slideIdx > 0) setSlideIdx(i => i - 1);
      }
      touchStart.current = null;
    };

    const finishOnboarding = (defaultName = false) => {
      const value = defaultName ? 'トレーナー' : (onboardingNameRef.current?.value || '');
      const trimmed = value.trim().slice(0, 10) || 'トレーナー';
      // v2.14.0: 同意情報も同時に保存(オンボーディング末尾で同意を取る方式)
      const now = new Date().toISOString();
      const updated = {
        ...player,
        name: trimmed,
        privacyPolicy: {
          agreedVersion: CURRENT_PRIVACY_POLICY_VERSION,
          agreedAt: now,
        },
        termsOfService: {
          agreedVersion: CURRENT_TERMS_OF_SERVICE_VERSION,
          agreedAt: now,
        },
      };
      setPlayer(updated);
      savePlayer(updated);
      // v2.14.0: 同意イベントをGA4に送信
      window.ga4.event('consent_agreed', {
        policy_version: CURRENT_PRIVACY_POLICY_VERSION,
        terms_version: CURRENT_TERMS_OF_SERVICE_VERSION,

                      ? 'rgba(50,50,50,0.7)'
                      : `linear-gradient(135deg, ${s.color}, ${s.color}aa)`,
                    boxShadow: locked ? 'none' : `0 4px 0 rgba(0,0,0,0.3)`,
                    border: locked ? '2px solid rgba(255,255,255,0.2)' : '2px solid white',
                    opacity: locked ? 0.65 : 1,
                    transform: locked ? 'none' : undefined,
                  }}
                  {...(!locked && { className: "w-full p-2.5 rounded-2xl text-white text-left active:scale-95 transition-transform flex items-center gap-2" })}
                  >
                  <div className="text-3xl">{locked ? '🔒' : s.emoji}</div>
                  <div className="flex-1 min-w-0">
                    <div className="text-base font-black leading-tight">{s.name}</div>
                    <div className="text-[10px] font-bold opacity-90">
                      {locked
                        ? `Lv.${s.reqLv} 以上の石モンが必要`
                        : `敵レベル ${s.minLv}〜${s.maxLv}`}
                    </div>
                  </div>
                  {locked
                    ? <span className="text-white/50 text-xs font-bold">Lv.{s.reqLv}〜</span>
                    : <ChevronRight className="w-5 h-5 flex-shrink-0" />}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    // 石モン選択: 前回使用モンを先頭に、残りは強さ（総合ステ）順
    const sortedCollection = [...collection].sort((a, b) => {
      const aIsLast = a.id === player.lastBattleMonId;
      const bIsLast = b.id === player.lastBattleMonId;
      if (aIsLast && !bIsLast) return -1;
      if (!aIsLast && bIsLast) return 1;
      // 強さ順: rarity → level → 総合ステ
      const sa = getCurrentStats(a), sb = getCurrentStats(b);
      const totalA = sa.hp + sa.kogeki + sa.bougyo + sa.speed;
      const totalB = sb.hp + sb.kogeki + sb.bougyo + sb.speed;
      return b.rarity - a.rarity || (b.level || 1) - (a.level || 1) || totalB - totalA;
    });

    return (
      <div className="px-4 pt-6 pb-32 relative">
        <CloseButton onClick={() => setStep('stage')} />
        <h2 className="text-3xl font-black text-white text-center mb-1" style={{ textShadow: '0 4px 0 rgba(0,0,0,0.3)' }}>
          {chosenStage.emoji} {chosenStage.name}
        </h2>
        <p className="text-center text-yellow-200 text-sm font-bold mb-4">どの石モンでバトル？</p>
        {collection.length === 0 ? (
          <div className="text-center text-white/70 mt-12 font-bold">まずは石モンを集めよう！</div>
        ) : (
          <div className="space-y-2">
            {sortedCollection.map(m => {
              const t = TYPES[m.type] || TYPES['土'];
              const cur = getCurrentStats(m);
              const total = cur.hp + cur.kogeki + cur.bougyo + cur.speed;
              const isLastUsed = m.id === player.lastBattleMonId;
              return (
                <button key={m.id} onClick={() => startBattle(m, chosenStage)}
                  className="w-full flex items-center gap-3 p-3 rounded-2xl active:scale-95 transition-transform relative"
                  style={{ background: `linear-gradient(90deg, ${t.light}, ${t.bg})`, border: `3px solid ${isLastUsed ? '#FFD700' : 'white'}`, boxShadow: `0 4px 0 ${t.dark}` }}>
                  {isLastUsed && (
                    <div className="absolute top-1 right-1 bg-yellow-400 rounded-full px-1.5 py-0.5 text-[8px] font-black text-yellow-900 leading-none">
                      前回
                    </div>
                  )}
                  {m.imageDataUrl ? (
                    <img src={m.imageDataUrl} className="w-14 h-14 rounded-xl object-cover" style={{ border: '2px solid white' }} />
                  ) : (
                    <div className="w-14 h-14 rounded-xl flex items-center justify-center" style={{ background: `${t.dark}66`, border: '2px solid white' }}>
                      <span className="text-3xl">{t.emoji}</span>
                    </div>
                  )}
                  <div className="flex-1 text-left">
                    <div className="font-black text-white text-lg leading-tight" style={{ textShadow: `0 2px 0 ${t.dark}` }}>{m.name}</div>
                    <div className="text-xs font-bold text-white/95">Lv.{m.level || 1} ・ 総合 {total} ・ {t.emoji}{t.name}</div>
                  </div>
                  <Swords className="w-5 h-5 text-white flex-shrink-0" />
                </button>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  // ===========================================
  // バトル画面
  // ===========================================
  const BattleView = () => {

          <polygon points="0,100 0,75 20,50 35,68 50,38 65,60 80,42 95,56 100,52 100,100" fill="#362408" opacity="0.6"/>
          {[12,38,62,82].map((x,i) => (

      densetsu: (

    return (
      <div className="min-h-screen flex flex-col relative overflow-hidden">

        <div className="absolute inset-0">{bgEl}</div>
        <div className="relative z-10 flex flex-col flex-1">

          {/* ターン表示 */}
          <div className="text-center pt-2 pb-1">

          {/* バトルログ */}

          {/* 自分のステータス（枠なし・背景のみ） */}
          <div className="px-3 mb-2">
            <div className="rounded-xl p-2.5"
              style={{ background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(4px)' }}>
              <div className="flex items-center gap-1.5 mb-1">
                <div className="bg-yellow-500 rounded px-1.5 py-0.5 text-[9px] font-black text-yellow-900 leading-none flex-shrink-0">あなた</div>
                <span className="text-sm">{myT.emoji}</span>
                <div className="flex-1 min-w-0">
                  <div className="text-white font-black text-sm leading-tight truncate">{myMon.name}</div>
                  <div className="text-yellow-200 text-[9px] font-bold">Lv.{myMon.level || 1} ・ {myT.name}タイプ</div>
                </div>
              </div>
              <HpBar current={myHp} max={myStats.hp} />

                </button>
                <button onClick={() => battleResolve('bougyo')}

                  style={{ background: 'linear-gradient(180deg, #4FC3F7, #0277BD)', boxShadow: '0 6px 0 #01396B, 0 0 20px rgba(2,119,189,0.4)', border: '3px solid #FFD700' }}>

                  <div className="text-blue-100 text-[9px] font-bold opacity-90">攻撃に強い</div>
                </button>
                <button onClick={() => battleResolve('tokugi')}
                  className="flex flex-col items-center gap-1 rounded-2xl py-3 px-1 active:scale-90 transition-transform"
                  style={{ background: 'linear-gradient(180deg, #CE93D8, #7B1FA2)', boxShadow: '0 6px 0 #4A0072, 0 0 20px rgba(123,31,162,0.4)', border: '3px solid #FFD700' }}>
                  <Sparkles className="w-7 h-7 text-white" strokeWidth={2.5} />
                  <div className="text-white font-black text-sm">特技</div>
                  <div className="text-purple-100 text-[9px] font-bold opacity-90">防御に強い</div>

              </div>

          {battlePhase === 'resolving' && (
            <div className="text-center p-4">

      </div>
    );
  };

  const HpBar = ({ current, max }) => {
    const ratio = current / max;

      <div className="flex items-center gap-1.5">

  const ActionButton = ({ icon: Icon, label, sublabel, color, onClick }) => (

  const BattleResultModal = ({ result, onClose }) => {
    const isWin = result.result === 'win';
    const isDraw = result.result === 'draw';
    const titleText = isWin ? '勝った！' : isDraw ? '引き分け' : '負けた...';
