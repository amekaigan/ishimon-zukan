            {(mon.personality || mon.favorite) && (
              <div className="mt-3 pt-3 space-y-2" style={{ borderTop: '1px dashed rgba(0,0,0,0.15)' }}>
                {mon.personality && (
                  <div>
                    <div className="text-[10px] font-bold text-gray-600">💭 性格</div>
                    <p className="text-[12px] font-bold text-gray-700 leading-relaxed">{mon.personality}</p>
                  </div>
                )}
                {mon.favorite && (
                  <div>
                    <div className="text-[10px] font-bold text-gray-600">💕 好きなもの</div>
                    <p className="text-[12px] font-bold text-gray-700 leading-relaxed">{mon.favorite}</p>
                  </div>
                )}
              </div>
            )}

            {mon.legend && (
              <div className="mt-3 pt-3 rounded-xl p-2.5"
                style={{ background: 'linear-gradient(135deg, rgba(255,215,0,0.18), rgba(199,125,255,0.18))', border: '1px solid rgba(255,215,0,0.5)' }}>
                <div className="text-yellow-700 text-[10px] font-black tracking-widest mb-1">📜 伝説</div>
                <p className="text-[12px] font-bold text-gray-800 leading-relaxed">{mon.legend}</p>
              </div>
            )}

            <div className="mt-3 pt-3" style={{ borderTop: '1px dashed rgba(0,0,0,0.15)' }}>
              <div className="text-gray-600 text-[10px] font-black tracking-widest mb-2">✨ 出会いの記録</div>
              <div className="space-y-1.5 text-[11px] font-bold">
                <div className="flex items-start gap-1.5 text-gray-700">
                  <Calendar className="w-3 h-3 flex-shrink-0 mt-0.5" />
                  <span>
                    {mon.capturedAt
                      ? new Date(mon.capturedAt).toLocaleString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' })
                      : '不明'}
                  </span>
                </div>
                {mon.location && mon.location.name && (
                  <div className="flex items-start gap-1.5 text-gray-700">
                    <span className="text-xs leading-3">📍</span>
                    <span>{mon.location.name}</span>
                  </div>
                )}
                {mon.originalPhoto && mon.originalPhoto !== mon.imageDataUrl && (
                  <div className="mt-2">
                    <div className="text-gray-600 text-[10px] font-bold mb-1.5">📷 出会った時の石</div>
                    <div className="w-full rounded-lg overflow-hidden" style={{ border: '1px solid rgba(0,0,0,0.15)', aspectRatio: '4/3' }}>
                      <img src={mon.originalPhoto}
                        className="w-full h-full object-cover block" />
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-2 mb-2">
            <button onClick={() => setShowEquip(mon)}
              className="py-3 rounded-2xl text-white font-black text-sm active:scale-95 transition-transform"
              style={{ background: 'linear-gradient(135deg, #C77DFF, #7B2CBF)', boxShadow: '0 4px 0 #4A0E78', border: '3px solid white' }}>
              ⚔️ 装備
            </button>
            {canEvolve ? (
              <button onClick={() => evolveMon(mon)}
                className="py-3 rounded-2xl text-white font-black text-sm active:scale-95 transition-transform flex flex-col items-center justify-center gap-0.5"
                style={{
                  background: hasFragsForEvolve
                    ? 'linear-gradient(135deg, #FFD700, #FF6B35)'
                    : 'linear-gradient(135deg, #555, #333)',
                  boxShadow: hasFragsForEvolve ? '0 4px 0 #5A1A4A' : '0 2px 0 #111',
                  border: hasFragsForEvolve ? '3px solid white' : '3px solid #666',
                }}>
                <span>✨ 進化</span>
                <span className={`text-[9px] font-bold leading-none ${hasFragsForEvolve ? 'text-yellow-100' : 'text-red-300'}`}>
                  🪨 {evolveCost}個 {hasFragsForEvolve ? '' : `(あと${evolveCost - (player.stoneFragments || 0)})`}
                </span>
              </button>
            ) : (
              <div className="py-3 rounded-2xl text-yellow-200 font-black text-center text-xs" style={{ background: 'rgba(0,0,0,0.3)', border: '3px solid #FFD700' }}>
                <Award className="w-4 h-4 inline mb-0.5" /> {mon.stage >= 3 ? '最強！' : '進化なし'}
              </div>
            )}
          </div>

          {/* お気に入り & グループ登録 */}
          {(() => {
            const groups = player.monGroups || [];
            const isFav = !!mon.isFav;
            const toggleFavHere = () => {
              const updated = collection.map(m => m.id === mon.id ? { ...m, isFav: !m.isFav } : m);
              setCollection(updated);
              saveCollection(updated);
              setSelected(updated.find(m => m.id === mon.id));
            };
            const toggleGroupHere = (gid) => {
              const updated = collection.map(m => m.id === mon.id ? { ...m, groupId: m.groupId === gid ? null : gid } : m);
              setCollection(updated);
              saveCollection(updated);
              setSelected(updated.find(m => m.id === mon.id));
            };
            return (
              <div className="rounded-2xl p-3 mb-2" style={{ background: 'rgba(0,0,0,0.35)', border: '2px solid rgba(255,255,255,0.2)' }}>
                <div className="text-white/60 text-[10px] font-black tracking-widest mb-2">📁 お気に入り・グループ</div>
                {/* お気に入り */}
                <button onClick={toggleFavHere}
                  className="w-full flex items-center gap-2 py-2 px-3 rounded-xl mb-2 active:scale-95"
                  style={{ background: isFav ? 'rgba(255,61,127,0.3)' : 'rgba(255,255,255,0.08)', border: `1.5px solid ${isFav ? '#FF3D7F' : 'rgba(255,255,255,0.2)'}` }}>
                  <span className="text-lg">{isFav ? '❤️' : '🤍'}</span>
                  <span className="text-white font-black text-sm flex-1 text-left">お気に入り</span>
                  {isFav && <span className="text-[10px] font-bold text-pink-300">登録中</span>}
                </button>
                {/* グループ */}
                {groups.length === 0 ? (
                  <div className="text-white/40 text-[10px] font-bold text-center py-1">グループはまだありません（図鑑で作成）</div>
                ) : (
                  <div className="space-y-1">
                    {groups.map(g => {
                      const inGroup = mon.groupId === g.id;
                      return (
                        <button key={g.id} onClick={() => toggleGroupHere(g.id)}
                          className="w-full flex items-center gap-2 py-2 px-3 rounded-xl active:scale-95"
                          style={{ background: inGroup ? `${g.color}33` : 'rgba(255,255,255,0.08)', border: `1.5px solid ${inGroup ? g.color : 'rgba(255,255,255,0.2)'}` }}>
                          <div className="w-3 h-3 rounded-full flex-shrink-0" style={{ background: g.color }} />
                          <span className="text-white font-black text-sm flex-1 text-left">{g.name}</span>
                          {inGroup && <span className="text-[10px] font-bold" style={{ color: g.color }}>登録中</span>}
                        </button>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })()}

          {/* === AIキラキラボタン（AI画像が既にあれば非表示） === */}
          {!(mon.originalPhoto && mon.imageDataUrl && mon.originalPhoto !== mon.imageDataUrl) && (
            <button onClick={() => regenerateMonImage(mon)}
              disabled={aiGenerating}
              className="w-full py-2.5 rounded-2xl text-white font-black text-sm active:scale-95 transition-transform disabled:opacity-50 flex items-center justify-center gap-2"
              style={{ background: 'linear-gradient(135deg, #6A0DAD, #C77DFF, #FFD700)', boxShadow: '0 4px 0 #2E0068', border: '3px solid white' }}>
              <Wand2 className="w-4 h-4" />
              {aiGenerating ? <>描いています...</> : <>✨ AIで オリジナルアートに変換！</>}
            </button>
          )}
        </div>
      </div>
    );
  };

  const StatBar = ({ label, cur, base, eqBoost, max, color }) => (
    <div className="flex items-center gap-2">
      <div className="text-xs font-black w-16 text-gray-700">{label}</div>
      <div className="flex-1 h-3 rounded-full overflow-hidden relative" style={{ background: '#E0E0E0' }}>
        {base && <div className="absolute top-0 h-full opacity-30" style={{ width: `${Math.min(100, (base / max) * 100)}%`, background: color }} />}
        <div className="relative h-full rounded-full transition-all duration-1000" style={{ width: `${Math.min(100, (cur / max) * 100)}%`, background: `linear-gradient(90deg, ${color}cc, ${color})` }} />
      </div>
      <div className="text-sm font-black w-14 text-right" style={{ color }}>
        {cur}{eqBoost > 0 && <span className="text-[9px] text-green-600">+{eqBoost}</span>}
      </div>
    </div>
  );

  // ===========================================
  // ずかんとランキング
  // ===========================================
  // 図鑑画面
  // ===========================================
  const [collectionSort, setCollectionSort] = useState('newest');
  const [collectionFilter, setCollectionFilter] = useState('all'); // 'all'|'fav'|groupId

  // グループカラー（最大4色）
  const GROUP_COLORS = ['#FF6B35','#52B788','#C77DFF','#3DA5F5'];
  const GROUP_NAME_MAX = 6;

  const CollectionView = () => {
    const [showGroupEditor, setShowGroupEditor] = useState(false);
    const [groupNameInput, setGroupNameInput] = useState('');
    const [editingGroup, setEditingGroup] = useState(null); // グループ名変更用
    const [editingGroupName, setEditingGroupName] = useState('');

    const groups = player.monGroups || [];

    // グループ追加
    const addGroup = () => {
      if (groups.length >= 4) return;
      const name = groupNameInput.trim().slice(0, GROUP_NAME_MAX) || `グループ${groups.length + 1}`;
      const id = `g_${Date.now()}`;
      const color = GROUP_COLORS[groups.length % GROUP_COLORS.length];
      const updated = { ...player, monGroups: [...groups, { id, name, color }] };
      setPlayer(updated);
      savePlayer(updated);
      setGroupNameInput('');
      setShowGroupEditor(false);
    };

    // グループ削除（グループフィルタ画面から）
    const deleteGroup = (gid) => {
      const updated = { ...player, monGroups: groups.filter(g => g.id !== gid) };
      setPlayer(updated);
      savePlayer(updated);
      const updatedCol = collection.map(m => m.groupId === gid ? { ...m, groupId: null } : m);
      setCollection(updatedCol);
      saveCollection(updatedCol);
      setCollectionFilter('all');
    };

    // グループ名変更
    const renameGroup = (gid) => {
      const name = editingGroupName.trim().slice(0, GROUP_NAME_MAX);
      if (!name) return;
      const updated = { ...player, monGroups: groups.map(g => g.id === gid ? { ...g, name } : g) };
      setPlayer(updated);
      savePlayer(updated);
      setEditingGroup(null);
    };

    // 石モン お気に入りトグル（フィルタ画面内から）
    const toggleFavInList = (mon) => {
      const updated = collection.map(m => m.id === mon.id ? { ...m, isFav: !m.isFav } : m);
      setCollection(updated);
      saveCollection(updated);
    };

    // 石モン グループ削除（グループ画面内から）
    const removeFromGroup = (mon, gid) => {
      const updated = collection.map(m => m.id === mon.id ? { ...m, groupId: null } : m);
      setCollection(updated);
      saveCollection(updated);
    };

    const currentGroup = groups.find(g => g.id === collectionFilter);

    // フィルタ後ソート
    const filtered = collection.filter(m => {
      if (collectionFilter === 'fav') return m.isFav;
      if (collectionFilter !== 'all') return m.groupId === collectionFilter;
      return true;
    });
    const sorted = [...filtered].sort((a, b) => {
      if (collectionSort === 'newest') return (b.capturedAt || '').localeCompare(a.capturedAt || '');
      if (collectionSort === 'rarity')  return (b.rarity || 0) - (a.rarity || 0);
      if (collectionSort === 'strength') {
        const power = m => { const c = getCurrentStats(m); return c.hp + c.kogeki + c.bougyo + c.speed; };
        return power(b) - power(a);
      }
      return 0;
    });

    return (
      <div className="px-3 pt-4 pb-24">
        <h2 className="text-2xl font-black text-white text-center mb-0.5" style={{ textShadow: '0 3px 0 rgba(0,0,0,0.3)' }}>図鑑</h2>
        <p className="text-center text-yellow-200 text-xs font-bold mb-2">{collection.length}体 収集済み</p>

        {/* フィルタバー */}
        {collection.length > 0 && (
          <div className="mb-2">
            <div className="flex gap-1 flex-wrap">
              <button onClick={() => setCollectionFilter('all')}
                className="px-2.5 py-1 rounded-full text-[11px] font-black active:scale-95"
                style={{ background: collectionFilter === 'all' ? '#FFD700' : 'rgba(255,255,255,0.12)', color: collectionFilter === 'all' ? '#333' : 'rgba(255,255,255,0.8)', border: collectionFilter === 'all' ? '1.5px solid white' : '1.5px solid transparent' }}>
                全て
              </button>
              <button onClick={() => setCollectionFilter('fav')}
                className="px-2.5 py-1 rounded-full text-[11px] font-black active:scale-95"
                style={{ background: collectionFilter === 'fav' ? '#FF3D7F' : 'rgba(255,255,255,0.12)', color: 'white', border: collectionFilter === 'fav' ? '1.5px solid white' : '1.5px solid transparent' }}>
                ❤️ お気に入り
              </button>
              {groups.map(g => (
                <button key={g.id} onClick={() => setCollectionFilter(g.id)}
                  className="px-2.5 py-1 rounded-full text-[11px] font-black active:scale-95"
                  style={{ background: collectionFilter === g.id ? g.color : 'rgba(255,255,255,0.12)', color: 'white', border: collectionFilter === g.id ? '1.5px solid white' : '1.5px solid transparent' }}>
                  {g.name} ({collection.filter(m => m.groupId === g.id).length})
                </button>
              ))}
              {groups.length < 4 && (
                <button onClick={() => setShowGroupEditor(v => !v)}
                  className="px-2.5 py-1 rounded-full text-[11px] font-black active:scale-95"
                  style={{ background: showGroupEditor ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.1)', color: 'rgba(255,255,255,0.7)', border: '1.5px dashed rgba(255,255,255,0.35)' }}>
                  ＋グループ
                </button>
              )}
            </div>

            {/* グループ追加フォーム */}
            {showGroupEditor && (
              <div className="mt-2 bg-black/30 rounded-xl p-2" style={{ border: '1px solid rgba(255,255,255,0.2)' }}>
                <div className="flex gap-1 items-center">
                  <input
                    value={groupNameInput}
                    onChange={e => setGroupNameInput(e.target.value.slice(0, GROUP_NAME_MAX))}
                    placeholder={`名前（${GROUP_NAME_MAX}文字まで）`}
                    className="flex-1 min-w-0 rounded-lg px-2 py-1.5 text-xs font-bold text-gray-800"
                    style={{ border: '2px solid #FFD700', outline: 'none' }}
                    autoFocus
                    onKeyDown={e => { if (e.key === 'Enter') addGroup(); if (e.key === 'Escape') setShowGroupEditor(false); }}
                  />
                  <span className="text-[10px] text-white/50 font-bold flex-shrink-0">{groupNameInput.length}/{GROUP_NAME_MAX}</span>
                  <button onClick={addGroup}
                    className="bg-yellow-400 rounded-lg px-2.5 py-1.5 text-xs font-black text-yellow-900 active:scale-95 flex-shrink-0">追加</button>
                  <button onClick={() => { setShowGroupEditor(false); setGroupNameInput(''); }}
                    className="rounded-lg px-2 py-1.5 text-xs font-black text-white/70 active:scale-95 flex-shrink-0"
                    style={{ background: 'rgba(255,255,255,0.15)' }}>✕</button>
                </div>
              </div>
            )}

            {/* グループ管理パネル（グループフィルタ選択時） */}
            {currentGroup && (
              <div className="mt-2 rounded-xl p-2.5" style={{ background: `${currentGroup.color}22`, border: `1.5px solid ${currentGroup.color}66` }}>
                <div className="flex items-center gap-2 mb-2">
                  <div className="w-3 h-3 rounded-full flex-shrink-0" style={{ background: currentGroup.color }} />
                  {editingGroup === currentGroup.id ? (
                    <div className="flex gap-1 flex-1 items-center">
                      <input value={editingGroupName}
                        onChange={e => setEditingGroupName(e.target.value.slice(0, GROUP_NAME_MAX))}
                        className="flex-1 min-w-0 rounded-lg px-2 py-0.5 text-xs font-bold text-gray-800"
                        style={{ border: `2px solid ${currentGroup.color}`, outline: 'none' }}
                        autoFocus
                        onKeyDown={e => { if (e.key === 'Enter') renameGroup(currentGroup.id); if (e.key === 'Escape') setEditingGroup(null); }}
                      />
                      <span className="text-[9px] text-white/50">{editingGroupName.length}/{GROUP_NAME_MAX}</span>
                      <button onClick={() => renameGroup(currentGroup.id)}
                        className="rounded-lg px-2 py-0.5 text-[10px] font-black text-yellow-900 active:scale-95"
                        style={{ background: '#FFD700' }}>OK</button>
                      <button onClick={() => setEditingGroup(null)}
                        className="rounded-lg px-2 py-0.5 text-[10px] font-black text-white/70 active:scale-95"
                        style={{ background: 'rgba(255,255,255,0.15)' }}>✕</button>
                    </div>
                  ) : (
                    <div className="flex items-center gap-2 flex-1">
                      <span className="text-white font-black text-sm">{currentGroup.name}</span>
                      <button onClick={() => { setEditingGroup(currentGroup.id); setEditingGroupName(currentGroup.name); }}
                        className="text-[10px] font-bold px-1.5 py-0.5 rounded active:scale-95"
                        style={{ background: 'rgba(255,255,255,0.15)', color: 'rgba(255,255,255,0.7)' }}>✏️ 名前変更</button>
                      <button onClick={() => deleteGroup(currentGroup.id)}
                        className="text-[10px] font-bold px-1.5 py-0.5 rounded active:scale-95 ml-auto"
                        style={{ background: 'rgba(255,0,0,0.2)', color: '#FF8888', border: '1px solid rgba(255,0,0,0.3)' }}>🗑️ 削除</button>
                    </div>
                  )}
                </div>
                {sorted.length > 0 && (
                  <div className="text-white/50 text-[9px] font-bold">タップで石モン詳細 → 詳細画面からグループ変更できます</div>
                )}
              </div>
            )}

            {/* お気に入りパネル（お気に入りフィルタ選択時） */}
            {collectionFilter === 'fav' && (
              <div className="mt-2 rounded-xl p-2" style={{ background: 'rgba(255,61,127,0.15)', border: '1.5px solid rgba(255,61,127,0.4)' }}>
                <div className="text-white/60 text-[9px] font-bold">❤️ タップで石モン詳細 → 詳細画面からお気に入り変更できます</div>
              </div>
            )}
          </div>
        )}

        {/* ソートバー */}
        {collection.length > 0 && (
          <div className="flex gap-1 mb-3 bg-black/30 rounded-xl p-1" style={{ border: '1px solid rgba(255,255,255,0.15)' }}>
            {[
              { id: 'newest', label: '新しい順', icon: '🆕' },
              { id: 'rarity', label: 'レア度', icon: '⭐' },
              { id: 'strength', label: '強さ', icon: '💪' },
            ].map(s => (
              <button key={s.id} onClick={() => setCollectionSort(s.id)}
                className="flex-1 py-1.5 rounded-lg text-[11px] font-black active:scale-95 transition-transform"
                style={{
                  background: collectionSort === s.id ? 'linear-gradient(135deg, #FFD700, #FF6B35)' : 'transparent',
                  color: collectionSort === s.id ? 'white' : 'rgba(255,255,255,0.7)',
                  border: collectionSort === s.id ? '1px solid white' : '1px solid transparent',
                }}>
                {s.icon} {s.label}
              </button>
            ))}
          </div>
        )}

        {collection.length === 0 ? (
          <div className="text-center mt-12 text-white/70 font-bold"><div className="text-6xl mb-3">📷</div>まだ石モンがいません！</div>
        ) : sorted.length === 0 ? (
          <div className="text-center mt-8 text-white/60 font-bold">
            <div className="text-4xl mb-2">🔍</div>
            {collectionFilter === 'fav' ? 'お気に入りがまだいません' : 'このグループに石モンがいません'}
            <div className="text-[11px] mt-2 text-white/40">石モンの詳細画面から追加できます</div>
          </div>
        ) : (
          <div className="grid grid-cols-2 gap-2">
            {sorted.map((m) => {
              const t = TYPES[m.type] || TYPES['土'];
              const r = getRarityLabel(m.rarity);
              const monGroup = groups.find(g => g.id === m.groupId);
              return (
                <button key={m.id} onClick={() => setSelected(m)}
                  className="rounded-2xl overflow-hidden active:scale-95 transition-transform relative"
                  style={{ background: `linear-gradient(180deg, ${t.light}, ${t.bg})`, border: `2px solid ${r.color}`, boxShadow: `0 3px 0 ${t.dark}` }}>
                  <div className="relative">
                    {m.imageDataUrl ? (
                      <img src={m.imageDataUrl} className="w-full h-24 object-cover" />
                    ) : (
                      <div className="w-full h-24 flex items-center justify-center" style={{ background: `${t.dark}33` }}><span className="text-4xl">{t.emoji}</span></div>
                    )}
                    <div className="absolute top-1 left-1 bg-white/90 rounded-full px-1.5 py-0.5 text-[10px] font-black" style={{ color: r.color }}>{'★'.repeat(m.rarity)}</div>
                    <div className="absolute top-1 right-1 bg-black/60 rounded-full px-1.5 py-0.5 text-[10px] font-black text-yellow-300">Lv.{m.level || 1}</div>
                    {/* お気に入りバッジ */}
                    {m.isFav && (
                      <div className="absolute bottom-1 right-1 text-base leading-none">❤️</div>
                    )}
                    {/* グループカラーバッジ */}
                    {monGroup && (
                      <div className="absolute bottom-1 left-1 px-1.5 py-0.5 rounded-full text-[8px] font-black text-white leading-none"
                        style={{ background: monGroup.color }}>
                        {monGroup.name}
                      </div>
                    )}
                  </div>
                  <div className="p-1.5 bg-white/95">
                    <div className="font-black text-xs text-gray-800 truncate">{m.name}</div>
                    <div className="flex items-center justify-between mt-1 gap-1">
                      <span className="inline-flex items-center gap-0.5 rounded-full px-1.5 py-0.5 font-black text-[10px] text-white"
                        style={{ background: `linear-gradient(135deg, ${t.bg}, ${t.dark})`, border: '1.5px solid white', boxShadow: `0 1px 0 ${t.dark}`, textShadow: '0 1px 0 rgba(0,0,0,0.25)' }}>
                        <span className="text-sm leading-none">{t.emoji}</span>
                        <span className="leading-none">{t.name}</span>
                      </span>
                      {m.evolveTo && m.stage < 3 && <span className="text-[9px] font-black flex-shrink-0" style={{ color: '#FF6B35' }}>進化</span>}
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  const RankingView = () => (

  const SettingsView = () => {
    const importFileRef = useRef(null);
    const [importStatus, setImportStatus] = useState('');

    // 開いたらページ上部にスクロール
    useEffect(() => {
      window.scrollTo(0, 0);
    }, []);

    const handleExport = async () => {
      try {
        const exportData = {
          version: 1,
          exportedAt: new Date().toISOString(),
          appName: 'IshimonZukan',
          collection: collection,
          player: player,
          settings: settings,
        };
        const json = JSON.stringify(exportData, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const dateStr = new Date().toISOString().slice(0, 10);
        a.href = url;
        a.download = `ishimon-backup-${dateStr}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        setImportStatus('✅ データを書き出しました！大切に保管してね');
        setTimeout(() => setImportStatus(''), 4000);
      } catch (e) {
        console.error(e);
        setImportStatus('❌ 書き出しに失敗しました');
        setTimeout(() => setImportStatus(''), 4000);
      }
    };

    const handleImportFile = async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        if (!data || data.appName !== 'IshimonZukan' || !data.collection || !data.player) {
          setImportStatus('❌ 石モン図鑑のバックアップファイルではありません');
          setTimeout(() => setImportStatus(''), 4000);
          return;
        }
        const ok = window.confirm(
          '読み込むと、現在のデータはすべて上書きされます。\n本当に復元しますか？\n\n' +
          `バックアップ日時: ${data.exportedAt ? new Date(data.exportedAt).toLocaleString('ja-JP') : '不明'}\n` +
          `石モン: ${data.collection.length}体\n` +
          `プレイヤー: ${data.player.name || 'トレーナー'} (Lv.${data.player.level || 1})`
        );
        if (!ok) return;
        setCollection(data.collection);
        setPlayer(data.player);
        if (data.settings) setSettings(prev => ({ ...prev, ...data.settings }));
        await window.storage.set('ishimon-collection-v3', JSON.stringify(data.collection));
        await window.storage.set('ishimon-player-v3', JSON.stringify(data.player));
        if (data.settings) {
          await window.storage.set('ishimon-settings-v1', JSON.stringify({ ...settings, ...data.settings }));
        }
        setImportStatus('✅ データを復元しました！');
        setTimeout(() => setImportStatus(''), 4000);
      } catch (err) {
        console.error(err);
        setImportStatus('❌ ファイルを読み込めませんでした');
        setTimeout(() => setImportStatus(''), 4000);
      } finally {
        if (importFileRef.current) importFileRef.current.value = '';
      }
    };

    const handleReset = async () => {
      const ok1 = window.confirm('本当にすべてのデータを削除しますか？\nこの操作は取り消せません！');
      if (!ok1) return;
      const ok2 = window.confirm('最終確認：石モン・プレイヤー・設定すべてが消えます。よろしいですか？');
      if (!ok2) return;
      try {
        await window.storage.delete('ishimon-collection-v3');
        await window.storage.delete('ishimon-player-v3');
        await window.storage.delete('ishimon-settings-v1');
        await window.storage.delete('ishimon-image-cache-v1').catch(() => {});
        location.reload();
      } catch (e) {
        console.error(e);

              <Toggle on={settings.vibrationEnabled} onClick={() => updateSetting('vibrationEnabled', !settings.vibrationEnabled)} />
            </SettingRow>
            <SettingRow icon="✨" label="アニメーション軽減" desc="背景の動きを抑えて省電力に">
              <Toggle on={settings.animationReduced} onClick={() => updateSetting('animationReduced', !settings.animationReduced)} />

            <SettingRow icon="🎴" label="ガチャ確認ダイアログ" desc="ガチャを引く前に確認する">

        {/* プライバシー */}
        <div className="mb-4">
          <div className="text-yellow-300 text-xs font-black tracking-widest mb-2 px-1">🔒 プライバシー</div>

            <SettingRow icon="📍" label="GPSデータ" desc="石モンを撮影した場所を保存">
              <Toggle on={settings.showLocation} onClick={() => updateSetting('showLocation', !settings.showLocation)} />

        {/* データ管理 */}

                {/* 獲得済み称号 */}

                  const t = getTitleById(tid);
                  if (!t) return null;
                  const r = TITLE_RARITY[t.rarity] || TITLE_RARITY.common;
                  const active = player.activeTitle === t.id;
                  const isLast = idx === (player.titles || []).length - 1;
                  return (
                    <button key={t.id}
                      onClick={() => {
                        const updated = { ...player, activeTitle: t.id };
                        setPlayer(updated);
                        savePlayer(updated);
                      }}
                      className="w-full px-3 py-2.5 flex items-center gap-2.5 active:scale-[0.98] transition-all"
                      style={{
                        background: active ? `${r.color}1A` : 'transparent',
                        borderBottom: isLast ? 'none' : '1px solid rgba(255,255,255,0.08)',
                        boxShadow: active ? `inset 3px 0 0 ${r.color}` : 'none',

                      <div className="w-10 flex-shrink-0 flex flex-col items-center gap-0.5">
                        <div className="text-[8px] font-black leading-none" style={{ color: r.color }}>称号</div>
                        <div className="text-base font-black leading-none" style={{ color: r.color }}>Lv.{r.level}</div>
                      </div>
                      {/* テキスト + レア度バー */}
                      <div className="flex-1 min-w-0">
                        <div className="text-white font-black text-sm leading-tight truncate mb-1">{t.name}</div>
                        {/* レア度バー: 4セグメント、塗りつぶし済みは色あり */}
                        <div className="flex items-center gap-0.5 mb-0.5">
                          {[1,2,3,4].map(i => (
                            <div key={i}
                              className="h-1.5 rounded-sm"
                              style={{
                                flex: 1,
                                background: i <= r.level ? r.color : 'rgba(255,255,255,0.12)',
                                boxShadow: i <= r.level ? `0 0 4px ${r.color}88` : 'none',
                              }} />
                          ))}
                        </div>
                        <div className="text-white/50 text-[9px] font-bold truncate">{t.desc}</div>
                      </div>
                      {/* 選択チェック */}
                      {active ? (
                        <div className="w-4 h-4 rounded-full flex items-center justify-center flex-shrink-0"
                          style={{ background: r.color }}>
                          <span className="text-[8px] text-black font-black">✓</span>
                        </div>
                      ) : (
                        <div className="w-4 h-4 rounded-full flex-shrink-0"
                          style={{ border: `1.5px solid rgba(255,255,255,0.25)` }} />
                      )}
                    </button>
                  );
                })}
              </div>
              {/* フッター: 未獲得の数 */}
              {(player.titles || []).length < TITLES.length && (
                <div className="px-3 py-2 text-center text-white/40 text-[10px] font-bold"
                  style={{ borderTop: '1px solid rgba(255,255,255,0.1)' }}>

                </div>

            </div>

        </div>

        {/* アプリ更新 */}
        <div className="mb-4">
          <div className="text-yellow-300 text-xs font-black tracking-widest mb-2 px-1">🔄 アプリ更新</div>
          <button
            onClick={async () => {
              // リロード前にデータを確実に保存してから実行
              try {
                await savePlayer(player);
                await saveCollection(collection);
              } catch (e) { /* 保存失敗しても続行 */ }
              const url = new URL(window.location.href);
              url.searchParams.set('v', String(Date.now()));
              window.location.replace(url.toString());
            }}
            className="w-full p-3 rounded-2xl text-white active:scale-95 flex items-center gap-3"
            style={{ background: 'linear-gradient(135deg, #FFB347, #FF6B35)', boxShadow: '0 4px 0 #B85C00', border: '2px solid #FFD700' }}>
            <span className="text-2xl">🔄</span>
            <div className="flex-1 text-left">
              <div className="font-black text-sm">最新版に更新</div>
              <div className="text-[10px] font-bold opacity-90">キャッシュを無視して再読み込み</div>
            </div>
            <ChevronRight className="w-5 h-5" />
          </button>
        </div>

        {/* バージョン情報 */}
        <div className="text-center text-white/50 text-[10px] font-bold mt-6">
          石モン図鑑 v{APP_VERSION}
        </div>
      </div>
    );
  };

  // 下部固定タブバー
  // ===========================================
  const BottomTabBar = () => {
    const tabs = [
      { id: 'home', icon: '🏠', label: 'ホーム', view: 'home', badge: claimableMissions || undefined },
      { id: 'collection', icon: '📖', label: '図鑑', view: 'collection' },
      { id: 'battle', icon: '⚔️', label: 'バトル', view: 'stages' },
      { id: 'gacha', icon: '🎴', label: 'ガチャ', view: 'gacha', badge: player.gachaCards },
      { id: 'profile', icon: '👤', label: 'マイページ', view: 'profile' },
    ];

    const isActive = (tab) => {
      if (tab.id === 'home') return view === 'home';
      if (tab.id === 'collection') return view === 'collection';
      if (tab.id === 'battle') return view === 'stages' || view === 'battle';
      if (tab.id === 'gacha') return view === 'gacha';
      if (tab.id === 'profile') return view === 'profile';
      return false;
    };

    return (
      <div className="fixed bottom-0 left-0 right-0 z-[60]"
        style={{
          background: 'linear-gradient(180deg, rgba(20,5,40,0.85), rgba(20,5,40,0.98))',
          backdropFilter: 'blur(12px)',
          borderTop: '2px solid rgba(255,215,0,0.4)',
          paddingBottom: 'env(safe-area-inset-bottom, 0px)',

        <div className="flex items-stretch px-1 pt-2 pb-2">
          {tabs.map(tab => {
            const active = isActive(tab);

              <button key={tab.id}
                onClick={() => {
                  if (tab.action) tab.action();
                  else setView(tab.view);

                className="flex-1 flex flex-col items-center justify-center py-1 active:scale-90 transition-transform relative"
                style={{
                  background: active ? 'linear-gradient(180deg, rgba(255,215,0,0.25), rgba(255,107,53,0.25))' : 'transparent',
                  borderRadius: '14px',
                  margin: '0 2px',
                  border: active ? '2px solid rgba(255,215,0,0.5)' : '2px solid transparent',

                <div className="text-2xl leading-none mb-0.5" style={{ filter: active ? 'drop-shadow(0 0 8px rgba(255,215,0,0.8))' : 'none' }}>
                  {tab.icon}

                <div className={`text-[10px] font-black ${active ? 'text-yellow-300' : 'text-white/70'}`}>
                  {tab.label}

                {tab.badge !== undefined && tab.badge > 0 && (
                  <div className="absolute top-0 right-2 bg-red-500 text-white rounded-full text-[9px] font-black px-1.5 py-0.5 leading-none"
                    style={{ border: '1.5px solid white', minWidth: '18px', textAlign: 'center' }}>
                    {tab.badge > 99 ? '99+' : tab.badge}

                )}
              </button>
            );
          })}
        </div>
      </div>

      {view === 'ranking' && <RankingView />}
      {view === 'stages' && <StageSelectView />}
      {view === 'battle' && <BattleView />}
      {view === 'profile' && <ProfileView />}
      {view === 'settings' && <SettingsView />}
      {view === 'gacha' && <GachaModal />}

      {/* 下部固定タブメニュー（バトル中・カメラ中以外で表示） */}

        <BottomTabBar />

            <p className="text-white/80 text-sm font-bold">いしに カメラを むけてね！</p>
            <div className="flex items-center gap-8">
              <button onClick={stopCamera}
                className="bg-white/20 rounded-full p-4 active:bg-white/40 backdrop-blur-sm"
                style={{ border: '2px solid white' }}>
                <X className="w-7 h-7 text-white" strokeWidth={3} />

        <div className="fixed inset-0 z-[80] flex flex-col items-center justify-center" style={{ background: 'rgba(0,0,0,0.85)' }}>
          <div className="relative">
            <div className="absolute inset-0 rounded-full"
              style={{ background: 'conic-gradient(from 0deg, #C77DFF, #FFD700, #FF6B35, #C77DFF)', filter: 'blur(30px)', animation: 'spin 2s linear infinite' }} />

              style={{ border: '4px solid #FFD700', boxShadow: '0 0 60px rgba(199,125,255,0.8)' }}>

          <div className="mt-6 text-yellow-300 font-black text-xl" style={{ textShadow: '0 0 20px #FFAA00' }}>
            AIが 描いています...
          </div>
          <div className="text-white/70 text-xs font-bold mt-1">5〜15びょう くらい かかるよ</div>
          <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </div>
      )}

      {error && (
        <div className="fixed bottom-4 left-4 right-4 rounded-2xl p-3 text-white font-bold text-center z-[70]"
          style={{ background: '#C73E1D', border: '3px solid white', boxShadow: '0 4px 0 #6B1A0E' }}>
          {error}
          <button onClick={() => setError('')} className="ml-2 underline">とじる</button>
        </div>
      )}
    </div>
  );
}


ReactDOM.render(React.createElement(IshimonZukan), document.getElementById("root"));
</script>
</body>
</html>
