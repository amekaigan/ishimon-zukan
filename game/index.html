    return (
      <div className="fixed inset-0 z-[55] overflow-y-auto p-3" style={{ background: 'rgba(0,0,0,0.85)' }}>
        <div className="min-h-full flex items-start justify-center pt-6" style={{ paddingBottom: 'calc(80px + env(safe-area-inset-bottom, 0px))' }}>
          <div className="w-full max-w-sm rounded-3xl p-5 text-center"
            style={{ background: 'linear-gradient(180deg, #2a1a3a 0%, #1a0a05 100%)', border: `3px solid ${titleColor}`, boxShadow: `0 0 50px ${titleColor}80` }}>
            <div className="text-5xl mb-2">{isWin ? '🏆' : isDraw ? '🤝' : '💔'}</div>
            <div className="text-4xl font-black mb-3" style={{ color: titleColor, textShadow: `0 0 20px ${titleColor}` }}>{titleText}</div>
            <div className="bg-white/10 rounded-2xl p-3 mb-3" style={{ border: '1px solid rgba(255,255,255,0.2)' }}>

              <div className="text-white text-2xl font-black">+{result.expGained} EXP</div>
              <div className="text-white/80 text-[11px] font-bold mt-0.5">プレイヤーEXP +{result.playerExp}</div>
              {result.leveledUp && (
                <div className="mt-2 p-2 rounded-xl" style={{ background: 'linear-gradient(135deg, #FFD700, #FF6B35)' }}>
                  <div className="text-white font-black text-base flex items-center justify-center gap-1">
                    <ArrowUp className="w-4 h-4" /> レベルアップ！
                  </div>
                  <div className="text-white text-xs font-bold">Lv.{result.newLevel} になった！</div>

              <div className="rounded-2xl p-3 mb-3"

  // ===========================================

  const LongPressMenu = ({ mon, onClose, onShowDetail, onToggleFav, onDelete }) => {
    const t = TYPES[mon.type] || TYPES['土'];
    const r = getRarityLabel(mon.rarity);

      <div className="fixed inset-0 z-[80] flex items-end sm:items-center justify-center"

          style={{
            background: `linear-gradient(180deg, ${t.light} 0%, ${t.bg} 100%)`,
            border: `3px solid ${r.color}`,
            boxShadow: `0 0 40px ${r.glow}80`,
            animation: 'slideUp 0.25s ease-out',
          }}
          onClick={e => e.stopPropagation()}>

          <div className="flex items-center gap-3 p-4" style={{ borderBottom: '2px solid rgba(255,255,255,0.2)' }}>

              <img src={mon.imageDataUrl} className="w-16 h-16 rounded-xl object-cover" style={{ border: `2px solid ${r.color}` }} />

              <div className="w-16 h-16 rounded-xl flex items-center justify-center" style={{ background: `${t.dark}66`, border: `2px solid ${r.color}` }}>
                <span className="text-3xl">{t.emoji}</span>
              </div>
            )}
            <div className="flex-1 min-w-0">
              <div className="text-white font-black text-base truncate" style={{ textShadow: '0 2px 0 rgba(0,0,0,0.3)' }}>{mon.name}</div>
              <div className="text-white/80 text-xs font-bold">{'★'.repeat(mon.rarity)} / Lv.{mon.level || 1}</div>

                background: isFav ? 'rgba(255,61,127,0.3)' : 'rgba(0,0,0,0.4)',

              <span className="text-2xl">{isFav ? '❤️' : '🤍'}</span>
              <span className="text-white font-black text-sm flex-1 text-left">

              </span>

            <button onClick={onDelete}
              className="w-full flex items-center gap-3 px-4 py-3 rounded-xl active:scale-95"
              style={{ background: 'rgba(199,62,29,0.3)', border: '2px solid #C73E1D' }}>
              <span className="text-2xl">🗑️</span>
              <span className="text-white font-black text-sm flex-1 text-left">削除</span>
            </button>
          </div>
          {/* キャンセル */}
          <div className="p-3 pt-0">
            <button onClick={onClose}
              className="w-full py-2.5 rounded-xl text-white/70 font-black text-sm active:scale-95"
              style={{ background: 'rgba(255,255,255,0.08)', border: '1.5px solid rgba(255,255,255,0.15)' }}>
              キャンセル
            </button>
          </div>
        </div>
        <style>{`
          @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
          }
        `}</style>
      </div>
    );
  };

  // 機能追加(v2.10.0): 削除確認モーダル。
  //   2段階確認の2段目。削除ボタンは2秒間ロックされ、誤タップを防ぐ。
  const DeleteConfirmModal = ({ mon, onCancel, onConfirm }) => {
    const [lockSec, setLockSec] = useState(2);
    useEffect(() => {
      if (lockSec <= 0) return;
      const timer = setTimeout(() => setLockSec(s => s - 1), 1000);
      return () => clearTimeout(timer);
    }, [lockSec]);
    const locked = lockSec > 0;
    return (
      <div className="fixed inset-0 z-[90] flex items-center justify-center p-4"
        style={{ background: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(6px)' }}>
        <div className="w-full max-w-sm rounded-3xl p-5 text-center"
          style={{
            background: 'linear-gradient(180deg, #2a1a3a 0%, #1a0a05 100%)',
            border: '3px solid #C73E1D',
            boxShadow: '0 0 50px rgba(199,62,29,0.5)',
          }}>
          <div className="text-5xl mb-3">⚠️</div>
          <div className="text-white text-xl font-black mb-2">本当に 削除しますか？</div>
          <div className="text-yellow-300 text-lg font-black mb-1">{mon.name}</div>
          <div className="text-white/70 text-xs font-bold mb-4">
            {'★'.repeat(mon.rarity)} / Lv.{mon.level || 1}
          </div>
          <div className="rounded-2xl px-3 py-3 mb-4"
            style={{ background: 'rgba(199,62,29,0.15)', border: '1.5px solid rgba(199,62,29,0.5)' }}>
            <div className="text-red-300 text-xs font-black leading-relaxed">
              ⚠️ この石モンは ずかんから 消えます。<br />
              一度削除すると 元には もどせません。
            </div>
          </div>
          <div className="flex gap-2">
            <button onClick={onCancel}
              className="flex-1 py-3 rounded-2xl text-white font-black text-sm active:scale-95"
              style={{ background: 'rgba(255,255,255,0.15)', border: '2px solid rgba(255,255,255,0.3)' }}>
              やめる
            </button>
            <button onClick={onConfirm} disabled={locked}
              className="flex-1 py-3 rounded-2xl text-white font-black text-sm active:scale-95 disabled:active:scale-100"
              style={{
                background: locked
                  ? 'rgba(100,100,100,0.5)'
                  : 'linear-gradient(135deg, #C73E1D, #8B0000)',
                border: `2px solid ${locked ? 'rgba(150,150,150,0.5)' : '#FF6B6B'}`,
                opacity: locked ? 0.6 : 1,
              }}>
              {locked ? `削除 (${lockSec})` : '削除する'}
            </button>
          </div>
        </div>
      </div>
    );
  };

  // 機能追加(v2.11.0): 容量警告モーダル。
  //   ガチャ起動時に上限到達、または撮影時に上限到達したときに表示。
  //   「整理する」「容量を 拡張する」「あとで」の3択。
  const CapacityWarnModal = ({ data, onClose }) => {
    if (!data) return null;
    const cap = getMonCapacity();
    return (
      <div className="fixed inset-0 z-[90] flex items-center justify-center p-4"
        style={{ background: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(6px)' }}
        onClick={onClose}>
        <div className="w-full max-w-sm rounded-3xl p-5 text-center"
          style={{
            background: 'linear-gradient(180deg, #2a1a3a 0%, #1a0a05 100%)',
            border: '3px solid #FFAA00',
            boxShadow: '0 0 50px rgba(255,170,0,0.4)',
          }}
          onClick={e => e.stopPropagation()}>
          <div className="text-5xl mb-3">📦</div>
          <div className="text-yellow-300 text-xl font-black mb-2">ずかんが いっぱい！</div>
          <div className="text-white text-sm font-bold mb-4 whitespace-pre-line leading-relaxed">
            {data.message}
          </div>
          <div className="rounded-2xl px-3 py-2 mb-4"
            style={{ background: 'rgba(255,170,0,0.15)', border: '1.5px solid rgba(255,170,0,0.4)' }}>
            <div className="text-yellow-200 text-xs font-black">
              いまの 上限: {cap}体（{collection.length} / {cap}）
            </div>
          </div>
          <div className="space-y-2">
            <button onClick={() => { onClose(); setView('collection'); }}
              className="w-full py-3 rounded-2xl text-white font-black text-sm active:scale-95"
              style={{ background: 'linear-gradient(135deg, #9b6dff, #5f3dc4)', border: '2px solid #b794ff' }}>
              🗑️ 整理する（図鑑へ）
            </button>
            <button onClick={() => { onClose(); setShowCapacityExpand(true); }}
              className="w-full py-3 rounded-2xl text-white font-black text-sm active:scale-95"
              style={{ background: 'linear-gradient(135deg, #FFAA00, #FF6B00)', border: '2px solid #FFD700' }}>
              💎 容量を 拡張する
            </button>
            <button onClick={onClose}
              className="w-full py-2 rounded-xl text-white/70 font-bold text-xs active:scale-95"
              style={{ background: 'rgba(255,255,255,0.08)', border: '1px solid rgba(255,255,255,0.15)' }}>
              あとで
            </button>
          </div>
        </div>
      </div>
    );
  };

  // 機能追加(v2.11.0): 容量拡張モーダル。
  //   きらめき石30個で +10体。何回でも拡張できる（永続）。
  //   将来の課金導線もここに追加可能（「課金で拡張」ボタンを並べる）。
  const CapacityExpandModal = ({ onClose }) => {
    const cap = getMonCapacity();
    const cost = MON_CAPACITY_EXPANSION_COST;
    const unit = MON_CAPACITY_EXPANSION_UNIT;
    const gems = player.gems || 0;
    const canAfford = gems >= cost;
    const [expanding, setExpanding] = useState(false);
    // v2.11.5: justExpanded は親の state を参照（再マウント問題回避）
    const handleExpand = () => {
      if (!canAfford || expanding) return;
      setExpanding(true);
      const ok = expandCapacity();  // この中で setJustExpanded(true) も走る
      if (ok) {
        setTimeout(() => {
          setExpanding(false);
        }, 800);
      } else {
        setExpanding(false);
      }
    };
    return (
      <div className="fixed inset-0 z-[90] flex items-center justify-center p-4"
        style={{ background: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(6px)' }}
        onClick={onClose}>
        <div className="w-full max-w-sm rounded-3xl p-5 text-center relative overflow-hidden"
          style={{
            background: 'linear-gradient(180deg, #2a1a3a 0%, #1a0a05 100%)',
            border: '3px solid #FFD700',
            boxShadow: '0 0 50px rgba(255,215,0,0.4)',
          }}
          onClick={e => e.stopPropagation()}>

          {/* v2.11.4: 拡張成功時の祝福フラッシュ */}
          {justExpanded && (
            <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-10"
              style={{ animation: 'expandCelebrate 2.5s ease-out forwards' }}>
              <div className="px-6 py-4 rounded-2xl"
                style={{
                  background: 'linear-gradient(135deg, rgba(255,215,0,0.95), rgba(255,107,0,0.95))',
                  border: '3px solid #FFD700',
                  boxShadow: '0 0 40px rgba(255,215,0,0.9)',
                }}>
                <div className="text-4xl mb-1">✨</div>
                <div className="text-white text-xl font-black" style={{ textShadow: '0 2px 0 rgba(0,0,0,0.4)' }}>
                  +{unit}体 拡張！
                </div>
                <div className="text-white/90 text-xs font-black mt-1">
                  最大 {cap}体 になりました
                </div>
              </div>
            </div>
          )}

          <div className="text-5xl mb-2">💎</div>
          <div className="text-yellow-300 text-xl font-black mb-1">容量を ひろげよう</div>
          <div className="text-white/80 text-xs font-bold mb-4">
            きらめき石を つかって ずかんを 拡張できます
          </div>

          {/* 現在の状態 */}
          <div className="rounded-2xl p-3 mb-3"
            style={{
              background: 'rgba(0,0,0,0.4)',
              border: justExpanded ? '2px solid #FFD700' : '1.5px solid rgba(255,255,255,0.15)',
              transition: 'border 0.3s ease',
              boxShadow: justExpanded ? '0 0 20px rgba(255,215,0,0.5)' : 'none',
            }}>
            <div className="text-white/60 text-[10px] font-black mb-1">いまの じょうたい</div>
            <div className="text-white text-base font-black"
              style={{
                color: justExpanded ? '#FFD700' : 'white',
                transition: 'color 0.3s ease',
              }}>
              {collection.length} / {cap} 体
            </div>
            <div className="text-white/60 text-[10px] font-bold mt-1">
              拡張ずみ: {player.capacityExpansions || 0}回
            </div>
          </div>

          {/* 拡張オプション */}
          <div className="rounded-2xl p-3 mb-4"
            style={{
              background: 'linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,107,0,0.15))',
              border: '2px solid rgba(255,215,0,0.5)',
            }}>
            <div className="text-yellow-300 text-base font-black mb-1">+{unit}体 拡張</div>
            <div className="flex items-center justify-center gap-1.5 mb-2">
              <span className="text-2xl">💎</span>
              <span className="text-white font-black text-lg">{cost}</span>
              <span className="text-white/60 text-xs font-bold">きらめき石</span>
            </div>
            <div className="text-white/70 text-[11px] font-bold">
              拡張後: {cap + unit}体まで OK!
            </div>
          </div>

          {/* 所持きらめき石 */}
          <div className="text-white/70 text-xs font-bold mb-4"
            style={{
              color: justExpanded ? '#FFD700' : 'rgba(255,255,255,0.7)',
              transition: 'color 0.3s ease',
            }}>
            いま もってる: 💎 {gems}個
          </div>

          {/* ボタン */}
          <div className="space-y-2">
            <button onClick={handleExpand} disabled={!canAfford || expanding}
              className="w-full py-3 rounded-2xl text-white font-black text-sm active:scale-95 disabled:active:scale-100"
              style={{
                background: canAfford && !expanding
                  ? 'linear-gradient(135deg, #FFAA00, #FF6B00)'
                  : 'rgba(100,100,100,0.5)',
                border: `2px solid ${canAfford && !expanding ? '#FFD700' : 'rgba(150,150,150,0.5)'}`,
                opacity: canAfford && !expanding ? 1 : 0.6,
              }}>
              {expanding ? '拡張中...' : canAfford ? `💎${cost} つかって 拡張する` : 'きらめき石が たりません'}
            </button>
            <button onClick={onClose}
              className="w-full py-2 rounded-xl text-white/70 font-bold text-xs active:scale-95"
              style={{ background: 'rgba(255,255,255,0.08)', border: '1px solid rgba(255,255,255,0.15)' }}>
              閉じる
            </button>
          </div>

          {/* v2.11.4: 祝福フラッシュのアニメーション定義 */}
          <style>{`
            @keyframes expandCelebrate {
              0% { opacity: 0; transform: scale(0.5); }
              15% { opacity: 1; transform: scale(1.1); }
              25% { transform: scale(1); }
              80% { opacity: 1; transform: scale(1); }
              100% { opacity: 0; transform: scale(1); }
            }
          `}</style>
        </div>
      </div>
    );
  };

  // 機能追加(v2.12.0): 全石モンデータ分析ビュー（オーナー専用）
  //   生成された全石モンの「元写真・AI画像・名前・属性・レア・日時・場所・評価・プロンプト」を
  //   一覧表示する。テイスト改善サイクルとデータ分析の基盤。
  //   第1段階: 画面で見ることに特化。コピー/CSVは次回。
  const MonDataExplorer = ({ onClose }) => {
    // 新しい順
    const sorted = [...collection].sort((a, b) =>
      (b.capturedAt || '').localeCompare(a.capturedAt || '')
    );
    const stats = {
      total: collection.length,
      withAI: collection.filter(m => m.imageDataUrl && !m.needsImageRegen).length,
      withOrigPhoto: collection.filter(m => m.originalPhoto).length,
      withLocation: collection.filter(m => m.location).length,
      withPrompt: collection.filter(m => m.imagePrompt).length,
      thumbUp: collection.filter(m => m.taste === 'up').length,
      thumbDown: collection.filter(m => m.taste === 'down').length,
    };
    const formatDate = (iso) => {
      if (!iso) return '日時不明';
      try {
        const d = new Date(iso);
        return d.toLocaleString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
      } catch (_) { return iso; }
    };
    const formatLocation = (loc) => {
      if (!loc) return null;
      return loc.name || null;
    };

    return (
      <div className="fixed inset-0 z-[95] flex flex-col"
        style={{ background: 'linear-gradient(180deg, #1a1a2e 0%, #16213e 100%)' }}>
        {/* ヘッダー */}
        <div className="flex items-center justify-between px-4 py-3"
          style={{ background: 'rgba(0,0,0,0.5)', borderBottom: '1px solid rgba(255,255,255,0.1)' }}>
          <div>
            <div className="text-yellow-300 font-black text-lg">📊 全石モンデータ</div>
            <div className="text-white/60 text-[10px] font-bold">オーナー専用・分析用</div>
          </div>
          <button onClick={onClose}
            className="px-3 py-1.5 rounded-lg text-white font-black text-xs active:scale-95"
            style={{ background: 'rgba(255,255,255,0.15)', border: '1px solid rgba(255,255,255,0.3)' }}>
            ✕ 閉じる
          </button>
        </div>

        {/* 統計サマリ */}
        <div className="px-4 py-3 grid grid-cols-3 gap-2"
          style={{ background: 'rgba(0,0,0,0.3)', borderBottom: '1px solid rgba(255,255,255,0.1)' }}>
          <div className="text-center">
            <div className="text-yellow-300 font-black text-base">{stats.total}</div>
            <div className="text-white/60 text-[9px] font-bold">合計</div>
          </div>
          <div className="text-center">
            <div className="text-green-400 font-black text-base">{stats.withAI}</div>
            <div className="text-white/60 text-[9px] font-bold">AI画像あり</div>
          </div>
          <div className="text-center">
            <div className="text-blue-400 font-black text-base">{stats.withLocation}</div>
            <div className="text-white/60 text-[9px] font-bold">位置情報あり</div>
          </div>
          <div className="text-center">
            <div className="text-purple-400 font-black text-base">{stats.withPrompt}</div>
            <div className="text-white/60 text-[9px] font-bold">プロンプトあり</div>
          </div>
          <div className="text-center">
            <div className="text-green-300 font-black text-base">👍 {stats.thumbUp}</div>
            <div className="text-white/60 text-[9px] font-bold">高評価</div>
          </div>
          <div className="text-center">
            <div className="text-red-300 font-black text-base">👎 {stats.thumbDown}</div>
            <div className="text-white/60 text-[9px] font-bold">低評価</div>
          </div>
        </div>

        {/* リスト */}
        <div className="flex-1 overflow-y-auto px-3 py-3 space-y-3">
          {sorted.length === 0 ? (
            <div className="text-white/60 text-center py-12 font-bold">石モンがいません</div>
          ) : sorted.map((mon, idx) => {
            const t = TYPES[mon.type] || TYPES['土'];
            const r = getRarityLabel(mon.rarity);
            const tasteIcon = mon.taste === 'up' ? '👍' : mon.taste === 'down' ? '👎' : null;
            const tasteColor = mon.taste === 'up' ? '#52B788' : mon.taste === 'down' ? '#FF6B6B' : null;
            return (
              <div key={mon.id} className="rounded-2xl p-3"
                style={{
                  background: 'rgba(0,0,0,0.5)',
                  border: `2px solid ${r.color}40`,
                }}>
                {/* インデックス番号と評価バッジ */}
                <div className="flex items-center justify-between mb-2">
                  <span className="text-white/40 text-[10px] font-black">#{idx + 1}</span>
                  {tasteIcon && (
                    <span className="px-2 py-0.5 rounded-full text-[11px] font-black"
                      style={{
                        background: `${tasteColor}30`,
                        color: tasteColor,
                        border: `1px solid ${tasteColor}80`,
                      }}>
                      {tasteIcon} {mon.taste === 'up' ? '高評価' : '低評価'}
                    </span>
                  )}
                </div>

                {/* 画像セクション: 元写真 + AI画像 横並び */}
                <div className="grid grid-cols-2 gap-2 mb-3">
                  <div>
                    <div className="text-white/50 text-[9px] font-black mb-1">📷 元写真</div>
                    {mon.originalPhoto ? (
                      <img src={mon.originalPhoto}
                        className="w-full aspect-square object-cover rounded-lg"
                        style={{ border: '1px solid rgba(255,255,255,0.2)' }} />
                    ) : (
                      <div className="w-full aspect-square rounded-lg flex items-center justify-center"
                        style={{ background: 'rgba(0,0,0,0.4)', border: '1px solid rgba(255,255,255,0.1)' }}>
                        <span className="text-white/30 text-xs">なし</span>
                      </div>
                    )}
                  </div>
                  <div>
                    <div className="text-white/50 text-[9px] font-black mb-1">✨ AI画像</div>
                    {mon.imageDataUrl ? (
                      <img src={mon.imageDataUrl}
                        className="w-full aspect-square object-cover rounded-lg"
                        style={{ border: `1px solid ${r.color}80` }} />
                    ) : (
                      <div className="w-full aspect-square rounded-lg flex items-center justify-center"
                        style={{ background: 'rgba(0,0,0,0.4)', border: '1px solid rgba(255,255,255,0.1)' }}>
                        <span className="text-white/30 text-xs">なし</span>
                      </div>
                    )}
                  </div>
                </div>

                {/* メタ情報 */}
                <div className="space-y-1 text-[11px]">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="text-white font-black text-sm">{mon.name}</span>
                    <span className="px-1.5 py-0.5 rounded text-[10px] font-bold"
                      style={{ background: t.bg, color: 'white' }}>
                      {t.emoji} {mon.type}
                    </span>
                    <span className="text-yellow-300 font-black">{'★'.repeat(mon.rarity)}</span>
                    <span className="text-white/60 font-bold">だんかい{mon.stage}</span>
                    <span className="text-white/60 font-bold">Lv.{mon.level || 1}</span>
                  </div>
                  <div className="text-white/70 font-bold">
                    📅 {formatDate(mon.capturedAt)}
                  </div>
                  {mon.location ? (
                    <div className="text-white/70 font-bold">
                      📍 {formatLocation(mon.location)}
                    </div>
                  ) : (
                    <div className="text-white/30 font-bold">📍 位置情報なし</div>
                  )}
                  <div className="text-white/50 font-bold text-[10px]">
                    ID: {mon.id}
                  </div>
                  {mon.imageSeed && (
                    <div className="text-white/50 font-bold text-[10px]">
                      Seed: {mon.imageSeed}
                    </div>
                  )}
                </div>

                {/* プロンプト */}
                {mon.imagePrompt && (

  // カードID生成: ST02-FI3-XXXXXXXX 形式
  const generateCardId = (mon) => {
    // ブランド + 世代（メジャーバージョン2桁）
    const majorVer = parseInt(APP_VERSION.split('.')[0]) || 2;
    const seriesCode = `ST${String(majorVer).padStart(2, '0')}`;
    // タイプ2文字略号
    const typeShort = {
      '火': 'FI', '水': 'AQ', '土': 'ER', '電気': 'TH',
      '空': 'SK', 'ドラゴン': 'DR', '精霊': 'SP',
    };
    const typeCode = (typeShort[mon.type] || 'XX') + (mon.rarity || 1);
    // 個体ハッシュ8桁
    const idStr = mon.id || '';
    const tsMatch = idStr.match(/(\d{10,})/);
    const ts = tsMatch ? parseInt(tsMatch[1]) : Date.now();
    const randMatch = idStr.match(/-([a-z0-9]{2,6})$/i);
    const tsHash = ts.toString(36).toUpperCase();
    const randPart = randMatch ? randMatch[1].toUpperCase() : 'XX';
    const hash = (tsHash.slice(-6) + randPart.slice(-2)).padEnd(8, '0').slice(0, 8);
    return `${seriesCode}-${typeCode}-${hash}`;
  };

      (async () => {
        if (!window.drawShareCard) { setPreviewError(true); return; }
        try {
          const blob = await window.drawShareCard(buildCardData());
          if (cancelled) return;
          const url = URL.createObjectURL(blob);
          urlToRevoke = url;
          setPreviewBlob(blob);
          setPreviewUrl(url);
        } catch (e) { if (!cancelled) setPreviewError(true); }

      return () => { cancelled = true; if (urlToRevoke) setTimeout(() => URL.revokeObjectURL(urlToRevoke), 1000); };

  const StatBar = ({ label, cur, base, eqBoost, max, color }) => (

      <div className="text-sm font-black w-14 text-right" style={{ color }}>

  // ===========================================
  // ずかんとランキング
  // ===========================================
  // 図鑑画面
  // ===========================================
  const [collectionSort, setCollectionSort] = useState('newest');
  const [collectionFilter, setCollectionFilter] = useState('all'); // 'all'|'fav'|groupId

  // グループカラー（最大4色）
  const GROUP_COLORS = ['#FF6B35','#52B788','#C77DFF','#3DA5F5'];
  const GROUP_NAME_MAX = 6;

  const CollectionView = () => {
    const [showGroupEditor, setShowGroupEditor] = useState(false);
    const [groupNameInput, setGroupNameInput] = useState('');
    const [editingGroup, setEditingGroup] = useState(null); // グループ名変更用
    const [editingGroupName, setEditingGroupName] = useState('');
    // 機能追加(v2.11.1): 容量カーテンの開閉状態
    const [capacityCurtainOpen, setCapacityCurtainOpen] = useState(false);

    const groups = player.monGroups || [];

    // グループ追加
    const addGroup = () => {
      if (groups.length >= 4) return;
      const name = groupNameInput.trim().slice(0, GROUP_NAME_MAX) || `グループ${groups.length + 1}`;
      const id = `g_${Date.now()}`;
      const color = GROUP_COLORS[groups.length % GROUP_COLORS.length];
      const updated = { ...player, monGroups: [...groups, { id, name, color }] };
      setPlayer(updated);
      savePlayer(updated);
      setGroupNameInput('');
      setShowGroupEditor(false);
    };

    // グループ削除（グループフィルタ画面から）
    const deleteGroup = (gid) => {
      const updated = { ...player, monGroups: groups.filter(g => g.id !== gid) };
      setPlayer(updated);
      savePlayer(updated);
      const updatedCol = collection.map(m => m.groupId === gid ? { ...m, groupId: null } : m);

      saveCollection(updatedCol);

    // グループ名変更
    const renameGroup = (gid) => {
      const name = editingGroupName.trim().slice(0, GROUP_NAME_MAX);
      if (!name) return;
      const updated = { ...player, monGroups: groups.map(g => g.id === gid ? { ...g, name } : g) };
      setPlayer(updated);
      savePlayer(updated);
      setEditingGroup(null);
    };

    // 石モン お気に入りトグル（フィルタ画面内から）
    const toggleFavInList = (mon) => {
      const updated = collection.map(m => m.id === mon.id ? { ...m, isFav: !m.isFav } : m);
      setCollection(updated);
      saveCollection(updated);

    // 石モン グループ削除（グループ画面内から）
    const removeFromGroup = (mon, gid) => {

      setCollection(updated);
      saveCollection(updated);
    };

    const currentGroup = groups.find(g => g.id === collectionFilter);

    // フィルタ後ソート
    const filtered = collection.filter(m => {
      if (collectionFilter === 'fav') return m.isFav;
      if (collectionFilter !== 'all') return m.groupId === collectionFilter;
      return true;
    });
    const sorted = [...filtered].sort((a, b) => {
      if (collectionSort === 'newest') return (b.capturedAt || '').localeCompare(a.capturedAt || '');
      if (collectionSort === 'rarity')  return (b.rarity || 0) - (a.rarity || 0);
      if (collectionSort === 'strength') {
        const power = m => { const c = getCurrentStats(m); return c.hp + c.kogeki + c.bougyo + c.speed; };
        return power(b) - power(a);
      }
      return 0;
    });

    return (
      <div className="px-3 pt-4 pb-24" style={{ maxWidth: '1280px', margin: '0 auto' }}>

        {(() => {
          const cap = getMonCapacity();
          const count = collection.length;
          const remaining = cap - count;
          const percent = Math.min(100, (count / cap) * 100);

                      background: isFull ? '#C73E1D' : 'rgba(255,170,0,0.95)',
                      color: 'white',
                      border: `1.5px solid ${isFull ? '#FF6B6B' : '#FFD700'}`,
                      boxShadow: isFull ? '0 0 8px rgba(255,61,61,0.6)' : '0 0 6px rgba(255,170,0,0.4)',
                      textShadow: '0 1px 0 rgba(0,0,0,0.3)',

                    {isFull ? '⚠️ いっぱい!' : `⚠️ 残り ${remaining}体`}

                      <span className="text-[9px] text-white/50">{editingGroupName.length}/{GROUP_NAME_MAX}</span>
                      <button onClick={() => renameGroup(currentGroup.id)}

                    </div>

                {sorted.length > 0 && (
                  <div className="text-white/50 text-[9px] font-bold">タップで石モン詳細 → 詳細画面からグループ変更できます</div>
                )}
              </div>
            )}

            {/* お気に入りパネル（お気に入りフィルタ選択時） */}
            {collectionFilter === 'fav' && (
              <div className="mt-2 rounded-xl p-2" style={{ background: 'rgba(255,61,127,0.15)', border: '1.5px solid rgba(255,61,127,0.4)' }}>
                <div className="text-white/60 text-[9px] font-bold">❤️ タップで石モン詳細 → 詳細画面からお気に入り変更できます</div>
              </div>
            )}
          </div>
        )}

        {/* ソートバー */}
        {collection.length > 0 && (
          <div className="flex gap-1 mb-3 bg-black/30 rounded-xl p-1" style={{ border: '1px solid rgba(255,255,255,0.15)' }}>
            {[
              { id: 'newest', label: '新しい順', icon: '🆕' },
              { id: 'rarity', label: 'レア度', icon: '⭐' },
              { id: 'strength', label: '強さ', icon: '💪' },
            ].map(s => (
              <button key={s.id} onClick={() => setCollectionSort(s.id)}
                className="flex-1 py-1.5 rounded-lg text-[11px] font-black active:scale-95 transition-transform"
                style={{
                  background: collectionSort === s.id ? 'linear-gradient(135deg, #FFD700, #FF6B35)' : 'transparent',
                  color: collectionSort === s.id ? 'white' : 'rgba(255,255,255,0.7)',
                  border: collectionSort === s.id ? '1px solid white' : '1px solid transparent',

                {s.icon} {s.label}
              </button>
            ))}

        {collection.length === 0 ? (

            <div className="text-[11px] mt-2 text-white/40">石モンの詳細画面から追加できます</div>

        ) : (
          <div className="grid gap-2"
            style={{ gridTemplateColumns: 'repeat(auto-fill, minmax(160px, 1fr))', maxWidth: '1200px', margin: '0 auto' }}>
            {sorted.map((m) => {

                  <div className="relative">

  const RankingView = () => (

  // ===========================================

  const ProfileView = () => {
    const expRatio = (player.exp || 0) / playerExpForNextLevel(player.level || 1);
    const NAME_MAX = 8;
    const [nameCount, setNameCount] = useState((player.name || '').length);

    const saveName = () => {
      const value = nameInputRef.current?.value || '';
      const trimmed = value.trim().slice(0, NAME_MAX);
      if (!trimmed) { setEditingName(false); return; }
      const updated = { ...player, name: trimmed };
      setPlayer(updated);
      savePlayer(updated);
      setEditingName(false);
    };

    return (
      <div className="px-4 pt-6 pb-32">
        <h2 className="text-3xl font-black text-white text-center mb-4"
          style={{ textShadow: '0 4px 0 rgba(0,0,0,0.3)' }}>
          マイページ
        </h2>

        {/* ===== プロフィールカード ===== */}
        <div className="rounded-3xl p-4 mb-4"
          style={{ background: 'linear-gradient(180deg, rgba(25,118,210,0.6), rgba(13,71,161,0.6))', border: '4px solid #FFD700' }}>

          {/* 上段: アバター + 名前・Lv・称号 */}
          <div className="flex items-center gap-3 mb-3">
            {/* アバター（タップで写真変更） */}
            <div className="relative flex-shrink-0">
              <label htmlFor="avatar-upload" className="cursor-pointer block active:scale-95 transition-transform">
                {player.avatarPhoto ? (
                  <img src={player.avatarPhoto}
                    className="w-16 h-16 rounded-2xl object-cover"
                    style={{ border: '3px solid #FFD700', boxShadow: '0 0 12px rgba(255,215,0,0.5)' }} />
                ) : (
                  <div className="w-16 h-16 rounded-2xl flex items-center justify-center"
                    style={{ background: 'linear-gradient(135deg, #FFD700, #FF6B35)', border: '3px solid #FFD700', boxShadow: '0 0 12px rgba(255,215,0,0.4)' }}>
                    <User className="w-8 h-8 text-yellow-900" strokeWidth={3} />
                  </div>
                )}
                <div className="absolute -bottom-1 -right-1 w-5 h-5 rounded-full flex items-center justify-center"
                  style={{ background: '#FFD700', border: '2px solid #1a3a7c', fontSize: '10px' }}>
                  📷
                </div>
              </label>
              <input id="avatar-upload" type="file" accept="image/*" className="hidden"
                onChange={e => {
                  const f = e.target.files?.[0];
                  if (!f) return;
                  const reader = new FileReader();
                  reader.onload = ev => {
                    const dataUrl = ev.target.result;
                    // 圧縮: canvas で 128x128 にリサイズ
                    const img = new Image();
                    img.onload = () => {
                      const canvas = document.createElement('canvas');
                      canvas.width = 128; canvas.height = 128;
                      const ctx2 = canvas.getContext('2d');
                      const size = Math.min(img.width, img.height);
                      const ox = (img.width - size) / 2;
                      const oy = (img.height - size) / 2;
                      ctx2.drawImage(img, ox, oy, size, size, 0, 0, 128, 128);

    const [testBusy, setTestBusy] = useState(false);
    const runTypeTest = async () => {
      if (testBusy) return;
      setTestBusy(true);
      try {
        const tname = (TYPES[testType] && TYPES[testType].name) || testType;
        const testMon = {
          id: `test-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`,
          name: `テスト ${tname} ★${testRarity}`,

          rarity: testRarity,
          stage: testStage,

          level: 1,
          description: `(テスト生成) ${testType}タイプ / ★${testRarity} / ${testStage}段階`,
          createdAt: Date.now(),
          isTest: true,

        // 毎回ランダムseedなので、同じ設定でも違う絵柄が出る(=繰り返しテスト向き)。
        const prompt = buildMonPrompt(testMon);
        const image = await generateAiImage(prompt, Math.floor(Math.random() * 1000000));
        if (image) testMon.imageDataUrl = image;
        const next = [testMon, ...collection];

        await saveCollection(next);

      } catch (e) {
        console.error('テスト生成失敗:', e);
        alert('生成に失敗しました: ' + (e.message || e));
      } finally {
        setTestBusy(false);
      }

    // v2.25.0: 石モンを1体「追加(マージ)」で取り込む。既存データは消さない。
    const handleImportMon = async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        const m = (data && data.kind === 'mon') ? data.mon : null;
        if (!data || data.appName !== 'IshimonZukan' || !m || !m.name) {
          setImportStatus('❌ 石モン(1体)の書き出しファイルではありません');
          setTimeout(() => setImportStatus(''), 4000);
          return;

        const ok = window.confirm(
          `「${m.name}」を図鑑に追加します。\n今あるデータは消えません(追加のみ)。\n\nよろしいですか？`

        // 新しいIDを振ってID衝突を防ぐ(同じ子を何度取り込んでもOK)
        const imported = {
          ...m,
          id: `import-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`,
          importedAt: Date.now(),
        };
        delete imported.imagePending;
        const next = [...collection, imported];
        setCollection(next);
        await window.storage.set('ishimon-collection-v3', JSON.stringify(next));
        setImportStatus(`✅ 「${m.name}」を図鑑に追加しました！`);
        setTimeout(() => setImportStatus(''), 4000);
        window.ga4?.event?.('mon_imported', { mon_name: m.name, rarity: m.rarity });
      } catch (err) {
        console.error(err);
        setImportStatus('❌ ファイルを読み込めませんでした');
        setTimeout(() => setImportStatus(''), 4000);

        if (importMonRef.current) importMonRef.current.value = '';

    // 開いたらページ上部にスクロール — トグル切替でジャンプする副作用があるため無効化 (2026-05-25)
    // useEffect(() => {
    //   window.scrollTo(0, 0);
    // }, []);

    const handleExport = async () => {
      try {
        const exportData = {
          version: 1,
          exportedAt: new Date().toISOString(),
          appName: 'IshimonZukan',
          collection: collection,
          player: player,
          settings: settings,
        };
        const json = JSON.stringify(exportData, null, 2);
        const blob = new Blob([json], { type: 'application/json' });

        const a = document.createElement('a');
        const dateStr = new Date().toISOString().slice(0, 10);
        a.href = url;
        a.download = `ishimon-backup-${dateStr}.json`;

              const overlay = document.createElement('div');
              overlay.id = 'update-overlay';

                <div style="margin-top:20px;font-size:18px;letter-spacing:0.1em;">最新版に更新中...</div>

                <style>

                  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
                </style>
              `;
              document.body.appendChild(overlay);
              
              // 描画を確実に反映させる(同期処理に挟まれないよう少し待つ)
              await new Promise(r => setTimeout(r, 50));
              
              try {
                // 1. データ保存(ハング防止: 最大3秒で打ち切り。localStorageは即時、Firestoreは間に合わなければ次回に委ねる)

                  new Promise(r => setTimeout(r, 3000)),

              try {
                // 2. Service Worker があれば登録解除
                if ('serviceWorker' in navigator) {
                  const regs = await navigator.serviceWorker.getRegistrations();
                  await Promise.all(regs.map(r => r.unregister()));
                }
              } catch (e) { /* 失敗しても続行 */ }
              
              try {
                // 3. Cache Storage を全削除
                if ('caches' in window) {
                  const keys = await caches.keys();
                  await Promise.all(keys.map(k => caches.delete(k)));
                }
              } catch (e) { /* 失敗しても続行 */ }
              
              // 4. クエリパラメータを更新してリロード
              const url = new URL(window.location.href);
              url.searchParams.set('v', String(Date.now()));
              url.searchParams.set('cb', Math.random().toString(36).slice(2, 8));
              
              // 5. リロード（オーバーレイ表示のまま遷移）
              window.location.href = url.toString();
            }}

              </>
            ) : (
              <div className="mt-3 w-full py-3 rounded-2xl text-center text-white/70 font-black text-sm"
                style={{ background: 'rgba(255,255,255,0.08)', border: '1px dashed rgba(255,255,255,0.25)' }}>
                石モンが 生まれるのを 待っています...
              </div>
            )}
          </div>
        </div>
      )}
      {showEvolveAnim && <EvolveAnimView mon={showEvolveAnim} />}

      {/* 機能追加(v2.9.0): 起動時の初期ロード画面（最前面） */}
      {(initialLoading || !dataReady) && <InitialLoadingView />}

      {/* 機能追加(v2.10.0): 長押しメニュー */}
      {longPressMon && (
        <LongPressMenu
          mon={longPressMon}
          onClose={() => setLongPressMon(null)}
          onShowDetail={() => { setSelected(longPressMon); setLongPressMon(null); }}
          onToggleFav={() => toggleFavoriteMon(longPressMon)}
          onDelete={() => { setDeleteConfirmMon(longPressMon); setLongPressMon(null); }}
        />
      )}

      {/* 機能追加(v2.10.0): 削除確認モーダル */}
      {deleteConfirmMon && (
        <DeleteConfirmModal
          mon={deleteConfirmMon}
          onCancel={() => setDeleteConfirmMon(null)}
          onConfirm={() => deleteMon(deleteConfirmMon)}
        />
      )}

      {/* 機能追加(v2.11.0): 容量警告モーダル */}
      {showCapacityWarn && (
        <CapacityWarnModal
          data={showCapacityWarn}
          onClose={() => setShowCapacityWarn(null)}
        />
      )}

      {/* 機能追加(v2.11.0): 容量拡張モーダル */}
      {showCapacityExpand && (
        <CapacityExpandModal
          onClose={() => setShowCapacityExpand(false)}
        />
      )}

      {/* 機能追加(v2.12.0): 全石モンデータ分析ビュー（オーナー専用） */}
      {showMonDataExplorer && isOwner && (
        <MonDataExplorer onClose={() => setShowMonDataExplorer(false)} />
      )}

      {/* カメラビュー */}
      {showCamera && (
        <div className="fixed inset-0 z-50 flex flex-col bg-black">
          <video
            ref={videoRef}
            autoPlay
            playsInline
            muted
            className="flex-1 w-full object-cover"
            style={{ background: '#000' }}
          />
          <canvas ref={canvasRef} className="hidden" />
          <div className="absolute bottom-0 left-0 right-0 pb-12 pt-6 flex flex-col items-center gap-4"
            style={{ background: 'linear-gradient(transparent, rgba(0,0,0,0.8))' }}>
            <p className="text-white/80 text-sm font-bold">いしに カメラを むけてね！</p>
            {/* v2.18.2: 子ども向け 石を持ち帰らない案内(ふりがな付き) */}
            <div className="ishi-note px-4 py-2 rounded-2xl text-center leading-loose"
              style={{ background: 'rgba(0,0,0,0.45)', border: '1.5px solid rgba(255,215,0,0.6)', maxWidth: '20rem' }}>
              <span className="text-yellow-100 text-[13px] font-black">
                🪨 <ruby>石<rt>いし</rt></ruby>は<ruby>元<rt>もと</rt></ruby>の<ruby>場所<rt>ばしょ</rt></ruby>に<ruby>戻<rt>もど</rt></ruby>してね！<br/>
                <ruby>思<rt>おも</rt></ruby>い<ruby>出<rt>で</rt></ruby>だけ <ruby>石<rt>いし</rt></ruby>モンと<ruby>持<rt>も</rt></ruby>ち<ruby>帰<rt>かえ</rt></ruby>ろう！
              </span>
              <style>{`.ishi-note rt { font-size: 0.62em; font-weight: 700; opacity: 0.95; }`}</style>
            </div>
            <div className="flex items-center gap-8">
              <button onClick={stopCamera}
                className="bg-white/20 rounded-full p-4 active:bg-white/40 backdrop-blur-sm"
                style={{ border: '2px solid white' }}>
                <X className="w-7 h-7 text-white" strokeWidth={3} />
              </button>
              <button onClick={capturePhoto}
                className="active:scale-90 transition-transform"
                style={{
                  width: 80, height: 80, borderRadius: '50%',
                  background: 'white',
                  border: '5px solid rgba(255,255,255,0.5)',
                  boxShadow: '0 0 0 4px rgba(255,255,255,0.3)',
                }}>
                <Camera className="w-8 h-8 text-gray-800 mx-auto" strokeWidth={2.5} />
              </button>
              <button onClick={() => { stopCamera(); fileRef.current?.click(); }}
                className="bg-white/20 rounded-full p-4 active:bg-white/40 backdrop-blur-sm"
                style={{ border: '2px solid white' }}>
                <BookOpen className="w-7 h-7 text-white" strokeWidth={2.5} />
              </button>
            </div>
            <p className="text-white/50 text-xs">× とじる　　📸 さつえい　　📁 えらぶ</p>
          </div>
        </div>
      )}

      <LoginBonusModal />
      <MissionsModal />
      <ShopModal />
      <InventoryModal />
      <ProfileModal />
      <EquipModal />
      <ConsentModal />
      <OnboardingModal />
      <NewTitleAlert />

      {/* AI画像生成中のローディング */}
      {aiGenerating && (
        <div className="fixed inset-0 z-[80] flex flex-col items-center justify-center" style={{ background: 'rgba(0,0,0,0.85)' }}>
          <div className="relative">
            <div className="absolute inset-0 rounded-full"
              style={{ background: 'conic-gradient(from 0deg, #C77DFF, #FFD700, #FF6B35, #C77DFF)', filter: 'blur(30px)', animation: 'spin 2s linear infinite' }} />
            <div className="relative w-32 h-32 rounded-full bg-purple-900 flex items-center justify-center"
              style={{ border: '4px solid #FFD700', boxShadow: '0 0 60px rgba(199,125,255,0.8)' }}>
              <Wand2 className="w-12 h-12 text-yellow-300 animate-pulse" />
            </div>
          </div>
          <div className="mt-6 text-yellow-300 font-black text-xl" style={{ textShadow: '0 0 20px #FFAA00' }}>
            AIが 描いています...
          </div>
          <div className="text-white/70 text-xs font-bold mt-1">5〜90びょう かかることがあります</div>
          <button onClick={() => setAiGenerating(false)}
            className="mt-6 px-6 py-2 rounded-full text-white/80 font-black text-sm active:scale-95"
            style={{ background: 'rgba(255,255,255,0.15)', border: '2px solid rgba(255,255,255,0.3)' }}>
            スキップ（後で再生成できます）
          </button>
          <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </div>
      )}

      {error && (
        <div className="fixed bottom-4 left-4 right-4 rounded-2xl p-3 text-white font-bold text-center z-[70]"
          style={{ background: '#C73E1D', border: '3px solid white', boxShadow: '0 4px 0 #6B1A0E' }}>
          {error}
          <button onClick={() => setError('')} className="ml-2 underline">とじる</button>
        </div>
      )}
    </div>
  );
}


ReactDOM.render(React.createElement(IshimonZukan), document.getElementById("root"));
</script>
</body>
<script>
// Service Worker登録（PWA対応）
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/game/sw.js')
      .then(reg => console.log('[SW] 登録完了:', reg.scope))
      .catch(err => console.log('[SW] 登録失敗:', err));
  });
}
</script>
</html>
