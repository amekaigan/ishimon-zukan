<!-- window.storage: Firestore対応版（ログイン前はlocalStorage、ログイン後はFirestore） -->
<script>
// ユーザーのUID（ログイン後に設定される）
window._currentUid = null;

// Firestoreのパス: users/{uid}/data/{key}
const _fsDocRef = (key) => {
  const { db, doc } = window._firebase || {};
  if (!db || !window._currentUid) return null;
  return doc(db, 'users', window._currentUid, 'data', key.replace(/[\/\.]/g, '_'));
};

window.storage = {
  async get(key) {
    try {
      // Firestore優先
      const ref = _fsDocRef(key);
      if (ref) {
        const { getDoc } = window._firebase;
        const snap = await getDoc(ref);
        if (snap.exists()) {
          const v = snap.data().value;
          // ローカルにもキャッシュ
          try { localStorage.setItem(key, v); } catch (_) {}
          return { key, value: v, shared: false };
        }
      }
      // fallback: localStorage
      const v = localStorage.getItem(key);
      if (v === null) return null;
      return { key, value: v, shared: false };
    } catch (e) { 
      // エラー時はlocalStorageから
      try {
        const v = localStorage.getItem(key);
        return v !== null ? { key, value: v, shared: false } : null;
      } catch (_) { return null; }
    }
  },
  async set(key, value, shared) {
    try {
      // 常にlocalStorageにも保存（オフライン対応）
      try { localStorage.setItem(key, value); } catch (_) {}
      // Firestoreにも保存（ログイン中のみ）
      const ref = _fsDocRef(key);
      if (ref) {
        const { setDoc } = window._firebase;
        await setDoc(ref, { value, updatedAt: Date.now() });
      }
      return { key, value, shared: !!shared };
    } catch (e) {
      try { localStorage.setItem(key, value); } catch (_) {}
      return { key, value, shared: !!shared };
    }
  },
  async delete(key) {
    try {
      localStorage.removeItem(key);
      const ref = _fsDocRef(key);
      if (ref) {
        const { deleteDoc } = window._firebase;
        await deleteDoc(ref);
      }
      return { key, deleted: true };
    } catch (e) { return null; }
  },
  async list(prefix) {
    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!prefix || k.startsWith(prefix)) keys.push(k);
      }
      return { keys, prefix };
    } catch (e) { return null; }
  },
  // ログイン後: localStorageのデータをFirestoreに一括移行
  async migrateToFirestore() {
    if (!window._currentUid || !window._firebase) return;
    const keys = ['ishimon-player-v3', 'ishimon-collection-v3', 'ishimon-settings-v1'];
    for (const key of keys) {
      try {
        const v = localStorage.getItem(key);
        if (v) {
          const { setDoc, doc } = window._firebase;
          const { db } = window._firebase;
          const ref = doc(db, 'users', window._currentUid, 'data', key.replace(/[\/\.]/g, '_'));
          await setDoc(ref, { value: v, updatedAt: Date.now() });
        }
      } catch (_) {}
    }
  },
  // ログイン後: Firestoreからlocalに復元
  async restoreFromFirestore() {
    if (!window._currentUid || !window._firebase) return false;
    const keys = ['ishimon-player-v3', 'ishimon-collection-v3', 'ishimon-settings-v1'];
    let restored = false;
    for (const key of keys) {
      try {
        const { getDoc, doc } = window._firebase;
        const { db } = window._firebase;
        const ref = doc(db, 'users', window._currentUid, 'data', key.replace(/[\/\.]/g, '_'));
        const snap = await getDoc(ref);
        if (snap.exists()) {
          localStorage.setItem(key, snap.data().value);
          restored = true;
        }
      } catch (_) {}
    }
    return restored;
  }
};
</script>

// APIキー不要・認証不要・URLベース直接アクセス
// Anonymous Tier: 15秒に1回まで、ウォーターマーク有り

// AI画像生成URL構築（fetch不要、imgタグに直接渡せる）
const buildImageUrl = (prompt, seed) => {
  const params = new URLSearchParams({
    width: '512',
    height: '512',
    seed: String(seed || Math.floor(Math.random() * 1000000)),
    nologo: 'true',
    model: 'flux',
  });
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?${params.toString()}`;
};

// ===== GPS位置情報の取得 =====
// ユーザーの現在地を取得し、可能なら逆ジオコーディングで地名を返す
const getCurrentLocation = async () => {
  if (!navigator.geolocation) return null;
  return new Promise((resolve) => {
    const timeout = setTimeout(() => resolve(null), 8000);
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        clearTimeout(timeout);
        const { latitude, longitude } = pos.coords;
        const result = { lat: latitude, lng: longitude, name: null };
        // 逆ジオコーディング (OpenStreetMap Nominatim、無料・APIキー不要)
        try {
          const r = await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&accept-language=ja&zoom=14`,
            { headers: { 'User-Agent': 'IshimonZukan/1.0' } }
          );
          if (r.ok) {
            const data = await r.json();
            const a = data.address || {};
            // 「市区町村」「都道府県」レベルで取得（プライバシー配慮）
            const parts = [a.city || a.town || a.village || a.suburb, a.state || a.prefecture].filter(Boolean);
            result.name = parts.join('・') || data.display_name?.split(',').slice(0, 2).join(',') || null;
          }
        } catch (e) { /* オフラインや拒否時は名前なしで進む */ }
        resolve(result);
      },
      () => { clearTimeout(timeout); resolve(null); },
      { timeout: 6000, maximumAge: 60000, enableHighAccuracy: false }
    );
  });
};

// AI画像をfetchしてbase64で返す（キャッシュ用）
const generateAiImageRaw = async (prompt, seed) => {
  const url = buildImageUrl(prompt, seed);
  try {
    const res = await fetch(url);
    if (!res.ok) {
      const err = new Error(`API ${res.status}`);
      err.status = res.status;
      throw err;
    }
    const blob = await res.blob();
    return await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  } catch (e) {
    console.error('AI generation failed:', e);
    throw e;
  }
};

// ===== レートリミッター付きキュー =====
// Pollinations Anonymous Tier: 15秒に1回まで
// 429エラーが出るとしばらくブロックされるので、確実に間隔を守る
const RATE_LIMIT_MS = 16000; // 16秒（余裕を持って）
let _lastRequestAt = 0;
let _consecutiveFailures = 0; // 連続失敗回数（429時に増加）
const _aiQueue = [];
let _processingQueue = false;

// キューを順次処理する内部関数
const processAiQueue = async () => {
  if (_processingQueue) return;
  _processingQueue = true;
  while (_aiQueue.length > 0) {
    const job = _aiQueue.shift();
    // 前回からの経過を確認
    const elapsed = Date.now() - _lastRequestAt;
    let wait = Math.max(0, RATE_LIMIT_MS - elapsed);
    // 連続失敗があれば追加待機
    if (_consecutiveFailures > 0) {
      wait += _consecutiveFailures * 30000; // 失敗ごとに+30秒
    }
    if (wait > 0) {
      await new Promise(r => setTimeout(r, wait));
    }
    _lastRequestAt = Date.now();
    try {
      const result = await generateAiImageRaw(job.prompt, job.seed);
      _consecutiveFailures = 0; // 成功でリセット
      job.resolve(result);
    } catch (e) {
      if (e.status === 429) {
        _consecutiveFailures = Math.min(_consecutiveFailures + 1, 5);
        console.warn(`Rate limited. Backoff: ${_consecutiveFailures * 30}s`);
      }
      job.resolve(null); // エラーでもnullで返してアプリは継続
    }
  }
  _processingQueue = false;
};

// 公開関数: キュー経由で生成
const generateAiImage = (prompt, seed) => {
  return new Promise((resolve) => {
    _aiQueue.push({ prompt, seed, resolve });
    processAiQueue();
  });
};

// 同じ条件のキャラ（タイプ・レア度・進化段階・名前）の画像を使い回す
const getMonCacheKey = (mon) => `aiimg:${mon.type}_${mon.rarity}_${mon.stage}_${mon.name}`;

const loadCachedImage = async (mon) => {
  try {
    const key = getMonCacheKey(mon);
    const r = await window.storage.get(key);
    return r?.value || null;
  } catch (e) { return null; }
};

const saveCachedImage = async (mon, base64) => {
  try {
    const key = getMonCacheKey(mon);
    await window.storage.set(key, base64);
  } catch (e) { console.error('cache save failed:', e); }
};

// キャッシュ優先で画像取得・なければAI生成
// 戻り値: { image, fromCache, seed, prompt }
const getOrGenerateMonImage = async (mon, seed) => {
  // キャッシュチェック
  const cached = await loadCachedImage(mon);
  if (cached) return { image: cached, fromCache: true, seed: null, prompt: null };
  // AI生成
  const usedSeed = seed || Math.floor(Math.random() * 1000000);
  const prompt = buildMonPrompt(mon);
  const generated = await generateAiImage(prompt, usedSeed);
  if (generated) {
    await saveCachedImage(mon, generated);
    return { image: generated, fromCache: false, seed: usedSeed, prompt };
  }
  return { image: null, fromCache: false, seed: usedSeed, prompt };
};

// 画像解析失敗時のフォールバック（色からランダム生成）
const analyzeImageColor = async (imageDataUrl) => {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = 32; canvas.height = 32;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, 32, 32);
      const data = ctx.getImageData(0, 0, 32, 32).data;
      let r = 0, g = 0, b = 0, count = 0;
      for (let i = 0; i < data.length; i += 4) {
        r += data[i]; g += data[i+1]; b += data[i+2]; count++;
      }
      r = Math.floor(r / count); g = Math.floor(g / count); b = Math.floor(b / count);
      resolve({ r, g, b });
    };
    img.onerror = () => resolve({ r: 128, g: 128, b: 128 });
    img.src = imageDataUrl;
  });
};

// 色からタイプを推測
// 色からタイプを推測（ベース）+ 運要素を加える
const guessTypeFromColor = ({ r, g, b }) => {
  // 30%の確率で完全ランダム選択（全7タイプ均等チャンス）
  if (Math.random() < 0.30) {
    const allTypes = ['火', '水', '土', '電気', '空', 'ドラゴン', '精霊'];
    return allTypes[Math.floor(Math.random() * allTypes.length)];
  }

  // 5%の確率でレアタイプ（ドラゴンor精霊）出現
  if (Math.random() < 0.05) {
    return Math.random() < 0.5 ? 'ドラゴン' : '精霊';
  }

  // それ以外は色ベースで判定（条件を緩めに）
  // 各色チャンネルの相対値で判定
  const max = Math.max(r, g, b);
  const min = Math.min(r, g, b);
  const brightness = (r + g + b) / 3;
  const saturation = max - min;

  // 鮮やかな色はそのタイプに（彩度高めの場合）
  if (saturation > 50) {
    if (r === max && r > g + 20 && r > b + 20) return '火'; // 赤系
    if (b === max && b > r + 20 && b > g + 20) return '水'; // 青系
    if (r > 150 && g > 150 && b < g - 20) return '電気'; // 黄系
    if (b === max && g > 100 && Math.abs(r - g) < 30) return '空'; // 水色系
    if (r > 100 && b > 100 && g < r - 20 && g < b - 20) return 'ドラゴン'; // 紫系
    if (r > 180 && g < r - 30 && b > 150) return '精霊'; // ピンク系
  }

  // 暗い・グレー系の判定: 明るさで分ける
  if (brightness < 80) return Math.random() < 0.5 ? 'ドラゴン' : '土'; // 暗い石はドラゴンの可能性
  if (brightness > 200 && saturation < 30) return Math.random() < 0.5 ? '精霊' : '空'; // 白い石は精霊の可能性

  // 茶系・グレー系のデフォルト → 土に運要素混ぜる
  // 60%土、残り40%はランダム他タイプ
  if (Math.random() < 0.6) return '土';
  const otherTypes = ['火', '水', '電気', '空', 'ドラゴン', '精霊'];
  return otherTypes[Math.floor(Math.random() * otherTypes.length)];
};

  return newly;
};

// ===== 難易度別レアリティ補正 =====
// かんたん: レアが出やすい / むずかしい: レアが出にくい
// gachaRoll/撮影 共通で使用。値は ★1〜★5 の累積確率（昇順）。
// 希少性を高めるため★4★5を絞っている
const GACHA_RARITY_TABLE = {
  easy:   { r5: 0.025, r4: 0.10, r3: 0.30, r2: 0.65 }, // 残り0.35が★1
  normal: { r5: 0.012, r4: 0.06, r3: 0.20, r2: 0.52 }, // 残り0.48が★1
  hard:   { r5: 0.006, r4: 0.035, r3: 0.13, r2: 0.42 }, // 残り0.58が★1
};

const rollRarityByDifficulty = (difficulty = 'normal', guaranteeRare = false) => {
  const t = GACHA_RARITY_TABLE[difficulty] || GACHA_RARITY_TABLE.normal;
  const r = Math.random();
  if (guaranteeRare || r < t.r5) return 5;
  if (r < t.r4) return 4;
  if (r < t.r3) return 3;
  if (r < t.r2) return 2;
  return 1;
};

// 撮影で AI が決めた rarity に難易度バイアスを掛ける
// かんたん: たまに +1 / むずかしい: たまに -1
// 希少性維持のため、上振れは控えめ・下振れはやや強め
const adjustRarityByDifficulty = (rarity, difficulty = 'normal') => {
  const r = Math.random();
  if (difficulty === 'easy' && r < 0.20 && rarity < 5) return rarity + 1;
  if (difficulty === 'hard' && r < 0.35 && rarity > 1) return rarity - 1;
  // ノーマルでも★4★5は稀に1段階下げて希少性を守る
  if (difficulty === 'normal' && rarity >= 4 && r < 0.20) return rarity - 1;
  return rarity;
};

// 排出確率: 難易度に応じて変動
const gachaRoll = (guaranteeRare = false, difficulty = 'normal') => {
  const rarity = rollRarityByDifficulty(difficulty, guaranteeRare);

  // 50%でモン、50%で装備 (★1は70%モン)
  const isEquip = rarity === 1 ? Math.random() < 0.3 : Math.random() < 0.5;

  if (isEquip) {
    const pool = Object.values(EQUIPMENT).filter(e => e.rarity === rarity);
    const eq = pool.length ? pool[Math.floor(Math.random() * pool.length)] : Object.values(EQUIPMENT)[0];
    return { kind: 'equip', rarity, data: eq };
  } else {
    const pool = GACHA_MON_POOL.filter(m => m.rarity === rarity);
    const fallback = GACHA_MON_POOL.filter(m => m.rarity <= rarity);
    const template = (pool.length ? pool : fallback)[Math.floor(Math.random() * (pool.length || fallback.length))];

    // 個体値揺らぎ: baseStatsを±15%でランダム化
    const iv = () => 0.85 + Math.random() * 0.30; // 0.85〜1.15
    const baseStats = {
      hp:     Math.round(template.baseStats.hp     * iv()),
      kogeki: Math.round(template.baseStats.kogeki * iv()),
      bougyo: Math.round(template.baseStats.bougyo * iv()),
      speed:  Math.round(template.baseStats.speed  * iv()),
    };
    // growthBiasもランダム化（タイプ傾向を維持しつつ個性を出す）
    const rb = () => parseFloat((0.10 + Math.random() * 0.12).toFixed(2)); // 0.10〜0.22
    const growthBias = { hp: rb(), kogeki: rb(), bougyo: rb(), speed: rb() };

    const mon = {
      id: `gacha-${Date.now()}-${Math.random().toString(36).slice(2,6)}`,
      ...template,
      baseStats,
      growthBias,
      stage: 1, level: 1, exp: 0, wins: 0, losses: 0, equipped: {},
      description: template.description || `ガチャで てにいれた ${template.name}！`,
      imageDataUrl: null,
      capturedAt: new Date().toISOString(),
    };
    return { kind: 'mon', rarity, data: mon };
  }
};

// 装備込みのステータス計算
const getEquipBoost = (mon) => {
  const boost = { hp: 0, kogeki: 0, bougyo: 0, speed: 0 };
  if (!mon.equipped) return boost;
  for (const slot of EQUIP_SLOTS) {
    const id = mon.equipped[slot];
    if (id && EQUIPMENT[id]) {
      const b = EQUIPMENT[id].boost;
      if (b.hp) boost.hp += b.hp;
      if (b.kogeki) boost.kogeki += b.kogeki;
      if (b.bougyo) boost.bougyo += b.bougyo;
      if (b.speed) boost.speed += b.speed;
    }
  }
  return boost;
};

const getCurrentStats = (mon) => {
  if (!mon.baseStats) return mon.stats || { hp: 50, kogeki: 50, bougyo: 50, speed: 50 };
  const lv = mon.level || 1;
  const growth = (lv - 1) / (MAX_LEVEL - 1);
  const factor = (key) => 1 + growth * (mon.growthBias?.[key] ?? 0.15);
  const eq = getEquipBoost(mon);
  return {
    hp:     Math.round(mon.baseStats.hp * factor('hp')) + eq.hp,
    kogeki: Math.round(mon.baseStats.kogeki * factor('kogeki')) + eq.kogeki,
    bougyo: Math.round(mon.baseStats.bougyo * factor('bougyo')) + eq.bougyo,
    speed:  Math.round(mon.baseStats.speed * factor('speed')) + eq.speed,
  };
};

const giftRandomMon = (rarityBoost = 0) => {
  // rarityBoost が高いほどレアが出やすい
  const roll = Math.random() + rarityBoost;
  let pool;
  if (roll > 1.4) pool = GIFT_POOL.filter(g => g.rarity >= 4);

  else if (roll > 0.5) pool = GIFT_POOL.filter(g => g.rarity >= 2);

  if (pool.length === 0) pool = GIFT_POOL;
  const g = pool[Math.floor(Math.random() * pool.length)];

    id: `gift-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`,

    stage: 1, level: 1, exp: 0, wins: 0, losses: 0, equipped: {},

// ===== 日付ヘルパー (日本時間ベース) =====
const todayKey = () => {
  const d = new Date();
  // 日本時間で考えるためUTC+9
  const jst = new Date(d.getTime() + 9 * 3600 * 1000);
  return jst.toISOString().slice(0, 10);
};

const daysBetween = (k1, k2) => {
  if (!k1 || !k2) return null;
  const d1 = new Date(k1 + 'T00:00:00Z').getTime();
  const d2 = new Date(k2 + 'T00:00:00Z').getTime();
  return Math.round((d2 - d1) / 86400000);
};

// 今日の3ミッション (日付シードで決定) - 同じ日なら必ず同じ3つ
const getTodayMissions = (dateKey) => {
  // 日付からシード生成
  let seed = 0;
  for (let i = 0; i < dateKey.length; i++) seed = (seed * 31 + dateKey.charCodeAt(i)) | 0;
  const random = () => {
    seed = (seed * 1103515245 + 12345) & 0x7fffffff;
    return seed / 0x7fffffff;
  };
  const pool = [...MISSION_TEMPLATES];
  const picked = [];
  for (let i = 0; i < 3 && pool.length; i++) {
    const idx = Math.floor(random() * pool.length);
    picked.push(pool[idx]);
    pool.splice(idx, 1);
  }
  return picked;
};

            level: 1, exp: 0, gems: 30,
            stoneFragments: 50,
            inventory: ['sword_1', 'shield_1', 'charm_1'],
            inventoryNew: [],
            lastLogin: todayKey(), streak: 1,
            gachaCards: 100,
            missions: { date: todayKey(), list: getTodayMissions(todayKey()), progress: {}, claimed: {}, allClaimed: false },
            titles: [],
            activeTitle: null,
            stats: { totalGacha: 0, totalEvolves: 0, consecutiveR1Count: 0 },
          };
          setPlayer(initialPlayer);
          await window.storage.set('ishimon-player-v3', JSON.stringify(initialPlayer));
          await window.storage.set('ishimon-collection-v3', JSON.stringify(loadedCollection));
          setShowOnboarding(true);
        }
      } catch (e) {
        console.error(e);
        setCollection(SAMPLES);
      }
    })();
  }, []);

  const savePlayer = async (p) => {
    try { await window.storage.set('ishimon-player-v3', JSON.stringify(p)); }
    catch (e) { console.error(e); }
  };
  const saveCollection = async (c) => {
    try { await window.storage.set('ishimon-collection-v3', JSON.stringify(c)); }
    catch (e) { console.error(e); }
  };
  const saveSettings = async (s) => {
    setSettings(s);
    try { await window.storage.set('ishimon-settings-v1', JSON.stringify(s)); }
    catch (e) { console.error(e); }
  };

  // ===== 称号獲得チェック =====
  // どんなイベント後でも呼ぶ。新規獲得があれば player を更新してモーダル表示。
  // playerOverride: 直前に setPlayer したばかりで state が反映されてない場合に渡す
  // collectionOverride: 同様
  const grantTitlesIfAny = (event = 'tick', extra = {}, playerOverride = null, collectionOverride = null) => {
    const p = playerOverride || player;
    const c = collectionOverride || collection;
    const ctx = { player: p, collection: c, event, ...extra };
    const newlyGranted = evaluateTitles(ctx);
    if (newlyGranted.length === 0) return;
    const updated = {
      ...p,
      titles: [...new Set([...(p.titles || []), ...newlyGranted])],
    };
    setPlayer(updated);
    savePlayer(updated);
    // モーダル表示（新規獲得した称号オブジェクトの配列）
    const titleObjs = newlyGranted.map(id => getTitleById(id)).filter(Boolean);
    setNewTitleAlert({ titles: titleObjs });
  };
  const updateSetting = (key, value) => {
    saveSettings({ ...settings, [key]: value });
  };

  // ===== ログインボーナス処理（ガチャカード配布） =====
  const checkLoginBonus = (p, currentCollection) => {
    const today = todayKey();
    if (p.lastLogin === today) { ensureTodayMissions(p); return; }
    const diff = daysBetween(p.lastLogin, today);
    let newStreak = diff === 1 ? (p.streak || 0) + 1 : 1;

    // 連続日数でカード枚数が変わる
    let cardCount = 1;
    let label = `${newStreak}日目`;
    let fragmentBonus = 5; // 毎日5個
    if (newStreak === 30) { cardCount = 5; label = '30日 達成！🎉'; fragmentBonus = 30; }
    else if (newStreak === 20) { cardCount = 4; label = '20日 達成！'; fragmentBonus = 20; }
    else if (newStreak === 10) { cardCount = 3; label = '10日 達成！'; fragmentBonus = 15; }
    else if (newStreak === 7)  { cardCount = 3; label = '7日 連続！'; fragmentBonus = 15; }
    else if (newStreak >= 3)   { cardCount = 2; label = `${newStreak}日 連続！`; fragmentBonus = 8; }

    const updatedPlayer = {
      ...p,
      lastLogin: today, streak: newStreak,
      gachaCards: (p.gachaCards || 0) + cardCount,
      stoneFragments: (p.stoneFragments || 0) + fragmentBonus,
      missions: { date: today, list: getTodayMissions(today), progress: {}, claimed: {}, allClaimed: false },
    };
    setPlayer(updatedPlayer);
    savePlayer(updatedPlayer);
    setShowLoginBonus({ streak: newStreak, cardCount, label, fragmentBonus });
    // ログイン番長判定
    grantTitlesIfAny('tick', {}, updatedPlayer, currentCollection);
  };

  const ensureTodayMissions = (p) => {
    const today = todayKey();
    if (p.missions?.date !== today) {
      const updated = { ...p, missions: { date: today, list: getTodayMissions(today), progress: {}, claimed: {}, allClaimed: false } };
      setPlayer(updated);
      savePlayer(updated);
    }
  };

  // ===== ミッション進捗更新 =====
  const updateMission = async (eventType, payload = {}) => {
    setPlayer(prev => {
      ensureTodayMissions(prev);
      const missions = prev.missions || { list: [], progress: {}, claimed: {} };
      const newProgress = { ...missions.progress };
      let changed = false;
      for (const m of missions.list) {
        if (missions.claimed?.[m.id]) continue;
        if (m.type === eventType) {
          if (m.subtype && payload.type !== m.subtype) continue;
          newProgress[m.id] = (newProgress[m.id] || 0) + 1;
          changed = true;
        }
      }
      if (!changed) return prev;
      const updated = { ...prev, missions: { ...missions, progress: newProgress } };
      savePlayer(updated);
      return updated;
    });
  };

  // ミッション報酬を受け取る
  const claimMission = async (missionId) => {
    setPlayer(prev => {
      const m = prev.missions.list.find(x => x.id === missionId);
      if (!m) return prev;
      const progress = prev.missions.progress?.[missionId] || 0;
      if (progress < m.target) return prev;
      if (prev.missions.claimed?.[missionId]) return prev;
      const newClaimed = { ...prev.missions.claimed, [missionId]: true };
      const allDone = prev.missions.list.every(mm => newClaimed[mm.id]);
      const bonusGems = (allDone && !prev.missions.allClaimed) ? 20 : 0;
      const updated = {
        ...prev,
        gems: (prev.gems || 0) + m.reward + bonusGems,
        missions: { ...prev.missions, claimed: newClaimed, allClaimed: allDone || prev.missions.allClaimed },
      };
      savePlayer(updated);
      return updated;
    });
  };

  // ===== ガチャ実行 =====
  // count: 引く枚数 (1 or 10), useGems: trueならきらめき石消費
  const doGacha = async (count, useGems = false) => {
    const cost = count === 10 ? 500 : 50;
    if (useGems) {
      if ((player.gems || 0) < cost) { setError('きらめき石が足りません！'); return; }
    } else {
      if ((player.gachaCards || 0) < count) { setError('ガチャカードが足りません！'); return; }
    }

    // 設定で有効なら確認ダイアログを表示
    if (settings.confirmGacha) {
      const costLabel = useGems ? `きらめき石 ${cost}個` : `ガチャカード ${count}枚`;
      const ok = window.confirm(`${count === 10 ? '10連' : '1回'}ガチャを引きますか？\n消費: ${costLabel}`);
      if (!ok) return;
    }

    // 10連は最後の1枚がレア以上保証
    const results = Array.from({ length: count }, (_, i) =>
      gachaRoll(count === 10 && i === count - 1, settings.difficulty)
    ).map(r => ({ ...r, revealed: false }));

    setGachaResults(results);
    setGachaPhase('flipping');

    // プレイヤーのカード/石消費
    setPlayer(prev => {
      const updated = {
        ...prev,
        gachaCards: useGems ? (prev.gachaCards || 0) : Math.max(0, (prev.gachaCards || 0) - count),
        gems: useGems ? (prev.gems || 0) - cost : (prev.gems || 0),
      };
      savePlayer(updated);
      return updated;
    });

    // === バックグラウンドでAI画像生成を開始（モンのみ、最大2体まで同時） ===
    // めくり演出中に裏で生成してキャッシュへ。完成したらレンダラーが拾う。
    const monResults = results.filter(r => r.kind === 'mon');

    // 1. まずキャッシュ済みのものを全部即時反映（並列）
    await Promise.all(monResults.map(async (monResult) => {
      const cached = await loadCachedImage(monResult.data);
      if (cached) {
        monResult.data.imageDataUrl = cached;
        setGachaResults(prev => prev.map(r =>
          r.kind === 'mon' && r.data.id === monResult.data.id
            ? { ...r, data: { ...r.data, imageDataUrl: cached } }
            : r
        ));
      }
    }));

    // 2. キャッシュ未ヒットのものをキュー投入（並列で投入、内部で順次処理）
    const uncached = monResults.filter(r => !r.data.imageDataUrl);
    uncached.forEach((monResult) => {
      // キューに投入。完了次第表示が更新される（数分〜数十分かかる可能性）
      getOrGenerateMonImage(monResult.data).then(({ image }) => {
        if (image) {
          monResult.data.imageDataUrl = image;
          setGachaResults(prev => prev.map(r =>
            r.kind === 'mon' && r.data.id === monResult.data.id
              ? { ...r, data: { ...r.data, imageDataUrl: image } }
              : r
          ));
          // collectionも更新（コレクション画面で見たときに反映）
          setCollection(prev => prev.map(c =>
            c.id === monResult.data.id ? { ...c, imageDataUrl: image } : c
          ));
        }
      });
    });

    // 1枚ずつ順番にめくるアニメ（0.5秒おき）
    for (let i = 0; i < results.length; i++) {
      await new Promise(r => setTimeout(r, i === 0 ? 400 : 600));
      setGachaResults(prev => prev.map((r, idx) => idx === i ? { ...r, revealed: true } : r));
    }
    setGachaPhase('done');

    // 獲得処理: モンはcollectionへ、装備はinventoryへ
    // ※AI画像はめくり演出中に各 monResult.data.imageDataUrl に書き込み済み（キャッシュor生成完了分）
    const newMons = results.filter(r => r.kind === 'mon').map(r => r.data);
    const newEquips = results.filter(r => r.kind === 'equip').map(r => r.data.id);

    if (newMons.length) {
      const updated = [...newMons, ...collection];
      setCollection(updated);
      await saveCollection(updated);
    }
    if (newEquips.length) {
      setPlayer(prev => {
        const merged = [...new Set([...(prev.inventory || []), ...newEquips])];
        // 新着フラグ用に未確認IDも追加（重複なし）
        const mergedNew = [...new Set([...(prev.inventoryNew || []), ...newEquips])];
        const updated = { ...prev, inventory: merged, inventoryNew: mergedNew };
        savePlayer(updated);
        return updated;
      });
    }

    // ===== 称号判定用：累計カウンタ更新 =====
    // 連続★1の判定: 全結果がr1なら累計、1つでも違えばリセット
    const allR1 = results.length > 0 && results.every(r => r.rarity === 1);
    // ★5排出ボーナス（1枚につき10個）
    const r5Count = results.filter(r => r.rarity === 5).length;
    setPlayer(prev => {
      const prevConsec = prev.stats?.consecutiveR1Count || 0;
      const updated = {
        ...prev,
        stoneFragments: (prev.stoneFragments || 0) + r5Count * 10,
        stats: {
          ...(prev.stats || {}),
          totalGacha: (prev.stats?.totalGacha || 0) + results.length,
          consecutiveR1Count: allR1 ? prevConsec + results.length : 0,
        },
      };
      savePlayer(updated);
      // 最新の collection は newMons 反映済みのものを使う
      const latestCollection = newMons.length > 0 ? [...newMons, ...collection] : collection;
      grantTitlesIfAny('gacha', { gachaResults: results }, updated, latestCollection);
      return updated;
    });
  };

  // ===== プレイヤーEXP追加 =====
  const addPlayerExp = (amount) => {
    setPlayer(prev => {
      let lv = prev.level || 1;
      let exp = (prev.exp || 0) + amount;
      let needed = playerExpForNextLevel(lv);
      let levelUps = 0;
      let bonusGems = 0;
      while (exp >= needed && lv < MAX_PLAYER_LEVEL) {
        exp -= needed;
        lv++;
        levelUps++;
        bonusGems += 10;
        needed = playerExpForNextLevel(lv);
      }
      const updated = { ...prev, level: lv, exp, gems: (prev.gems || 0) + bonusGems };
      savePlayer(updated);
      return updated;
    });
  };

  // ===== カメラ直接アクセス（getUserMedia）=====
  const openCamera = async () => {
    setCameraError('');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false,
      });
      setCameraStream(stream);
      setShowCamera(true);
      // 少し待ってからvideoに割り当て
      setTimeout(() => {
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          videoRef.current.play().catch(() => {});
        }
      }, 100);
    } catch (err) {
      // カメラNG→フォールバックでファイル選択
      setCameraError('カメラを つかえないよ。しゃしんを えらんでね。');
      fileRef.current?.click();
    }
  };

  const stopCamera = () => {
    if (cameraStream) {
      cameraStream.getTracks().forEach(t => t.stop());
      setCameraStream(null);
    }
    setShowCamera(false);
    setCameraError('');
  };

  const capturePhoto = () => {
    const video = videoRef.current;
    const canvas = canvasRef.current;
    if (!video || !canvas) return;
    const max = 512;
    let w = video.videoWidth || 640;
    let h = video.videoHeight || 480;
    if (w > h && w > max) { h = Math.round(h * max / w); w = max; }
    else if (h > max) { w = Math.round(w * max / h); h = max; }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(video, 0, 0, w, h);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
    stopCamera();
    setPreviewImage(dataUrl);
    generateMon(dataUrl);
  };

  // ===== 撮影と生成 =====
  const handleImage = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const max = 512;
        let { width, height } = img;
        if (width > height && width > max) { height *= max / width; width = max; }
        else if (height > max) { width *= max / height; height = max; }
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        const compressed = canvas.toDataURL('image/jpeg', 0.7);
        setPreviewImage(compressed);
        generateMon(compressed);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const generateMon = async (imageDataUrl) => {
    // 石のかけら コストチェック
    if ((player.stoneFragments || 0) < CAPTURE_COST) {
      setError(`石のかけらが 足りません！（${CAPTURE_COST}個 必要 / 現在 ${player.stoneFragments || 0}個）`);
      return;
    }
    // コスト消費
    const updatedPlayer = { ...player, stoneFragments: (player.stoneFragments || 0) - CAPTURE_COST };
    setPlayer(updatedPlayer);
    savePlayer(updatedPlayer);

    setIsLoading(true);
    setError('');
    setLoadingMsg('いしを みている...');
    setTimeout(() => setLoadingMsg('魂の波動を 感じています...'), 5000);
    setTimeout(() => setLoadingMsg('特徴を 分析しています...'), 12000);
    setTimeout(() => setLoadingMsg('伝説を 紐解いています...'), 20000);
    setTimeout(() => setLoadingMsg('石モンが 目覚めようとしています...'), 30000);

    // 並行して位置情報を取得（設定で無効ならスキップ、失敗してもOK）
    const locationPromise = settings.showLocation ? getCurrentLocation() : Promise.resolve(null);

    try {
      // Pollinations Vision API（OpenAI互換）でJSON生成
      const visionPayload = {
        model: 'openai',
        messages: [{
          role: 'user',
          content: [
            { type: 'image_url', image_url: { url: imageDataUrl } },
            { type: 'text', text: `この画像に写っているものから「石モン」というポケモン・デジモン風の架空のモンスターを生成してください。創造性豊かに、世界観のあるストーリーを持たせてください。

以下のJSONのみ返してください（コードブロック・説明不要）:
{
  "name": "カタカナ4-6文字のオリジナル名",
  "type": "火|水|土|電気|空|ドラゴン|精霊 のいずれか1つ",
  "stage": 1,
  "rarity": 1から5の整数,
  "baseStats": { "hp": 30から150, "kogeki": 20から120, "bougyo": 20から120, "speed": 20から120 },
  "growthBias": { "hp": 0.10から0.20, "kogeki": 0.10から0.20, "bougyo": 0.10から0.20, "speed": 0.10から0.20 },
  "skill": "とくぎ名(カタカナ4-7文字)",
  "skillDesc": "技の発動時の演出と効果を50-80文字で",
  "description": "石モンの生態・発見場所の伝説を80-120文字で",
  "personality": "性格を15-25文字で",
  "favorite": "好きなもの・好む環境を15-25文字で",
  "legend": "石モンに関する伝説を50-80文字で",
  "evolveTo": "進化先の名前(カタカナ4-7文字)"
}

明らかに石でない場合（人物の顔・食べ物・動物・スマホ画面など、stone_probability が 50 未満）:
{ "stone_probability": 確率の数値, "error": "not_stone" }

【ネーミングルール】
- 石の色+生物パーツ合成: クリムゾン+牙→クリゾング / 翡翠+爪→ヒスイヅメ
- 鉱物名を変形: ガーネット→ガルネガ / オパール→オパルゲン
- 質感+擬音: ザラザラ→ザルガン / キラキラ→キラフィア
- タイプを語感に反映: 火→フレイ/バーン系 / 水→アクア/マル系 / 電気→ボルト/ライ系
- 避けること: イワン・イワゴン・ガンロック・ロックン など月並みな名前

【ガイド】
- 形が独特・色珍しい・特徴的→レア度4-5 / 普通の小石→レア度1-2
- ステータス合計はレア度に比例(★1≒200 ★2≒260 ★3≒320 ★4≒380 ★5≒420+)
- growthBiasはタイプの個性を反映(火→攻撃寄り / 水→HP寄り / 空→素早さ寄り)
- 日本語で。JSON以外は何も書かないこと。`}
          ]
        }],
        max_tokens: 1200,
      };

      // Vision API呼び出し（429リトライ機構付き、最大3回）
      let res = null;
      let lastError = null;
      for (let attempt = 0; attempt < 3; attempt++) {
        try {
          res = await fetch('https://text.pollinations.ai/openai', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(visionPayload),
          });
          if (res.ok) break;
          if (res.status === 429) {
            // Rate limited、長めに待ってリトライ
            const wait = (attempt + 1) * 20000; // 20秒, 40秒, 60秒
            setLoadingMsg(`サーバーが混雑中です... ${Math.ceil(wait/1000)}秒待ちます`);
            await new Promise(r => setTimeout(r, wait));
            continue;
          }
          throw new Error(`Vision API ${res.status}`);
        } catch (e) {
          lastError = e;
          if (attempt < 2) {
            await new Promise(r => setTimeout(r, 5000));
          }
        }
      }
      if (!res || !res.ok) throw lastError || new Error('Vision API failed after retries');
      const data = await res.json();
      const text = data.choices?.[0]?.message?.content || '';

      // JSONを抽出（正規表現で最外側の{}を取り出す・ネスト対応）
      let jsonStr = null;
      let depth = 0, start = -1;
      for (let i = 0; i < text.length; i++) {
        if (text[i] === '{') { if (depth === 0) start = i; depth++; }
        else if (text[i] === '}') { depth--; if (depth === 0 && start >= 0) { jsonStr = text.slice(start, i + 1); break; } }
      }
      if (!jsonStr) throw new Error('JSON not found in response');
      const mon = JSON.parse(jsonStr);

      // 難易度バイアスを適用（rarity 補正＋ステ合計も再計算）
      if (mon && typeof mon.rarity === 'number') {
        const origRarity = Math.max(1, Math.min(5, Math.round(mon.rarity)));
        const newRarity = adjustRarityByDifficulty(origRarity, settings.difficulty);
        if (newRarity !== origRarity) {
          mon.rarity = newRarity;
          // ステも調整（★1=200、★2=260、★3=320、★4=380、★5=420 を目安）
          if (mon.baseStats) {
            const targetTotal = 140 + newRarity * 60;
            const curTotal = (mon.baseStats.hp || 0) + (mon.baseStats.kogeki || 0)
                           + (mon.baseStats.bougyo || 0) + (mon.baseStats.speed || 0);
            if (curTotal > 0) {
              const scale = targetTotal / curTotal;
              mon.baseStats = {
                hp:     Math.max(20, Math.round(mon.baseStats.hp * scale)),
                kogeki: Math.max(20, Math.round(mon.baseStats.kogeki * scale)),
                bougyo: Math.max(20, Math.round(mon.baseStats.bougyo * scale)),
                speed:  Math.max(20, Math.round(mon.baseStats.speed * scale)),
              };
            }
          }
        }
      }

      // === AI画像生成（キャッシュ優先、なければAnonymous Tierで生成） ===
      setLoadingMsg('AIで キャラを 描いています...');
      const { image: aiImage, seed: imgSeed, prompt: imgPrompt } = await getOrGenerateMonImage(mon);

      // 位置情報を取得待機（最大3秒）
      const location = await Promise.race([
        locationPromise,
        new Promise(resolve => setTimeout(() => resolve(null), 3000)),
      ]);

      const entry = {
        id: `mon-${Date.now()}`,
        ...mon,
        level: 1, exp: 0, wins: 0, losses: 0, equipped: {},
        imageDataUrl: aiImage || imageDataUrl,
        originalPhoto: imageDataUrl,
        capturedAt: new Date().toISOString(),
        location: location, // { lat, lng, name } または null
        imageSeed: imgSeed,   // テイスト記録用
        imagePrompt: imgPrompt, // テイスト記録用
      };
      setNewMon(entry);
      const updated = [entry, ...collection];
      setCollection(updated);
      await saveCollection(updated);
      updateMission('capture');
      grantTitlesIfAny('photo', { mon: entry }, null, updated);
    } catch (err) {
      console.error('generateMon error:', err);
      try {
        setLoadingMsg('もうすこし お待ちください...');
        const color = await analyzeImageColor(imageDataUrl);
        const mon = fallbackMon(color, settings.difficulty);
        setLoadingMsg('AIで キャラを 描いています...');
        const { image: aiImage, seed: imgSeed, prompt: imgPrompt } = await getOrGenerateMonImage(mon);
        const location = await Promise.race([
          locationPromise,
          new Promise(resolve => setTimeout(() => resolve(null), 1000)),
        ]);
        const entry = {
          id: `mon-${Date.now()}`,
          ...mon,
          level: 1, exp: 0, wins: 0, losses: 0, equipped: {},
          imageDataUrl: aiImage || imageDataUrl,
          originalPhoto: imageDataUrl,
          capturedAt: new Date().toISOString(),
          location: location,
          imageSeed: imgSeed,
          imagePrompt: imgPrompt,
        };
        setNewMon(entry);
        const updated = [entry, ...collection];
        setCollection(updated);
        await saveCollection(updated);
        updateMission('capture');
        grantTitlesIfAny('photo', { mon: entry }, null, updated);
      } catch (fallbackErr) {
        console.error('fallback error:', fallbackErr);
        setError('失敗しました。もう一度お試しください');
      }
    } finally {
      setIsLoading(false);
      setLoadingMsg('');
    }
  };

  // ===== AI画像で再生成（既存の石モンの絵柄を変える、キャッシュ更新）=====
  const regenerateMonImage = async (mon) => {
    setAiGenerating(true);
    let timedOut = false;
    // 90秒タイムアウト
    const timeoutId = setTimeout(() => {
      timedOut = true;
      setAiGenerating(false);
      setError('AI生成がタイムアウトしました。スキップするか後で再試行してください');
    }, 90000);
    try {
      const prompt = buildMonPrompt(mon);
      // 強制的に新しいseedで生成（既存キャッシュは新画像で上書き）
      const aiImage = await generateAiImage(prompt, Date.now() % 1000000);
      if (timedOut) return; // タイムアウト後は無視
      clearTimeout(timeoutId);
      if (aiImage) {
        await saveCachedImage(mon, aiImage); // キャッシュも更新
        const updated = collection.map(c => c.id === mon.id ? { ...c, imageDataUrl: aiImage } : c);
        setCollection(updated);
        await saveCollection(updated);
        if (selected?.id === mon.id) setSelected({ ...mon, imageDataUrl: aiImage });
        if (newMon?.id === mon.id) setNewMon({ ...mon, imageDataUrl: aiImage });
      } else {
        setError('AI生成に失敗しました。15秒後に再度お試しください');
      }
    } catch (e) {
      clearTimeout(timeoutId);
      if (!timedOut) setError('AI生成エラー');
    } finally {
      if (!timedOut) setAiGenerating(false);
    }
  };

  // ===== 進化 =====
  const evolveMon = async (mon) => {
    if (!mon.evolveTo || mon.stage >= 3) return;
    const cost = EVOLVE_COST[mon.rarity] || EVOLVE_COST[4];
    if ((player.stoneFragments || 0) < cost) {
      alert(`石のかけらが 足りません！\n${cost}個 必要 / 現在 ${player.stoneFragments || 0}個`);
      return;
    }
    // コスト消費
    const updatedPlayer = { ...player, stoneFragments: (player.stoneFragments || 0) - cost };
    setPlayer(updatedPlayer);
    savePlayer(updatedPlayer);
    setShowEvolveAnim(mon);
    try {
      const newStage = mon.stage + 1;
      const newRarity = Math.min(5, mon.rarity + 1);
      const evolved = {
        ...mon, name: mon.evolveTo, stage: newStage, rarity: newRarity,
        baseStats: {
          hp: Math.round(mon.baseStats.hp * 1.4), kogeki: Math.round(mon.baseStats.kogeki * 1.4),
          bougyo: Math.round(mon.baseStats.bougyo * 1.4), speed: Math.round(mon.baseStats.speed * 1.3),
        },
        skill: `スーパー${mon.skill}`, skillDesc: `進化して パワーアップした ${mon.skill}！`,
        description: `${mon.name}が 進化した すがた。ちからが あふれている！`,
        evolveTo: newStage < 3 ? `${mon.evolveTo}X` : null,
      };

      // === 進化アニメ中にAI画像をバックグラウンド生成 ===
      // 進化アニメは2500ms。その間にAI画像生成（5〜15秒）が始まり、画像はキャッシュへ保存。
      // アニメ完了時点でキャッシュにあれば即適用、なければ後から自動更新する。
      const imagePromise = getOrGenerateMonImage(evolved);

      await new Promise(r => setTimeout(r, 2500));

      // アニメ完了。AI画像を待つ（最大10秒）
      const imageRace = await Promise.race([
        imagePromise,
        new Promise(resolve => setTimeout(() => resolve({ image: null }), 10000)),
      ]);
      if (imageRace?.image) {
        evolved.imageDataUrl = imageRace.image;
      }

      const updated = collection.map(c => c.id === mon.id ? evolved : c);
      setCollection(updated);
      await saveCollection(updated);
      setShowEvolveAnim(null);
      setSelected(evolved);
      updateMission('evolve');

      // 進化カウンタを更新 → 称号チェック
      const updatedPlayer = {
        ...player,
        stats: {
          ...(player.stats || {}),
          totalEvolves: (player.stats?.totalEvolves || 0) + 1,
        },
      };
      setPlayer(updatedPlayer);
      savePlayer(updatedPlayer);
      grantTitlesIfAny('evolve', {}, updatedPlayer, updated);

      // もしまだ画像が来てなかった場合、後で来たら反映
      if (!imageRace?.image) {
        imagePromise.then(({ image }) => {
          if (image) {
            const finalEvolved = { ...evolved, imageDataUrl: image };
            setCollection(prev => prev.map(c => c.id === mon.id ? finalEvolved : c));
            saveCollection(collection.map(c => c.id === mon.id ? finalEvolved : c));
            if (selected?.id === mon.id) setSelected(finalEvolved);
          }
        });
      }
    } catch (err) { setError('進化に失敗しました...'); setShowEvolveAnim(null); }
  };

  // ===== 装備 =====
  const equipItem = async (monId, slot, equipId) => {
    const updated = collection.map(c => {
      if (c.id !== monId) return c;
      const newEq = { ...(c.equipped || {}) };
      if (equipId === null) delete newEq[slot];
      else newEq[slot] = equipId;
      return { ...c, equipped: newEq };
    });
    setCollection(updated);
    await saveCollection(updated);
    if (showEquip?.id === monId) {
      setShowEquip(updated.find(c => c.id === monId));
    }
    if (selected?.id === monId) {
      setSelected(updated.find(c => c.id === monId));
    }
  };

  // ===== 装備購入 =====
  const buyEquip = async (eq) => {
    if (player.gems < eq.price) {
      setError('きらめき石が足りません！');
      return;
    }
    if (player.inventory.includes(eq.id)) {
      setError('もう 所持中よ！');
      return;
    }
    if (player.level < eq.unlock) {
      setError(`プレイヤー Lv.${eq.unlock} で つかえるよ`);
      return;
    }
    const updated = {
      ...player,
      gems: player.gems - eq.price,
      inventory: [...player.inventory, eq.id],
      inventoryNew: [...new Set([...(player.inventoryNew || []), eq.id])],
    };
    setPlayer(updated);
    await savePlayer(updated);
  };

  // ===== バトル =====
  const DIFFICULTY_MULTIPLIER = { easy: 0.7, normal: 1.0, hard: 1.35 };
  const startBattle = (mon, stage) => {
    const enemy = createWildMon(stage);
    const mult = DIFFICULTY_MULTIPLIER[settings.difficulty] || 1.0;
    // baseStats に難易度倍率を適用（getCurrentStats での再計算でもステータス比率が保たれる）
    const adjustedEnemy = mult === 1.0 ? enemy : {
      ...enemy,
      baseStats: {
        hp:     Math.max(1, Math.round(enemy.baseStats.hp     * mult)),
        kogeki: Math.max(1, Math.round(enemy.baseStats.kogeki * mult)),
        bougyo: Math.max(1, Math.round(enemy.baseStats.bougyo * mult)),
        speed:  Math.max(1, Math.round(enemy.baseStats.speed  * mult)),
      },
    };
    const enemyStats = getCurrentStats(adjustedEnemy);
    const myStats = getCurrentStats(mon);
    setBattleStage(stage); setMyMon(mon); setEnemyMon(adjustedEnemy);
    setMyHp(myStats.hp); setEnemyHp(enemyStats.hp);
    setTurn(1);
    setBattleLog([`野生の ${enemy.name} が 現れた！`]);
    setBattlePhase('select'); setBattleResult(null); setSuperEffectiveHit(false);
    setView('battle');
    updateMission('battle');
    updateMission('battle_type', { type: mon.type });
    // 前回使った石モンIDを保存
    const updatedP = { ...player, lastBattleMonId: mon.id };
    setPlayer(updatedP);
    savePlayer(updatedP);
  };

  const battleResolve = (myAction) => {
    if (battlePhase !== 'select') return;
    setBattlePhase('resolving');
    const enemyAction = ['kogeki', 'bougyo', 'tokugi'][Math.floor(Math.random() * 3)];
    const myStats = getCurrentStats(myMon);
    const enemyStats = getCurrentStats(enemyMon);
    const typeBonus = getTypeMultiplier(myMon.type, enemyMon.type);
    const enemyTypeBonus = getTypeMultiplier(enemyMon.type, myMon.type);

    let log = [], myDmg = 0, enemyDmg = 0;
    log.push(`${turn}ターンめ！`);
    const beats = (a, b) => (
      (a === 'kogeki' && b === 'tokugi') ||
      (a === 'tokugi' && b === 'bougyo') ||
      (a === 'bougyo' && b === 'kogeki')
    );
    const actionLabel = { kogeki: 'こうげき', bougyo: 'ぼうぎょ', tokugi: 'とくぎ' };
    log.push(`${myMon.name}は ${actionLabel[myAction]}！`);
    log.push(`${enemyMon.name}は ${actionLabel[enemyAction]}！`);

    let mySuperEffective = false;

    if (myAction === enemyAction) {
      log.push('あいこ！ おたがい こうげき！');
      enemyDmg = Math.max(3, Math.round((myStats.kogeki - enemyStats.bougyo / 2) * 0.4 * typeBonus));
      myDmg = Math.max(3, Math.round((enemyStats.kogeki - myStats.bougyo / 2) * 0.4 * enemyTypeBonus));
    } else if (beats(myAction, enemyAction)) {
      log.push(`${myMon.name}の こうげきが きまった！`);
      let baseDmg = myStats.kogeki - enemyStats.bougyo / 2;
      if (myAction === 'tokugi') baseDmg *= 1.4;
      enemyDmg = Math.max(5, Math.round(baseDmg * typeBonus));
      if (typeBonus > 1) { log.push('こうかは ばつぐん！'); mySuperEffective = true; }
      if (typeBonus < 1) log.push('こうかは 今ひとつ...');
    } else {
      log.push(`${enemyMon.name}の こうげき！`);
      let baseDmg = enemyStats.kogeki - myStats.bougyo / 2;
      if (enemyAction === 'tokugi') baseDmg *= 1.4;
      myDmg = Math.max(5, Math.round(baseDmg * enemyTypeBonus));
      if (enemyTypeBonus > 1) log.push(`${myMon.name}は おおだめーじ！`);
      if (enemyTypeBonus < 1) log.push(`${myMon.name}は すこしだけ ダメージ`);
    }

    if (enemyDmg > 0) setAnimatingHit('enemy');
    else if (myDmg > 0) setAnimatingHit('me');
    setBattleLog(prev => [...prev.slice(-3), ...log]);

    setTimeout(() => {
      const newEnemyHp = Math.max(0, enemyHp - enemyDmg);
      const newMyHp = Math.max(0, myHp - myDmg);
      setEnemyHp(newEnemyHp); setMyHp(newMyHp); setAnimatingHit(null);
      if (mySuperEffective) setSuperEffectiveHit(true);

      if (newEnemyHp <= 0) finishBattle('win', mySuperEffective);
      else if (newMyHp <= 0) finishBattle('lose', false);
      else if (turn >= 5) {
        if (newMyHp > newEnemyHp) finishBattle('win', mySuperEffective);
        else if (newMyHp < newEnemyHp) finishBattle('lose', false);
        else finishBattle('draw', false);
      } else {
        setTurn(turn + 1); setBattlePhase('select');
      }
    }, 1500);
  };

  const finishBattle = async (result, wasSuperEffective) => {
    setBattlePhase('result');
    let expGained = 0;
    if (result === 'win') expGained = 30 + (enemyMon.level || 1) * 10 + (enemyMon.rarity - 1) * 10;
    else if (result === 'draw') expGained = 15 + (enemyMon.level || 1) * 4;
    else expGained = 8 + (enemyMon.level || 1) * 3;

    let newExp = (myMon.exp || 0) + expGained;
    let newLevel = myMon.level || 1;
    let needed = expForNextLevel(newLevel);
    let leveledUp = false;
    while (newExp >= needed && newLevel < MAX_LEVEL) {
      newExp -= needed; newLevel++; leveledUp = true; needed = expForNextLevel(newLevel);
    }
    const updatedMon = {
      ...myMon, level: newLevel, exp: newExp,
      wins: (myMon.wins || 0) + (result === 'win' ? 1 : 0),
      losses: (myMon.losses || 0) + (result === 'lose' ? 1 : 0),
    };
    const newCollection = collection.map(c => c.id === myMon.id ? updatedMon : c);
    setCollection(newCollection);
    await saveCollection(newCollection);

    // プレイヤーEXP
    const playerExp = result === 'win' ? 25 : result === 'draw' ? 12 : 8;
    addPlayerExp(playerExp);

    // 勝利時にきらめき石報酬
    let gemsGained = 0;
    let fragmentsGained = 0;
    if (result === 'win') {
      gemsGained = 5 + Math.floor(Math.random() * 6); // 5〜10
      if (wasSuperEffective) gemsGained += 3; // ボーナス
      fragmentsGained = 2 + Math.floor(Math.random() * 3); // 2〜4個
      setPlayer(prev => {
        const updated = { ...prev, gems: (prev.gems || 0) + gemsGained, stoneFragments: (prev.stoneFragments || 0) + fragmentsGained };
        savePlayer(updated);
        return updated;
      });
    } else if (result === 'draw') {
      gemsGained = 2;
      fragmentsGained = 1;
      setPlayer(prev => {
        const updated = { ...prev, gems: (prev.gems || 0) + gemsGained, stoneFragments: (prev.stoneFragments || 0) + fragmentsGained };
        savePlayer(updated);
        return updated;
      });
    }

    // ミッション
    if (result === 'win') {
      updateMission('win');
      if (wasSuperEffective) updateMission('super_effective');
    }
    if (leveledUp) updateMission('levelup');

    // 称号チェック（初陣・百戦錬磨・無敗の伝説 など）
    grantTitlesIfAny('battle', { result }, null, newCollection);

    setBattleResult({ result, expGained, leveledUp, newLevel, updatedMon, playerExp, gemsGained, fragmentsGained });
  };

  const closeBattle = () => {
    setBattlePhase('select'); setBattleResult(null);
    setMyMon(null); setEnemyMon(null); setBattleStage(null);
    setView('home');
  };

  const totalStat = (s) => s.hp + s.kogeki + s.bougyo + s.speed;
  const ranked = [...collection].sort((a, b) => {
    const sa = getCurrentStats(a), sb = getCurrentStats(b);
    return b.rarity - a.rarity || (b.level || 1) - (a.level || 1) || totalStat(sb) - totalStat(sa);
  });

  // 未受取ミッション数
  const claimableMissions = (player.missions?.list || []).filter(m => {
    const prog = player.missions.progress?.[m.id] || 0;
    return prog >= m.target && !player.missions.claimed?.[m.id];
  }).length;

  // ===========================================
  // ホーム画面（案C：撮影 + 最近の石モン + ミッション）
  // ===========================================
  const HomeView = () => {
    const recentMons = collection.slice(0, 6); // 直近6体
    return (
      <div className="px-5 pt-6 pb-32">
        {/* プレイヤーステータスバー */}
        <button onClick={() => setView('profile')}
          className="flex items-center gap-3 mb-4 w-full active:scale-[0.98] transition-transform rounded-2xl px-3 py-2.5 backdrop-blur-sm"
          style={{ background: 'rgba(0,0,0,0.35)', border: '1px solid rgba(255,215,0,0.35)' }}>
          {/* 左: アバター */}
          <div className="flex-shrink-0 self-center">
            {player.avatarPhoto ? (
              <img src={player.avatarPhoto}
                className="w-11 h-11 rounded-xl object-cover"
                style={{ border: '2px solid #FFD700' }} />
            ) : (
              <div className="w-11 h-11 rounded-xl flex items-center justify-center"
                style={{ background: 'linear-gradient(135deg, #FFD700, #FF6B35)', border: '2px solid #FFD700' }}>
                <User className="w-6 h-6 text-yellow-900" strokeWidth={3} />
              </div>
            )}
          </div>
          {/* 右: 2段レイアウト — アバターと同じ高さに収める */}
          <div className="flex-1 min-w-0 flex flex-col justify-center" style={{ height: '44px' }}>
            {/* 上段: 名前 + Lv + ログイン状態 */}
            <div className="flex items-baseline gap-1.5 leading-none mb-1">
              <span className="text-white font-black text-base leading-none truncate">{player.name || 'トレーナー'}</span>
              <span className="text-yellow-300 font-black text-sm leading-none flex-shrink-0">Lv.{player.level}</span>
              {firebaseUser && (
                <span className="text-[9px] font-black leading-none flex-shrink-0 text-green-300">☁</span>
              )}
            </div>
            {/* 下段: 称号 + きらめき石 */}
            <div className="flex items-center gap-2 leading-none">
              {(() => {
                const t = player.activeTitle ? getTitleById(player.activeTitle) : null;
                const r = t ? (TITLE_RARITY[t.rarity] || TITLE_RARITY.common) : null;
                return t ? (
                  <span className="text-[11px] font-black leading-none truncate max-w-[120px]"
                    style={{ color: r.color }}>
                    {t.emoji} {t.name}
                  </span>
                ) : (
                  <span className="text-[11px] font-bold leading-none text-white/30">称号なし</span>
                );
              })()}
              <div className="flex items-center gap-0.5 ml-auto flex-shrink-0">
                <Gem className="w-3.5 h-3.5 text-purple-300" />
                <span className="text-white font-black text-sm leading-none">{player.gems}</span>
              </div>
            </div>
          </div>
        </button>

        <div className="text-center mb-5">
          <h1 className="text-5xl font-black tracking-wider"
            style={{
              fontFamily: 'M PLUS Rounded 1c, sans-serif',
              background: 'linear-gradient(180deg, #FFE066 0%, #FF6B35 50%, #C73E1D 100%)',
              WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
              filter: 'drop-shadow(0 4px 0 rgba(0,0,0,0.3))', letterSpacing: '0.05em',
            }}>
            石モン図鑑
          </h1>
        </div>

        {/* ミッション通知（赤丸バッジで知らせる、揺れなし） */}
        {claimableMissions > 0 && (
          <button onClick={() => setShowMissions(true)}
            className="relative w-full mb-3 p-3 rounded-2xl text-white text-left active:scale-95 transition-transform flex items-center gap-3"
            style={{
              background: 'linear-gradient(135deg, #FFD700, #FF6B35)',

            }}>
            <Gift className="w-7 h-7" strokeWidth={2.5} />
            <div className="flex-1">

              <div className="text-xs font-bold">{claimableMissions}つ 達成済み</div>

              style={{ border: '2px solid white', minWidth: '22px', textAlign: 'center' }}>
              {claimableMissions}
            </span>
          </button>
        )}

        {/* メイン: 撮影ボタン（一番でかく目立つ） */}
        {(() => {
          const frags = player.stoneFragments || 0;
          const canCapture = frags >= CAPTURE_COST;
          return (
            <button onClick={openCamera}
              className="relative w-full mb-3 active:scale-95 transition-transform">
              <div className="absolute inset-0 rounded-3xl"
                style={{ background: canCapture ? 'linear-gradient(135deg, #FFD700, #FF6B35)' : 'rgba(100,100,100,0.5)', filter: 'blur(20px)', opacity: 0.6 }} />
              <div className="relative rounded-3xl px-5 py-4 text-white"
                style={{
                  background: canCapture
                    ? 'linear-gradient(135deg, #FF8C42 0%, #FF3D7F 50%, #C71F8E 100%)'
                    : 'linear-gradient(135deg, #555, #333)',
                  boxShadow: canCapture ? '0 8px 0 #5A1A4A, inset 0 2px 0 rgba(255,255,255,0.4)' : '0 4px 0 #111',
                  border: canCapture ? '3px solid #FFE066' : '3px solid #666',
                }}>
                <div className="flex items-center gap-3">
                  {/* 左: カメラアイコンのみ */}
                  <Camera className="w-8 h-8 flex-shrink-0" strokeWidth={2.5} />
                  {/* 中: テキスト */}
                  <div className="flex-1 text-left">
                    <div className="text-xl font-black leading-tight">石を撮影する</div>
                    <div className="text-xs font-bold mt-0.5 opacity-90">
                      {canCapture ? 'カメラで 新しい 石モンを 召喚！' : '石のかけらが 足りません'}
                    </div>
                  </div>
                  {/* 右: 石のかけら残数 */}
                  <div className="flex flex-col items-center flex-shrink-0 gap-0.5">
                    <span className="text-2xl leading-none">🪨</span>
                    <span className="text-[9px] font-bold leading-none text-white/80">石のかけら</span>
                    <span className={`text-xs font-black leading-none ${canCapture ? 'text-yellow-200' : 'text-red-300'}`}>
                      {frags}/{CAPTURE_COST}
                    </span>
                  </div>
                </div>
              </div>
            </button>
          );
        })()}

        <button onClick={() => fileRef.current?.click()}
          className="w-full mb-3 py-2 rounded-2xl text-white/60 text-xs font-bold active:text-white text-center underline">
          📁 写真から 選ぶ
        </button>

        <input ref={fileRef} type="file" accept="image/*" onChange={handleImage} className="hidden" />

        {/* ショップ・アイテムへのクイックアクセス */}
        <div className="grid grid-cols-2 gap-2 mb-5">
          <button onClick={() => setShowShop(true)}
            className="p-3 rounded-2xl text-white active:scale-95 transition-transform flex items-center gap-2"
            style={{ background: 'linear-gradient(135deg, #C77DFF, #7B2CBF)', boxShadow: '0 4px 0 #4A0E78', border: '2px solid #E0AEFF' }}>
            <span className="text-2xl flex-shrink-0">🛍️</span>
            <div className="flex-1 text-left min-w-0">
              <div className="font-black text-sm leading-tight">ショップ</div>
              <div className="text-[10px] font-bold opacity-90 leading-tight">アイテムを購入</div>
            </div>
          </button>
          <button onClick={() => setShowInventory(true)}
            className="p-3 rounded-2xl text-white active:scale-95 transition-transform flex items-center gap-2"
            style={{ background: 'linear-gradient(135deg, #FFB347, #E67E22)', boxShadow: '0 4px 0 #8B4513', border: '2px solid #FFD699' }}>
            <span className="text-2xl flex-shrink-0">🎒</span>

  const InventoryModal = () => {
    if (!showInventory) return null;
    const [tab, setTab] = useState('all');

    // 各装備を「誰が装備中か」マップ化
    const equippedByMonMap = useMemo(() => {
      const map = {};
      for (const m of collection) {
        if (!m.equipped) continue;
        for (const slot of EQUIP_SLOTS) {
          const id = m.equipped[slot];
          if (id) {
            if (!map[id]) map[id] = [];
            map[id].push(m);
          }
        }
      }
      return map;
    }, [collection]);

    // 所持装備一覧（タブでフィルタ）
    const ownedItems = (player.inventory || [])
      .map(id => EQUIPMENT[id])
      .filter(Boolean)
      .filter(eq => tab === 'all' || eq.type === tab);

    // タブ別の「新着のみ」数（バッジ用）
    const newIds = player.inventoryNew || [];
    const newCounts = {
      all:    newIds.length,
      sword:  newIds.filter(id => EQUIPMENT[id]?.type === 'sword').length,
      shield: newIds.filter(id => EQUIPMENT[id]?.type === 'shield').length,
      charm:  newIds.filter(id => EQUIPMENT[id]?.type === 'charm').length,
    };

    // 表示中のタブに該当する新着IDをクリア（モーダル開いた時／タブ切替時）
    useEffect(() => {
      if (!showInventory) return;
      const currentNew = player.inventoryNew || [];
      if (currentNew.length === 0) return;
      const toClear = tab === 'all'
        ? currentNew
        : currentNew.filter(id => EQUIPMENT[id]?.type === tab);
      if (toClear.length === 0) return;
      const remain = currentNew.filter(id => !toClear.includes(id));
      const updated = { ...player, inventoryNew: remain };
      setPlayer(updated);
      savePlayer(updated);
    }, [showInventory, tab]);

    const tabs = [
      { id: 'all', label: 'すべて', emoji: '📦' },
      { id: 'sword', label: '剣', emoji: '🗡️' },
      { id: 'shield', label: '盾', emoji: '🛡️' },
      { id: 'charm', label: 'お守り', emoji: '🍀' },
    ];

    return (
      <div className="fixed inset-0 z-[55] overflow-y-auto p-3" style={{ background: 'rgba(0,0,0,0.85)' }}>
        <div className="min-h-full flex items-start justify-center pt-3" style={{ paddingBottom: 'calc(80px + env(safe-area-inset-bottom, 0px))' }}>

                <span className="text-white font-black">{(player.inventory || []).length}</span>

            <CloseButton onClick={() => setShowInventory(false)} />

            {/* タブ */}

              {tabs.map(tb => {
                const active = tab === tb.id;
                return (
                  <button key={tb.id} onClick={() => setTab(tb.id)}
                    className={`py-2 rounded-xl text-xs font-black transition-all relative ${active ? 'text-orange-900' : 'text-white/70'}`}

                      background: active ? 'linear-gradient(135deg, #FFE066, #FFD700)' : 'rgba(0,0,0,0.3)',

              <div className="space-y-2">

              // 自分の最強モンのLvでロック判定
              const maxMonLv = collection.length > 0 ? Math.max(...collection.map(m => m.level || 1)) : 0;
              const locked = maxMonLv < s.reqLv;
              return (
                <button key={s.id}
                  onClick={() => { if (!locked) { setChosenStage(s); setStep('mon'); } }}
                  className="w-full p-2.5 rounded-2xl text-white text-left transition-transform flex items-center gap-2"
                  style={{
                    background: locked
                      ? 'rgba(50,50,50,0.7)'
                      : `linear-gradient(135deg, ${s.color}, ${s.color}aa)`,
                    boxShadow: locked ? 'none' : `0 4px 0 rgba(0,0,0,0.3)`,
                    border: locked ? '2px solid rgba(255,255,255,0.2)' : '2px solid white',
                    opacity: locked ? 0.65 : 1,
                    transform: locked ? 'none' : undefined,
                  }}
                  {...(!locked && { className: "w-full p-2.5 rounded-2xl text-white text-left active:scale-95 transition-transform flex items-center gap-2" })}
                  >
                  <div className="text-3xl">{locked ? '🔒' : s.emoji}</div>
                  <div className="flex-1 min-w-0">
                    <div className="text-base font-black leading-tight">{s.name}</div>
                    <div className="text-[10px] font-bold opacity-90">
                      {locked
                        ? `Lv.${s.reqLv} 以上の石モンが必要`
                        : `敵レベル ${s.minLv}〜${s.maxLv}`}
                    </div>
                  </div>
                  {locked
                    ? <span className="text-white/50 text-xs font-bold">Lv.{s.reqLv}〜</span>
                    : <ChevronRight className="w-5 h-5 flex-shrink-0" />}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    // 石モン選択: 前回使用モンを先頭に、残りは強さ（総合ステ）順
    const sortedCollection = [...collection].sort((a, b) => {
      const aIsLast = a.id === player.lastBattleMonId;
      const bIsLast = b.id === player.lastBattleMonId;
      if (aIsLast && !bIsLast) return -1;
      if (!aIsLast && bIsLast) return 1;
      // 強さ順: rarity → level → 総合ステ
      const sa = getCurrentStats(a), sb = getCurrentStats(b);
      const totalA = sa.hp + sa.kogeki + sa.bougyo + sa.speed;
      const totalB = sb.hp + sb.kogeki + sb.bougyo + sb.speed;
      return b.rarity - a.rarity || (b.level || 1) - (a.level || 1) || totalB - totalA;
    });

    return (
      <div className="px-4 pt-6 pb-32 relative">
        <CloseButton onClick={() => setStep('stage')} />
        <h2 className="text-3xl font-black text-white text-center mb-1" style={{ textShadow: '0 4px 0 rgba(0,0,0,0.3)' }}>
          {chosenStage.emoji} {chosenStage.name}
        </h2>
        <p className="text-center text-yellow-200 text-sm font-bold mb-4">どの石モンでバトル？</p>
        {collection.length === 0 ? (
          <div className="text-center text-white/70 mt-12 font-bold">まずは石モンを集めよう！</div>
        ) : (
          <div className="space-y-2">
            {sortedCollection.map(m => {
              const t = TYPES[m.type] || TYPES['土'];
              const cur = getCurrentStats(m);
              const total = cur.hp + cur.kogeki + cur.bougyo + cur.speed;
              const isLastUsed = m.id === player.lastBattleMonId;
              return (
                <button key={m.id} onClick={() => startBattle(m, chosenStage)}
                  className="w-full flex items-center gap-3 p-3 rounded-2xl active:scale-95 transition-transform relative"
                  style={{ background: `linear-gradient(90deg, ${t.light}, ${t.bg})`, border: `3px solid ${isLastUsed ? '#FFD700' : 'white'}`, boxShadow: `0 4px 0 ${t.dark}` }}>
                  {isLastUsed && (
                    <div className="absolute top-1 right-1 bg-yellow-400 rounded-full px-1.5 py-0.5 text-[8px] font-black text-yellow-900 leading-none">
                      前回
                    </div>
                  )}
                  {m.imageDataUrl ? (
                    <img src={m.imageDataUrl} className="w-14 h-14 rounded-xl object-cover" style={{ border: '2px solid white' }} />
                  ) : (
                    <div className="w-14 h-14 rounded-xl flex items-center justify-center" style={{ background: `${t.dark}66`, border: '2px solid white' }}>
                      <span className="text-3xl">{t.emoji}</span>
                    </div>
                  )}
                  <div className="flex-1 text-left">
                    <div className="font-black text-white text-lg leading-tight" style={{ textShadow: `0 2px 0 ${t.dark}` }}>{m.name}</div>
                    <div className="text-xs font-bold text-white/95">Lv.{m.level || 1} ・ 総合 {total} ・ {t.emoji}{t.name}</div>
                  </div>
                  <Swords className="w-5 h-5 text-white flex-shrink-0" />
                </button>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  // ===========================================
  // バトル画面
  // ===========================================
  const BattleView = () => {

          <polygon points="0,100 0,75 20,50 35,68 50,38 65,60 80,42 95,56 100,52 100,100" fill="#362408" opacity="0.6"/>

      densetsu: (

                  style={{ background: 'linear-gradient(180deg, #4FC3F7, #0277BD)', boxShadow: '0 6px 0 #01396B, 0 0 20px rgba(2,119,189,0.4)', border: '3px solid #FFD700' }}>

                  <Sparkles className="w-7 h-7 text-white" strokeWidth={2.5} />

  };

  const HpBar = ({ current, max }) => {

    const color = ratio > 0.5 ? '#52B788' : ratio > 0.2 ? '#FFC42B' : '#C73E1D';

      <div className="flex items-center gap-1.5">

  const ActionButton = ({ icon: Icon, label, sublabel, color, onClick }) => (
    <button onClick={onClick} className="rounded-xl p-2 text-white font-black active:scale-90 transition-transform"

  const BattleResultModal = ({ result, onClose }) => {
    const isWin = result.result === 'win';
    const isDraw = result.result === 'draw';

    return (
      <div className="fixed inset-0 z-[55] overflow-y-auto p-3" style={{ background: 'rgba(0,0,0,0.85)' }}>
        <div className="min-h-full flex items-start justify-center pt-6" style={{ paddingBottom: 'calc(80px + env(safe-area-inset-bottom, 0px))' }}>
          <div className="w-full max-w-sm rounded-3xl p-5 text-center"
            style={{ background: 'linear-gradient(180deg, #2a1a3a 0%, #1a0a05 100%)', border: `3px solid ${titleColor}`, boxShadow: `0 0 50px ${titleColor}80` }}>
            <div className="text-5xl mb-2">{isWin ? '🏆' : isDraw ? '🤝' : '💔'}</div>
            <div className="text-4xl font-black mb-3" style={{ color: titleColor, textShadow: `0 0 20px ${titleColor}` }}>{titleText}</div>
            <div className="bg-white/10 rounded-2xl p-3 mb-3" style={{ border: '1px solid rgba(255,255,255,0.2)' }}>

              <div className="text-white text-2xl font-black">+{result.expGained} EXP</div>
              <div className="text-white/80 text-[11px] font-bold mt-0.5">プレイヤーEXP +{result.playerExp}</div>
              {result.leveledUp && (
                <div className="mt-2 p-2 rounded-xl" style={{ background: 'linear-gradient(135deg, #FFD700, #FF6B35)' }}>
                  <div className="text-white font-black text-base flex items-center justify-center gap-1">
                    <ArrowUp className="w-4 h-4" /> レベルアップ！
                  </div>
                  <div className="text-white text-xs font-bold">Lv.{result.newLevel} になった！</div>
                </div>
              )}
            </div>

              <div className="rounded-2xl p-3 mb-3"

  // ===========================================

  // ===========================================
  const LoadingView = () => {
    // 表示する豆知識・占い・予言（ローディング中にローテーション）
