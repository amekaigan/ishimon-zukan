      const updated = { ...player, monGroups: groups.filter(g => g.id !== gid) };
      setPlayer(updated);
      savePlayer(updated);
      const updatedCol = collection.map(m => m.groupId === gid ? { ...m, groupId: null } : m);
      setCollection(updatedCol);
      saveCollection(updatedCol);
      setCollectionFilter('all');
    };

    // グループ名変更
    const renameGroup = (gid) => {
      const name = editingGroupName.trim().slice(0, GROUP_NAME_MAX);
      if (!name) return;
      const updated = { ...player, monGroups: groups.map(g => g.id === gid ? { ...g, name } : g) };
      setPlayer(updated);
      savePlayer(updated);
      setEditingGroup(null);
    };

    // 石モン お気に入りトグル（フィルタ画面内から）
    const toggleFavInList = (mon) => {
      const updated = collection.map(m => m.id === mon.id ? { ...m, isFav: !m.isFav } : m);
      setCollection(updated);
      saveCollection(updated);
    };

    // 石モン グループ削除（グループ画面内から）
    const removeFromGroup = (mon, gid) => {
      const updated = collection.map(m => m.id === mon.id ? { ...m, groupId: null } : m);
      setCollection(updated);
      saveCollection(updated);
    };

    const currentGroup = groups.find(g => g.id === collectionFilter);

    // フィルタ後ソート
    const filtered = collection.filter(m => {
      if (collectionFilter === 'fav') return m.isFav;
      if (collectionFilter !== 'all') return m.groupId === collectionFilter;
      return true;
    });
    const sorted = [...filtered].sort((a, b) => {
      if (collectionSort === 'newest') return (b.capturedAt || '').localeCompare(a.capturedAt || '');
      if (collectionSort === 'rarity')  return (b.rarity || 0) - (a.rarity || 0);
      if (collectionSort === 'strength') {
        const power = m => { const c = getCurrentStats(m); return c.hp + c.kogeki + c.bougyo + c.speed; };
        return power(b) - power(a);
      }
      return 0;
    });

    return (
      <div className="px-3 pt-4 pb-24">
        <h2 className="text-2xl font-black text-white text-center mb-0.5" style={{ textShadow: '0 3px 0 rgba(0,0,0,0.3)' }}>図鑑</h2>
        <p className="text-center text-yellow-200 text-xs font-bold mb-2">{collection.length}体 収集済み</p>

        {/* フィルタバー */}
        {collection.length > 0 && (
          <div className="mb-2">
            <div className="flex gap-1 flex-wrap">
              <button onClick={() => setCollectionFilter('all')}
                className="px-2.5 py-1 rounded-full text-[11px] font-black active:scale-95"
                style={{ background: collectionFilter === 'all' ? '#FFD700' : 'rgba(255,255,255,0.12)', color: collectionFilter === 'all' ? '#333' : 'rgba(255,255,255,0.8)', border: collectionFilter === 'all' ? '1.5px solid white' : '1.5px solid transparent' }}>
                全て
              </button>
              <button onClick={() => setCollectionFilter('fav')}
                className="px-2.5 py-1 rounded-full text-[11px] font-black active:scale-95"
                style={{ background: collectionFilter === 'fav' ? '#FF3D7F' : 'rgba(255,255,255,0.12)', color: 'white', border: collectionFilter === 'fav' ? '1.5px solid white' : '1.5px solid transparent' }}>
                ❤️ お気に入り
              </button>
              {groups.map(g => (
                <button key={g.id} onClick={() => setCollectionFilter(g.id)}
                  className="px-2.5 py-1 rounded-full text-[11px] font-black active:scale-95"
                  style={{ background: collectionFilter === g.id ? g.color : 'rgba(255,255,255,0.12)', color: 'white', border: collectionFilter === g.id ? '1.5px solid white' : '1.5px solid transparent' }}>
                  {g.name} ({collection.filter(m => m.groupId === g.id).length})
                </button>
              ))}
              {groups.length < 4 && (
                <button onClick={() => setShowGroupEditor(v => !v)}
                  className="px-2.5 py-1 rounded-full text-[11px] font-black active:scale-95"
                  style={{ background: showGroupEditor ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.1)', color: 'rgba(255,255,255,0.7)', border: '1.5px dashed rgba(255,255,255,0.35)' }}>
                  ＋グループ
                </button>
              )}
            </div>

            {/* グループ追加フォーム */}
            {showGroupEditor && (
              <div className="mt-2 bg-black/30 rounded-xl p-2" style={{ border: '1px solid rgba(255,255,255,0.2)' }}>
                <div className="flex gap-1 items-center">
                  <input
                    value={groupNameInput}
                    onChange={e => setGroupNameInput(e.target.value.slice(0, GROUP_NAME_MAX))}
                    placeholder={`名前（${GROUP_NAME_MAX}文字まで）`}
                    className="flex-1 min-w-0 rounded-lg px-2 py-1.5 text-xs font-bold text-gray-800"
                    style={{ border: '2px solid #FFD700', outline: 'none' }}
                    autoFocus
                    onKeyDown={e => { if (e.key === 'Enter') addGroup(); if (e.key === 'Escape') setShowGroupEditor(false); }}
                  />
                  <span className="text-[10px] text-white/50 font-bold flex-shrink-0">{groupNameInput.length}/{GROUP_NAME_MAX}</span>
                  <button onClick={addGroup}
                    className="bg-yellow-400 rounded-lg px-2.5 py-1.5 text-xs font-black text-yellow-900 active:scale-95 flex-shrink-0">追加</button>
                  <button onClick={() => { setShowGroupEditor(false); setGroupNameInput(''); }}
                    className="rounded-lg px-2 py-1.5 text-xs font-black text-white/70 active:scale-95 flex-shrink-0"
                    style={{ background: 'rgba(255,255,255,0.15)' }}>✕</button>
                </div>
              </div>
            )}

            {/* グループ管理パネル（グループフィルタ選択時） */}
            {currentGroup && (
              <div className="mt-2 rounded-xl p-2.5" style={{ background: `${currentGroup.color}22`, border: `1.5px solid ${currentGroup.color}66` }}>
                <div className="flex items-center gap-2 mb-2">
                  <div className="w-3 h-3 rounded-full flex-shrink-0" style={{ background: currentGroup.color }} />
                  {editingGroup === currentGroup.id ? (
                    <div className="flex gap-1 flex-1 items-center">
                      <input value={editingGroupName}
                        onChange={e => setEditingGroupName(e.target.value.slice(0, GROUP_NAME_MAX))}
                        className="flex-1 min-w-0 rounded-lg px-2 py-0.5 text-xs font-bold text-gray-800"
                        style={{ border: `2px solid ${currentGroup.color}`, outline: 'none' }}
                        autoFocus
                        onKeyDown={e => { if (e.key === 'Enter') renameGroup(currentGroup.id); if (e.key === 'Escape') setEditingGroup(null); }}
                      />
                      <span className="text-[9px] text-white/50">{editingGroupName.length}/{GROUP_NAME_MAX}</span>
                      <button onClick={() => renameGroup(currentGroup.id)}
                        className="rounded-lg px-2 py-0.5 text-[10px] font-black text-yellow-900 active:scale-95"
                        style={{ background: '#FFD700' }}>OK</button>
                      <button onClick={() => setEditingGroup(null)}
                        className="rounded-lg px-2 py-0.5 text-[10px] font-black text-white/70 active:scale-95"
                        style={{ background: 'rgba(255,255,255,0.15)' }}>✕</button>
                    </div>
                  ) : (
                    <div className="flex items-center gap-2 flex-1">
                      <span className="text-white font-black text-sm">{currentGroup.name}</span>
                      <button onClick={() => { setEditingGroup(currentGroup.id); setEditingGroupName(currentGroup.name); }}
                        className="text-[10px] font-bold px-1.5 py-0.5 rounded active:scale-95"
                        style={{ background: 'rgba(255,255,255,0.15)', color: 'rgba(255,255,255,0.7)' }}>✏️ 名前変更</button>
                      <button onClick={() => deleteGroup(currentGroup.id)}
                        className="text-[10px] font-bold px-1.5 py-0.5 rounded active:scale-95 ml-auto"
                        style={{ background: 'rgba(255,0,0,0.2)', color: '#FF8888', border: '1px solid rgba(255,0,0,0.3)' }}>🗑️ 削除</button>
                    </div>
                  )}
                </div>
                {sorted.length > 0 && (
                  <div className="text-white/50 text-[9px] font-bold">タップで石モン詳細 → 詳細画面からグループ変更できます</div>
                )}
              </div>
            )}

            {/* お気に入りパネル（お気に入りフィルタ選択時） */}
            {collectionFilter === 'fav' && (
              <div className="mt-2 rounded-xl p-2" style={{ background: 'rgba(255,61,127,0.15)', border: '1.5px solid rgba(255,61,127,0.4)' }}>
                <div className="text-white/60 text-[9px] font-bold">❤️ タップで石モン詳細 → 詳細画面からお気に入り変更できます</div>
              </div>
            )}
          </div>
        )}

        {/* ソートバー */}
        {collection.length > 0 && (
          <div className="flex gap-1 mb-3 bg-black/30 rounded-xl p-1" style={{ border: '1px solid rgba(255,255,255,0.15)' }}>
            {[
              { id: 'newest', label: '新しい順', icon: '🆕' },
              { id: 'rarity', label: 'レア度', icon: '⭐' },
              { id: 'strength', label: '強さ', icon: '💪' },
            ].map(s => (
              <button key={s.id} onClick={() => setCollectionSort(s.id)}
                className="flex-1 py-1.5 rounded-lg text-[11px] font-black active:scale-95 transition-transform"
                style={{
                  background: collectionSort === s.id ? 'linear-gradient(135deg, #FFD700, #FF6B35)' : 'transparent',
                  color: collectionSort === s.id ? 'white' : 'rgba(255,255,255,0.7)',
                  border: collectionSort === s.id ? '1px solid white' : '1px solid transparent',
                }}>
                {s.icon} {s.label}
              </button>
            ))}
          </div>
        )}

        {collection.length === 0 ? (
          <div className="text-center mt-12 text-white/70 font-bold"><div className="text-6xl mb-3">📷</div>まだ石モンがいません！</div>
        ) : sorted.length === 0 ? (
          <div className="text-center mt-8 text-white/60 font-bold">
            <div className="text-4xl mb-2">🔍</div>
            {collectionFilter === 'fav' ? 'お気に入りがまだいません' : 'このグループに石モンがいません'}
            <div className="text-[11px] mt-2 text-white/40">石モンの詳細画面から追加できます</div>
          </div>
        ) : (
          <div className="grid grid-cols-2 gap-2">
            {sorted.map((m) => {
              const t = TYPES[m.type] || TYPES['土'];
              const r = getRarityLabel(m.rarity);
              const monGroup = groups.find(g => g.id === m.groupId);
              return (
                <button key={m.id} onClick={() => setSelected(m)}
                  className="rounded-2xl overflow-hidden active:scale-95 transition-transform relative"
                  style={{ background: `linear-gradient(180deg, ${t.light}, ${t.bg})`, border: `2px solid ${r.color}`, boxShadow: `0 3px 0 ${t.dark}` }}>
                  <div className="relative">
                    {m.imageDataUrl ? (
                      <img src={m.imageDataUrl} className="w-full h-24 object-cover" />
                    ) : (
                      <div className="w-full h-24 flex items-center justify-center" style={{ background: `${t.dark}33` }}><span className="text-4xl">{t.emoji}</span></div>
                    )}
                    <div className="absolute top-1 left-1 bg-white/90 rounded-full px-1.5 py-0.5 text-[10px] font-black" style={{ color: r.color }}>{'★'.repeat(m.rarity)}</div>
                    <div className="absolute top-1 right-1 bg-black/60 rounded-full px-1.5 py-0.5 text-[10px] font-black text-yellow-300">Lv.{m.level || 1}</div>
                    {/* お気に入りバッジ */}
                    {m.isFav && (
                      <div className="absolute bottom-1 right-1 text-base leading-none">❤️</div>
                    )}
                    {/* グループカラーバッジ */}
                    {monGroup && (
                      <div className="absolute bottom-1 left-1 px-1.5 py-0.5 rounded-full text-[8px] font-black text-white leading-none"
                        style={{ background: monGroup.color }}>
                        {monGroup.name}
                      </div>
                    )}
                  </div>
                  <div className="p-1.5 bg-white/95">
                    <div className="font-black text-xs text-gray-800 truncate">{m.name}</div>
                    <div className="flex items-center justify-between mt-1 gap-1">
                      <span className="inline-flex items-center gap-0.5 rounded-full px-1.5 py-0.5 font-black text-[10px] text-white"
                        style={{ background: `linear-gradient(135deg, ${t.bg}, ${t.dark})`, border: '1.5px solid white', boxShadow: `0 1px 0 ${t.dark}`, textShadow: '0 1px 0 rgba(0,0,0,0.25)' }}>
                        <span className="text-sm leading-none">{t.emoji}</span>
                        <span className="leading-none">{t.name}</span>
                      </span>
                      {m.evolveTo && m.stage < 3 && <span className="text-[9px] font-black flex-shrink-0" style={{ color: '#FF6B35' }}>進化</span>}
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  const RankingView = () => (
    <div className="px-4 pt-6 pb-32 relative">
      <CloseButton onClick={() => setView('profile')} />
      <h2 className="text-3xl font-black text-white text-center mb-1" style={{ textShadow: '0 4px 0 rgba(0,0,0,0.3)' }}>ランキング</h2>
      <p className="text-center text-yellow-200 text-sm font-bold mb-6">強い順に表示！</p>
      {ranked.length === 0 ? (
        <div className="text-center mt-12 text-white/70 font-bold"><div className="text-6xl mb-3">🏆</div>石モンを 集めよう！</div>
      ) : (
        <div className="space-y-2">
          {ranked.map((m, i) => {
            const t = TYPES[m.type] || TYPES['土'];
            const cur = getCurrentStats(m);
            const total = totalStat(cur);
            const medals = ['🥇', '🥈', '🥉'];
            return (
              <button key={m.id} onClick={() => setSelected(m)}
                className="w-full flex items-center gap-3 p-3 rounded-2xl active:scale-[0.98] transition-transform"
                style={{ background: `linear-gradient(90deg, ${t.light}, ${t.bg})`, border: `3px solid ${i < 3 ? '#FFD700' : 'white'}`, boxShadow: `0 4px 0 ${t.dark}` }}>
                <div className="w-10 text-center">
                  {i < 3 ? (<div className="text-3xl">{medals[i]}</div>) : (<div className="text-2xl font-black text-white" style={{ textShadow: `0 2px 0 ${t.dark}` }}>{i + 1}</div>)}
                </div>
                {m.imageDataUrl ? (
                  <img src={m.imageDataUrl} className="w-16 h-16 rounded-xl object-cover" style={{ border: '3px solid white' }} />
                ) : (
                  <div className="w-16 h-16 rounded-xl flex items-center justify-center" style={{ background: `${t.dark}66`, border: '3px solid white' }}><span className="text-3xl">{t.emoji}</span></div>
                )}
                <div className="flex-1 text-left">
                  <div className="flex items-center gap-1">
                    <span className="text-xs">{t.emoji}</span>
                    <span className="text-xs font-black text-yellow-200">Lv.{m.level || 1}</span>
                    <span className="text-xs font-black text-white">{'★'.repeat(m.rarity)}</span>
                  </div>
                  <div className="font-black text-white text-lg leading-tight" style={{ textShadow: `0 2px 0 ${t.dark}` }}>{m.name}</div>
                  <div className="text-xs font-bold text-white/90">総合 {total}</div>
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );

  // ===========================================
  // マイページView（タブから直接表示）
  // ===========================================
  const ProfileView = () => {
    const expRatio = (player.exp || 0) / playerExpForNextLevel(player.level || 1);
    const NAME_MAX = 8;
    const [nameCount, setNameCount] = useState((player.name || '').length);

    const saveName = () => {
      const value = nameInputRef.current?.value || '';
      const trimmed = value.trim().slice(0, NAME_MAX);
      if (!trimmed) { setEditingName(false); return; }
      const updated = { ...player, name: trimmed };
      setPlayer(updated);
      savePlayer(updated);
      setEditingName(false);
    };

    return (
      <div className="px-4 pt-6 pb-32">
        <h2 className="text-3xl font-black text-white text-center mb-4"
          style={{ textShadow: '0 4px 0 rgba(0,0,0,0.3)' }}>
          マイページ
        </h2>

        {/* ===== プロフィールカード ===== */}
        <div className="rounded-3xl p-4 mb-4"
          style={{ background: 'linear-gradient(180deg, rgba(25,118,210,0.6), rgba(13,71,161,0.6))', border: '4px solid #FFD700' }}>

          {/* 上段: アバター + 名前・Lv・称号 */}
          <div className="flex items-center gap-3 mb-3">
            {/* アバター（タップで写真変更） */}
            <div className="relative flex-shrink-0">
              <label htmlFor="avatar-upload" className="cursor-pointer block active:scale-95 transition-transform">
                {player.avatarPhoto ? (
                  <img src={player.avatarPhoto}
                    className="w-16 h-16 rounded-2xl object-cover"
                    style={{ border: '3px solid #FFD700', boxShadow: '0 0 12px rgba(255,215,0,0.5)' }} />
                ) : (
                  <div className="w-16 h-16 rounded-2xl flex items-center justify-center"
                    style={{ background: 'linear-gradient(135deg, #FFD700, #FF6B35)', border: '3px solid #FFD700', boxShadow: '0 0 12px rgba(255,215,0,0.4)' }}>
                    <User className="w-8 h-8 text-yellow-900" strokeWidth={3} />
                  </div>
                )}
                <div className="absolute -bottom-1 -right-1 w-5 h-5 rounded-full flex items-center justify-center"
                  style={{ background: '#FFD700', border: '2px solid #1a3a7c', fontSize: '10px' }}>
                  📷
                </div>
              </label>
              <input id="avatar-upload" type="file" accept="image/*" className="hidden"
                onChange={e => {
                  const f = e.target.files?.[0];
                  if (!f) return;
                  const reader = new FileReader();
                  reader.onload = ev => {
                    const dataUrl = ev.target.result;
                    // 圧縮: canvas で 128x128 にリサイズ
                    const img = new Image();
                    img.onload = () => {
                      const canvas = document.createElement('canvas');
                      canvas.width = 128; canvas.height = 128;
                      const ctx2 = canvas.getContext('2d');
                      const size = Math.min(img.width, img.height);
                      const ox = (img.width - size) / 2;
                      const oy = (img.height - size) / 2;
                      ctx2.drawImage(img, ox, oy, size, size, 0, 0, 128, 128);
                      const compressed = canvas.toDataURL('image/jpeg', 0.7);
                      const updated = { ...player, avatarPhoto: compressed };
                      setPlayer(updated);
                      savePlayer(updated);
                    };
                    img.src = dataUrl;
                  };
                  reader.readAsDataURL(f);
                }} />
            </div>

            {/* 名前・Lv・称号 */}
            <div className="flex-1 min-w-0">
              {editingName ? (
                <div className="mb-0.5">
                  <div className="flex gap-1.5 items-center mb-1">
                    <input ref={nameInputRef} defaultValue={player.name || 'トレーナー'}
                      onKeyDown={e => { if (e.key === 'Enter') saveName(); if (e.key === 'Escape') setEditingName(false); }}
                      onChange={e => setNameCount(Math.min(e.target.value.length, NAME_MAX))}
                      maxLength={NAME_MAX} autoFocus
                      className="flex-1 min-w-0 rounded-xl px-2 py-1 font-black text-gray-800 text-sm"
                      style={{ border: '2px solid #FFD700', outline: 'none' }} />
                    <button onClick={saveName}
                      className="bg-yellow-400 rounded-xl px-2 py-1 font-black text-yellow-900 text-xs active:scale-95 flex-shrink-0"
                      style={{ border: '2px solid white' }}>OK</button>
                    <button onClick={() => setEditingName(false)}
                      className="rounded-xl px-2 py-1 font-black text-white/80 text-xs active:scale-95 flex-shrink-0"
                      style={{ background: 'rgba(255,255,255,0.15)', border: '2px solid rgba(255,255,255,0.3)' }}>✕</button>
                  </div>
                  <div className="text-right text-[10px] font-bold" style={{ color: nameCount >= NAME_MAX ? '#FF6B35' : 'rgba(255,255,255,0.5)' }}>
                    {nameCount} / {NAME_MAX}
                  </div>
                </div>
              ) : (
                <button onClick={() => setEditingName(true)}
                  className="flex items-center gap-1.5 active:scale-95 mb-0.5 max-w-full">
                  <div className="text-white font-black text-base leading-tight truncate max-w-[150px]">{player.name || 'トレーナー'}</div>
                  <svg className="w-3.5 h-3.5 text-yellow-300 flex-shrink-0" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                  </svg>
                </button>
              )}
              <div className="text-yellow-200 font-black text-sm mb-1">Lv.{player.level}</div>
              {/* 選択中称号バッジ */}
              {(() => {
                if (!player.activeTitle) return (
                  <button onClick={() => setView('settings')}
                    className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full active:scale-95"
                    style={{ background: 'rgba(255,255,255,0.1)', border: '1px dashed rgba(255,255,255,0.35)' }}>
                    <span className="text-[10px] text-white/60 font-bold">称号なし ⚙</span>
                  </button>
                );
                const t = getTitleById(player.activeTitle);
                if (!t) return null;
                const r = TITLE_RARITY[t.rarity] || TITLE_RARITY.common;
                return (
                  <button onClick={() => setView('settings')}
                    className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full active:scale-95"
                    style={{
                      background: `linear-gradient(90deg, ${r.color}44, ${r.glow}44)`,
                      border: `1.5px solid ${r.color}`,
                      boxShadow: `0 0 10px ${r.color}55`,
                    }}>
                    <span className="text-sm leading-none">{t.emoji}</span>
                    <span className="text-white font-black text-[11px]">{t.name}</span>
                  </button>
                );
              })()}
            </div>
          </div>

          {/* 経験値バー */}
          <div className="bg-black/40 rounded-xl p-2.5 mb-3" style={{ border: '1.5px solid #FFD700' }}>
            <div className="flex justify-between mb-1 text-[10px] font-bold text-white/80">
              <span>経験値</span><span>{player.exp || 0}/{playerExpForNextLevel(player.level)}</span>
            </div>
            <div className="h-2.5 rounded-full overflow-hidden" style={{ background: 'rgba(255,255,255,0.2)' }}>
              <div className="h-full rounded-full" style={{ width: `${expRatio * 100}%`, background: 'linear-gradient(90deg, #FFE066, #FF6B35)' }} />
            </div>
          </div>

          {/* ログイン・きらめき石・石のかけら の3つ */}
          <div className="grid grid-cols-3 gap-2 mb-3">
            <div className="bg-white/10 rounded-xl p-2 text-center" style={{ border: '1px solid rgba(255,255,255,0.2)' }}>
              <Calendar className="w-4 h-4 text-orange-300 mx-auto mb-0.5" />
              <div className="text-white font-black text-lg leading-tight">{player.streak}</div>

            const typeCounts = {};

                      <div className="grid grid-cols-4 gap-1">
                        {[['バトル数', battles, 'text-white'], ['勝利', wins, 'text-green-300'], ['敗北', losses, 'text-red-300'], ['勝率', winRate + '%', 'text-yellow-200']].map(([label, val, cls]) => (
                          <div key={label} className="text-center">
                            <div className="text-white/60 text-[8px] font-bold">{label}</div>
                            <div className={`font-black text-sm ${cls}`}>{val}</div>

                    </div>

                    {/* タイプ別所持数（横2列） */}
                    {collection.length > 0 && (
                      <div className="rounded-xl p-2.5"
                        style={{ background: 'rgba(0,0,0,0.25)', border: '1px solid rgba(255,255,255,0.15)' }}>
                        <div className="text-yellow-300 text-[9px] font-black tracking-widest mb-1.5">🌈 タイプ別 所持数</div>
                        <div className="grid grid-cols-2 gap-1.5">
                          {Object.keys(TYPES).map(tk => {
                            const t = TYPES[tk];
                            const cnt = typeCounts[tk] || 0;
                            const maxCnt = Math.max(1, ...Object.values(typeCounts));
                            return (
                              <div key={tk} className="flex items-center gap-2 rounded-lg px-2 py-1.5"
                                style={{
                                  background: cnt > 0 ? `${t.bg}33` : 'rgba(255,255,255,0.04)',
                                  border: `1px solid ${cnt > 0 ? t.light : 'rgba(255,255,255,0.1)'}`,
                                  opacity: cnt > 0 ? 1 : 0.45,

                                  <div className="flex items-center justify-between mb-0.5">

                                    <span className="text-white font-black text-xs">{cnt}</span>
                                  </div>
                                  {/* ステータスバー */}
                                  <div className="h-1 rounded-full overflow-hidden" style={{ background: 'rgba(255,255,255,0.15)' }}>
                                    <div className="h-full rounded-full"
                                      style={{ width: `${(cnt / maxCnt) * 100}%`, background: t.bg }} />
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })()}
        </div>

        {/* AI画像生成について */}
        <div className="rounded-2xl p-3 mb-4"
          style={{ background: 'rgba(106,13,173,0.3)', border: '1px solid rgba(199,125,255,0.4)' }}>

            <div className="flex-1">

              <div className="text-white text-xs font-bold leading-relaxed mt-0.5">
                撮影・進化・ガチャでAIが世界に1つだけのオリジナル石モンを自動生成します。完全無料でアカウント登録不要。
              </div>

        {/* ランキングへのリンク */}

          <Trophy className="w-5 h-5" />
          <div className="flex-1 text-left">

            <div className="font-black text-sm">設定</div>

  // ===========================================
  // 設定画面
  // ===========================================
  const SettingsView = () => {
    const importFileRef = useRef(null);
    const [importStatus, setImportStatus] = useState('');

    // 開いたらページ上部にスクロール
    useEffect(() => {
      window.scrollTo(0, 0);
    }, []);

    const handleExport = async () => {
      try {
        const exportData = {
          version: 1,
          exportedAt: new Date().toISOString(),
          appName: 'IshimonZukan',
          collection: collection,
          player: player,
          settings: settings,
        };
        const json = JSON.stringify(exportData, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const dateStr = new Date().toISOString().slice(0, 10);
        a.href = url;
        a.download = `ishimon-backup-${dateStr}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        setImportStatus('✅ データを書き出しました！大切に保管してね');
        setTimeout(() => setImportStatus(''), 4000);
      } catch (e) {
        console.error(e);
        setImportStatus('❌ 書き出しに失敗しました');
        setTimeout(() => setImportStatus(''), 4000);
      }
    };

    const handleImportFile = async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        if (!data || data.appName !== 'IshimonZukan' || !data.collection || !data.player) {
          setImportStatus('❌ 石モン図鑑のバックアップファイルではありません');
          setTimeout(() => setImportStatus(''), 4000);
          return;
        }
        const ok = window.confirm(
          '読み込むと、現在のデータはすべて上書きされます。\n本当に復元しますか？\n\n' +
          `バックアップ日時: ${data.exportedAt ? new Date(data.exportedAt).toLocaleString('ja-JP') : '不明'}\n` +
          `石モン: ${data.collection.length}体\n` +
          `プレイヤー: ${data.player.name || 'トレーナー'} (Lv.${data.player.level || 1})`
        );
        if (!ok) return;
        setCollection(data.collection);
        setPlayer(data.player);
        if (data.settings) setSettings(prev => ({ ...prev, ...data.settings }));
        await window.storage.set('ishimon-collection-v3', JSON.stringify(data.collection));
        await window.storage.set('ishimon-player-v3', JSON.stringify(data.player));
        if (data.settings) {
          await window.storage.set('ishimon-settings-v1', JSON.stringify({ ...settings, ...data.settings }));
        }
        setImportStatus('✅ データを復元しました！');
        setTimeout(() => setImportStatus(''), 4000);
      } catch (err) {
        console.error(err);
        setImportStatus('❌ ファイルを読み込めませんでした');
        setTimeout(() => setImportStatus(''), 4000);
      } finally {
        if (importFileRef.current) importFileRef.current.value = '';
      }
    };

    const handleReset = async () => {
      const ok1 = window.confirm('本当にすべてのデータを削除しますか？\nこの操作は取り消せません！');
      if (!ok1) return;
      const ok2 = window.confirm('最終確認：石モン・プレイヤー・設定すべてが消えます。よろしいですか？');
      if (!ok2) return;
      try {
        await window.storage.delete('ishimon-collection-v3');
        await window.storage.delete('ishimon-player-v3');
        await window.storage.delete('ishimon-settings-v1');
        await window.storage.delete('ishimon-image-cache-v1').catch(() => {});
        location.reload();
      } catch (e) {
        console.error(e);
        setImportStatus('❌ リセットに失敗しました');
      }
    };

    // 各種スイッチの共通スタイル
    const Toggle = ({ on, onClick }) => (
      <button onClick={onClick}
        className="active:scale-95 transition-transform"
        style={{
          width: '52px', height: '30px', borderRadius: '15px',
          background: on ? 'linear-gradient(135deg, #FFD700, #FF6B35)' : 'rgba(255,255,255,0.2)',
          border: '2px solid white', position: 'relative',
          boxShadow: on ? '0 2px 8px rgba(255,107,53,0.5)' : 'none',
        }}>
        <div style={{
          position: 'absolute', top: '2px', left: on ? '24px' : '2px',
          width: '22px', height: '22px', borderRadius: '50%',
          background: 'white', transition: 'left 0.2s',
          boxShadow: '0 1px 3px rgba(0,0,0,0.3)',
        }} />
      </button>
    );

    const SettingRow = ({ icon, label, desc, children }) => (
      <div className="flex items-center gap-3 py-3 px-3 rounded-xl"
        style={{ background: 'rgba(255,255,255,0.08)', border: '1px solid rgba(255,255,255,0.1)' }}>
        <span className="text-xl flex-shrink-0">{icon}</span>
        <div className="flex-1 min-w-0">
          <div className="text-white font-black text-sm leading-tight">{label}</div>
          {desc && <div className="text-white/60 text-[10px] font-bold mt-0.5 leading-tight">{desc}</div>}
        </div>
        <div className="flex-shrink-0">{children}</div>
      </div>
    );

    const difficulties = [
      { id: 'easy',   label: 'かんたん', desc: '敵が弱め', emoji: '🌱' },
      { id: 'normal', label: 'ふつう',   desc: 'バランス', emoji: '⚔️' },
      { id: 'hard',   label: 'むずかしい', desc: '敵が強い', emoji: '🔥' },
    ];

    return (
      <div className="min-h-screen p-4 pb-32 relative">
        <CloseButton onClick={() => setView('profile')} />

        <h2 className="text-3xl font-black text-white text-center mb-1" style={{ textShadow: '0 4px 0 rgba(0,0,0,0.3)' }}>⚙️ 設定</h2>
        <p className="text-center text-yellow-200 text-xs font-bold mb-4">ゲームの好みをカスタマイズ</p>

        {/* Googleアカウント連携 */}
        <div className="mb-4">
          <div className="text-yellow-300 text-xs font-black tracking-widest mb-2 px-1">🔐 アカウント</div>
          {firebaseUser ? (
            <div className="rounded-2xl p-3" style={{ background: 'rgba(0,0,0,0.3)', border: '2px solid #52B788' }}>
              <div className="flex items-center gap-3 mb-3">
                {firebaseUser.photoURL ? (
                  <img src={firebaseUser.photoURL} className="w-10 h-10 rounded-full" style={{ border: '2px solid #52B788' }} />
                ) : (
                  <div className="w-10 h-10 rounded-full bg-green-700 flex items-center justify-center">
                    <User className="w-5 h-5 text-white" />
                  </div>
                )}
                <div className="flex-1 min-w-0">
                  <div className="text-white font-black text-sm truncate">{firebaseUser.displayName || 'ユーザー'}</div>
                  <div className="text-green-300 text-[10px] font-bold truncate">{firebaseUser.email}</div>
                  <div className="text-white/60 text-[9px] font-bold">✅ データはクラウドに自動保存されています</div>
                </div>
              </div>
              <button onClick={signOutFromGoogle}
                className="w-full py-2 rounded-xl text-white/80 font-black text-sm active:scale-95"
                style={{ background: 'rgba(255,255,255,0.1)', border: '1.5px solid rgba(255,255,255,0.2)' }}>
                ログアウト
              </button>
            </div>
          ) : (
            <div className="rounded-2xl p-3" style={{ background: 'rgba(0,0,0,0.3)', border: '2px solid rgba(255,255,255,0.2)' }}>
              <div className="text-white/80 text-xs font-bold mb-3 leading-relaxed">
                Googleアカウントでログインすると、石モンのデータがクラウドに保存されます。端末を変えても、キャッシュを消しても安心！
              </div>
              <button onClick={signInWithGoogle} disabled={authLoading || !firebaseReady}
                className="w-full py-3 rounded-xl font-black text-sm active:scale-95 flex items-center justify-center gap-2"
                style={{ background: authLoading ? 'rgba(255,255,255,0.2)' : 'white', color: '#333', border: 'none', opacity: (!firebaseReady || authLoading) ? 0.7 : 1 }}>
                {authLoading ? (
                  <><Loader2 className="w-4 h-4 animate-spin" /> ログイン中...</>
                ) : (
                  <>
                    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.31z"/></svg>
                    Googleでログイン
                  </>
                )}
              </button>
            </div>
          )}
        </div>

        {/* 難易度 */}
        <div className="mb-4">
          <div className="text-yellow-300 text-xs font-black tracking-widest mb-2 px-1">⚔️ 難易度</div>
          <div className="grid grid-cols-3 gap-2">
            {difficulties.map(d => {
              const active = settings.difficulty === d.id;
              return (
                <button key={d.id} onClick={() => updateSetting('difficulty', d.id)}
                  className="p-3 rounded-2xl active:scale-95 transition-transform"
                  style={{
                    background: active ? 'linear-gradient(135deg, #FFD700, #FF6B35)' : 'rgba(255,255,255,0.1)',
                    border: active ? '2px solid white' : '2px solid rgba(255,255,255,0.2)',
                    boxShadow: active ? '0 4px 0 #B85C00' : 'none',
                  }}>
                  <div className="text-2xl mb-1">{d.emoji}</div>
                  <div className={`font-black text-xs ${active ? 'text-white' : 'text-white/80'}`}>{d.label}</div>
                  <div className={`text-[9px] font-bold mt-0.5 ${active ? 'text-white/90' : 'text-white/50'}`}>{d.desc}</div>
                </button>
              );
            })}
          </div>
        </div>

        {/* ゲームプレイ */}
        <div className="mb-4">
          <div className="text-yellow-300 text-xs font-black tracking-widest mb-2 px-1">🎮 ゲームプレイ</div>
          <div className="space-y-2">
            <SettingRow icon="🔊" label="効果音" desc="ボタン操作・バトルなどの音">
              <Toggle on={settings.soundEnabled} onClick={() => updateSetting('soundEnabled', !settings.soundEnabled)} />
            </SettingRow>
            <SettingRow icon="📳" label="バイブレーション" desc="iPhoneでは非対応の場合があります">
              <Toggle on={settings.vibrationEnabled} onClick={() => updateSetting('vibrationEnabled', !settings.vibrationEnabled)} />
            </SettingRow>
            <SettingRow icon="✨" label="アニメーション軽減" desc="背景の動きを抑えて省電力に">
              <Toggle on={settings.animationReduced} onClick={() => updateSetting('animationReduced', !settings.animationReduced)} />
            </SettingRow>
            <SettingRow icon="🎴" label="ガチャ確認ダイアログ" desc="ガチャを引く前に確認する">
              <Toggle on={settings.confirmGacha} onClick={() => updateSetting('confirmGacha', !settings.confirmGacha)} />
            </SettingRow>
          </div>

              <Toggle on={settings.showLocation} onClick={() => updateSetting('showLocation', !settings.showLocation)} />

              className="w-full p-3 rounded-2xl text-white active:scale-95 flex items-center gap-3"

              </div>
              <ChevronRight className="w-5 h-5" />
            </button>

            <button onClick={() => importFileRef.current?.click()}
              className="w-full p-3 rounded-2xl text-white active:scale-95 flex items-center gap-3"
              style={{ background: 'linear-gradient(135deg, #4A90E2, #2D5C8F)', boxShadow: '0 4px 0 #1A3A5C', border: '2px solid #7DB0E8' }}>
              <span className="text-2xl">📥</span>
              <div className="flex-1 text-left">
                <div className="font-black text-sm">データを復元する</div>
                <div className="text-[10px] font-bold opacity-90">バックアップファイルから読み込み</div>
              </div>
              <ChevronRight className="w-5 h-5" />
            </button>
            <input ref={importFileRef} type="file" accept="application/json,.json"
              onChange={handleImportFile} className="hidden" />

            {importStatus && (
              <div className="rounded-xl p-2.5 text-center text-xs font-bold text-white"
                style={{ background: 'rgba(0,0,0,0.4)', border: '1px solid rgba(255,255,255,0.2)' }}>
                {importStatus}
              </div>
            )}

            <button onClick={handleReset}
              className="w-full p-3 rounded-2xl text-white active:scale-95 flex items-center gap-3 mt-3"
              style={{ background: 'linear-gradient(135deg, #E53E3E, #9B2C2C)', boxShadow: '0 4px 0 #5A1818', border: '2px solid #FC8181' }}>
              <span className="text-2xl">🗑️</span>
              <div className="flex-1 text-left">
                <div className="font-black text-sm">すべてのデータをリセット</div>
                <div className="text-[10px] font-bold opacity-90">石モン・プレイヤー情報を削除</div>
              </div>
              <ChevronRight className="w-5 h-5" />
            </button>
          </div>
        </div>

        {/* 称号 */}
        <div className="mb-4">
          <div className="text-yellow-300 text-xs font-black tracking-widest mb-2 px-1">
            🏆 称号 <span className="text-white/60 font-bold">({(player.titles || []).length} / {TITLES.length})</span>
          </div>
          {(player.titles || []).length === 0 ? (
            <div className="rounded-2xl p-4 text-center"
              style={{ background: 'rgba(0,0,0,0.3)', border: '2px dashed rgba(255,255,255,0.3)' }}>
              <div className="text-4xl mb-1 opacity-50">🏆</div>
              <div className="text-white/80 font-black text-sm mb-1">まだ称号がありません</div>
              <div className="text-white/60 text-[11px] font-bold">石モンを集めたり、バトルで勝つと獲得できる！</div>
            </div>
          ) : (
            <div className="rounded-2xl overflow-hidden"
              style={{ border: '2px solid rgba(255,215,0,0.4)', background: 'rgba(0,0,0,0.3)' }}>
              {/* スクロールコンテナ（最大4件分の高さ） */}
              <div className="overflow-y-auto" style={{ maxHeight: '280px' }}>
                {/* 「使用しない」オプション */}
                <button
                  onClick={() => {
                    const updated = { ...player, activeTitle: null };
                    setPlayer(updated);
                    savePlayer(updated);
                  }}
                  className="w-full px-3 py-2.5 flex items-center gap-2.5 active:scale-[0.98] transition-all"
                  style={{
                    background: !player.activeTitle ? 'rgba(255,215,0,0.2)' : 'transparent',
                    borderBottom: '1px solid rgba(255,255,255,0.1)',
                  }}>
                  <div className="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0"
                    style={{ background: 'rgba(255,255,255,0.1)', border: '1.5px solid rgba(255,255,255,0.3)' }}>
                    <span className="text-sm">🚫</span>
                  </div>
                  <div className="flex-1 text-left">
                    <div className="text-white font-black text-sm">称号を表示しない</div>
                  </div>
                  {!player.activeTitle && (
                    <div className="w-4 h-4 rounded-full flex items-center justify-center flex-shrink-0"
                      style={{ background: '#FFD700' }}>
                      <span className="text-[8px] text-yellow-900 font-black">✓</span>
                    </div>
                  )}
                </button>

                {/* 獲得済み称号 */}
                {(player.titles || []).map((tid, idx) => {
                  const t = getTitleById(tid);
                  if (!t) return null;
                  const r = TITLE_RARITY[t.rarity] || TITLE_RARITY.common;
                  const active = player.activeTitle === t.id;
                  const isLast = idx === (player.titles || []).length - 1;
                  return (
                    <button key={t.id}
                      onClick={() => {
                        const updated = { ...player, activeTitle: t.id };
                        setPlayer(updated);
                        savePlayer(updated);
                      }}
                      className="w-full px-3 py-2.5 flex items-center gap-2.5 active:scale-[0.98] transition-all"
                      style={{
                        background: active ? `${r.color}1A` : 'transparent',
                        borderBottom: isLast ? 'none' : '1px solid rgba(255,255,255,0.08)',
                        boxShadow: active ? `inset 3px 0 0 ${r.color}` : 'none',
                      }}>
                      {/* 称号Lv バッジ（アイコンの代わり） */}
                      <div className="w-10 flex-shrink-0 flex flex-col items-center gap-0.5">
                        <div className="text-[8px] font-black leading-none" style={{ color: r.color }}>称号</div>
                        <div className="text-base font-black leading-none" style={{ color: r.color }}>Lv.{r.level}</div>
                      </div>
                      {/* テキスト + レア度バー */}
                      <div className="flex-1 min-w-0">
                        <div className="text-white font-black text-sm leading-tight truncate mb-1">{t.name}</div>
                        {/* レア度バー: 4セグメント、塗りつぶし済みは色あり */}
                        <div className="flex items-center gap-0.5 mb-0.5">
                          {[1,2,3,4].map(i => (
                            <div key={i}
                              className="h-1.5 rounded-sm"
                              style={{
                                flex: 1,
                                background: i <= r.level ? r.color : 'rgba(255,255,255,0.12)',
                                boxShadow: i <= r.level ? `0 0 4px ${r.color}88` : 'none',
                              }} />
                          ))}
                        </div>
                        <div className="text-white/50 text-[9px] font-bold truncate">{t.desc}</div>
                      </div>
                      {/* 選択チェック */}
                      {active ? (
                        <div className="w-4 h-4 rounded-full flex items-center justify-center flex-shrink-0"
                          style={{ background: r.color }}>
                          <span className="text-[8px] text-black font-black">✓</span>
                        </div>
                      ) : (
                        <div className="w-4 h-4 rounded-full flex-shrink-0"
                          style={{ border: `1.5px solid rgba(255,255,255,0.25)` }} />
                      )}
                    </button>
                  );
                })}
              </div>
              {/* フッター: 未獲得の数 */}
              {(player.titles || []).length < TITLES.length && (
                <div className="px-3 py-2 text-center text-white/40 text-[10px] font-bold"
                  style={{ borderTop: '1px solid rgba(255,255,255,0.1)' }}>
                  残り {TITLES.length - (player.titles || []).length} 個 未獲得
                </div>
              )}
            </div>
          )}
        </div>

        {/* タイトル画面 */}
        <div className="mb-4">
          <div className="text-yellow-300 text-xs font-black tracking-widest mb-2 px-1">🪨 タイトル画面</div>
          <button
            onClick={() => { setShowOnboarding(true); setView('home'); }}
            className="w-full p-3 rounded-2xl text-white active:scale-95 flex items-center gap-3"
            style={{ background: 'linear-gradient(135deg, #FF8C42, #C71F8E)', boxShadow: '0 4px 0 #5A1A4A', border: '2px solid rgba(255,255,255,0.4)' }}>
            <span className="text-2xl">🪨</span>
            <div className="flex-1 text-left">
              <div className="font-black text-sm">タイトル画面を見る</div>
              <div className="text-[10px] font-bold opacity-90">ゲームの説明スライドを再表示</div>
            </div>
            <ChevronRight className="w-5 h-5" />
          </button>
        </div>

        {/* アプリ更新 */}
        <div className="mb-4">
          <div className="text-yellow-300 text-xs font-black tracking-widest mb-2 px-1">🔄 アプリ更新</div>
          <button
            onClick={async () => {
              // リロード前にデータを確実に保存してから実行
              try {
                await savePlayer(player);
                await saveCollection(collection);
              } catch (e) { /* 保存失敗しても続行 */ }
              const url = new URL(window.location.href);
              url.searchParams.set('v', String(Date.now()));
              window.location.replace(url.toString());
            }}
            className="w-full p-3 rounded-2xl text-white active:scale-95 flex items-center gap-3"
            style={{ background: 'linear-gradient(135deg, #FFB347, #FF6B35)', boxShadow: '0 4px 0 #B85C00', border: '2px solid #FFD700' }}>
            <span className="text-2xl">🔄</span>
            <div className="flex-1 text-left">
              <div className="font-black text-sm">最新版に更新</div>
              <div className="text-[10px] font-bold opacity-90">キャッシュを無視して再読み込み</div>
            </div>
            <ChevronRight className="w-5 h-5" />
          </button>
        </div>

        {/* テイスト記録 */}
        {(() => {
          const tasteList = collection.filter(m => m.isTaste && m.imageSeed);
          if (tasteList.length === 0) return (
            <div className="rounded-2xl p-4 mb-4" style={{ background: 'rgba(255,255,255,0.06)', border: '1.5px solid rgba(255,255,255,0.12)' }}>
              <div className="text-white font-black text-sm mb-1">⭐ テイスト記録</div>
              <div className="text-white/50 text-[11px]">気に入った石モンの詳細画面で「テイスト登録」すると、ここにseedとプロンプトが記録されます。</div>
            </div>
          );
          return (
            <div className="rounded-2xl p-4 mb-4" style={{ background: 'rgba(255,200,0,0.08)', border: '1.5px solid rgba(255,200,0,0.3)' }}>
              <div className="text-yellow-300 font-black text-sm mb-3">⭐ テイスト記録 ({tasteList.length}件)</div>
              <div className="space-y-3">
                {tasteList.map(m => (
                  <div key={m.id} className="rounded-xl p-3" style={{ background: 'rgba(0,0,0,0.3)' }}>
                    <div className="flex items-center gap-2 mb-2">
                      {m.imageDataUrl && <img src={m.imageDataUrl} className="w-10 h-10 rounded-lg object-cover flex-shrink-0" />}
                      <div>
                        <div className="text-white font-black text-sm">{m.name}</div>
                        <div className="text-white/60 text-[10px]">{m.type} ★{m.rarity} seed: <span className="text-yellow-300 font-mono">{m.imageSeed}</span></div>
                      </div>
                    </div>
                    <div className="text-white/50 text-[9px] font-mono break-all leading-relaxed bg-black/30 rounded p-2 select-all">
                      {m.imagePrompt}
                    </div>
                  </div>
                ))}
              </div>
              <div className="text-white/40 text-[9px] mt-3 leading-relaxed">
                💡 seedとプロンプトをClaudeに渡すと「このテイストをベースに改良して」という学習に使えます
              </div>
            </div>
          );
        })()}

        {/* バージョン情報 */}
        <div className="text-center text-white/50 text-[10px] font-bold mt-6">
          石モン図鑑 v{APP_VERSION}
        </div>
      </div>
    );
  };

  // ===========================================
  // 下部固定タブバー
  // ===========================================
  const BottomTabBar = () => {
    const tabs = [
      { id: 'home', icon: '🏠', label: 'ホーム', view: 'home', badge: claimableMissions || undefined },
      { id: 'collection', icon: '📖', label: '図鑑', view: 'collection' },
      { id: 'battle', icon: '⚔️', label: 'バトル', view: 'stages' },
      { id: 'gacha', icon: '🎴', label: 'ガチャ', view: 'gacha', badge: player.gachaCards },
      { id: 'profile', icon: '👤', label: 'マイページ', view: 'profile' },
    ];

    const isActive = (tab) => {
      if (tab.id === 'home') return view === 'home';
      if (tab.id === 'collection') return view === 'collection';
      if (tab.id === 'battle') return view === 'stages' || view === 'battle';
      if (tab.id === 'gacha') return view === 'gacha';
      if (tab.id === 'profile') return view === 'profile';
      return false;
    };

    return (
      <div className="fixed bottom-0 left-0 right-0 z-[60]"
        style={{
          background: 'linear-gradient(180deg, rgba(20,5,40,0.85), rgba(20,5,40,0.98))',
          backdropFilter: 'blur(12px)',
          borderTop: '2px solid rgba(255,215,0,0.4)',
          paddingBottom: 'env(safe-area-inset-bottom, 0px)',
        }}>
        <div className="flex items-stretch px-1 pt-2 pb-2">
          {tabs.map(tab => {
            const active = isActive(tab);
            return (
              <button key={tab.id}
                onClick={() => {
                  if (tab.action) tab.action();
                  else setView(tab.view);
                }}
                className="flex-1 flex flex-col items-center justify-center py-1 active:scale-90 transition-transform relative"
                style={{
                  background: active ? 'linear-gradient(180deg, rgba(255,215,0,0.25), rgba(255,107,53,0.25))' : 'transparent',
                  borderRadius: '14px',
                  margin: '0 2px',
                  border: active ? '2px solid rgba(255,215,0,0.5)' : '2px solid transparent',
                }}>
                <div className="text-2xl leading-none mb-0.5" style={{ filter: active ? 'drop-shadow(0 0 8px rgba(255,215,0,0.8))' : 'none' }}>
                  {tab.icon}
                </div>
                <div className={`text-[10px] font-black ${active ? 'text-yellow-300' : 'text-white/70'}`}>
                  {tab.label}
                </div>
                {tab.badge !== undefined && tab.badge > 0 && (
                  <div className="absolute top-0 right-2 bg-red-500 text-white rounded-full text-[9px] font-black px-1.5 py-0.5 leading-none"
                    style={{ border: '1.5px solid white', minWidth: '18px', textAlign: 'center' }}>
                    {tab.badge > 99 ? '99+' : tab.badge}
                  </div>
                )}
              </button>
            );
          })}
        </div>
      </div>
    );
  };

  return (
    <div className="min-h-screen relative overflow-hidden"
      style={{
        background: view === 'battle' ? 'transparent' : 'linear-gradient(180deg, #FF6B35 0%, #C71F8E 50%, #5A1A78 100%)',
        fontFamily: 'M PLUS Rounded 1c, sans-serif',
      }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');
        body { -webkit-tap-highlight-color: transparent; }
      `}</style>
      {view !== 'battle' && !settings.animationReduced && (
        <div className="absolute inset-0 pointer-events-none">
          {[...Array(30)].map((_, i) => (
            <div key={i} className="absolute" style={{
              top: Math.random() * 100 + '%', left: Math.random() * 100 + '%',
              fontSize: (Math.random() * 14 + 10) + 'px',
              opacity: Math.random() * 0.5 + 0.2,
              animation: `float ${Math.random() * 4 + 3}s ease-in-out infinite`,
              animationDelay: Math.random() * 3 + 's',
            }}>{['✨', '⭐', '💫'][Math.floor(Math.random() * 3)]}</div>
          ))}
        </div>
      )}
      <style>{`@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }`}</style>

      {view === 'home' && <HomeView />}
      {view === 'collection' && <CollectionView />}
      {view === 'ranking' && <RankingView />}
      {view === 'stages' && <StageSelectView />}
      {view === 'battle' && <BattleView />}
      {view === 'profile' && <ProfileView />}
      {view === 'settings' && <SettingsView />}
      {view === 'gacha' && <GachaModal />}

      {/* 下部固定タブメニュー（バトル中・カメラ中以外で表示） */}
      {view !== 'battle' && !showCamera && (
        <BottomTabBar />
      )}

      {selected && <MonCard mon={selected} onClose={() => setSelected(null)} />}
      {newMon && !isLoading && !showEvolveAnim && <MonCard mon={newMon} onClose={() => { setNewMon(null); setPreviewImage(null); }} />}
      {isLoading && <LoadingView />}
      {showEvolveAnim && <EvolveAnimView mon={showEvolveAnim} />}

      {/* カメラビュー */}
      {showCamera && (
        <div className="fixed inset-0 z-50 flex flex-col bg-black">
          <video
            ref={videoRef}
            autoPlay
            playsInline
            muted
            className="flex-1 w-full object-cover"
            style={{ background: '#000' }}
          />
          <canvas ref={canvasRef} className="hidden" />
          <div className="absolute bottom-0 left-0 right-0 pb-12 pt-6 flex flex-col items-center gap-4"
            style={{ background: 'linear-gradient(transparent, rgba(0,0,0,0.8))' }}>
            <p className="text-white/80 text-sm font-bold">いしに カメラを むけてね！</p>
            <div className="flex items-center gap-8">
              <button onClick={stopCamera}
                className="bg-white/20 rounded-full p-4 active:bg-white/40 backdrop-blur-sm"
                style={{ border: '2px solid white' }}>
                <X className="w-7 h-7 text-white" strokeWidth={3} />
              </button>
              <button onClick={capturePhoto}
                className="active:scale-90 transition-transform"
                style={{
                  width: 80, height: 80, borderRadius: '50%',
                  background: 'white',
                  border: '5px solid rgba(255,255,255,0.5)',
                  boxShadow: '0 0 0 4px rgba(255,255,255,0.3)',
                }}>
                <Camera className="w-8 h-8 text-gray-800 mx-auto" strokeWidth={2.5} />
              </button>
              <button onClick={() => { stopCamera(); fileRef.current?.click(); }}
                className="bg-white/20 rounded-full p-4 active:bg-white/40 backdrop-blur-sm"
                style={{ border: '2px solid white' }}>
                <BookOpen className="w-7 h-7 text-white" strokeWidth={2.5} />
              </button>
            </div>
            <p className="text-white/50 text-xs">× とじる　　📸 さつえい　　📁 えらぶ</p>
          </div>
        </div>
      )}

      <LoginBonusModal />
      <MissionsModal />
      <ShopModal />
      <InventoryModal />
      <ProfileModal />
      <EquipModal />
      <OnboardingModal />
      <NewTitleAlert />

      {/* AI画像生成中のローディング */}
      {aiGenerating && (
        <div className="fixed inset-0 z-[80] flex flex-col items-center justify-center" style={{ background: 'rgba(0,0,0,0.85)' }}>
          <div className="relative">
            <div className="absolute inset-0 rounded-full"
              style={{ background: 'conic-gradient(from 0deg, #C77DFF, #FFD700, #FF6B35, #C77DFF)', filter: 'blur(30px)', animation: 'spin 2s linear infinite' }} />
            <div className="relative w-32 h-32 rounded-full bg-purple-900 flex items-center justify-center"
              style={{ border: '4px solid #FFD700', boxShadow: '0 0 60px rgba(199,125,255,0.8)' }}>
              <Wand2 className="w-12 h-12 text-yellow-300 animate-pulse" />
            </div>
          </div>
          <div className="mt-6 text-yellow-300 font-black text-xl" style={{ textShadow: '0 0 20px #FFAA00' }}>
            AIが 描いています...
          </div>
          <div className="text-white/70 text-xs font-bold mt-1">5〜90びょう かかることがあります</div>
          <button onClick={() => setAiGenerating(false)}
            className="mt-6 px-6 py-2 rounded-full text-white/80 font-black text-sm active:scale-95"
            style={{ background: 'rgba(255,255,255,0.15)', border: '2px solid rgba(255,255,255,0.3)' }}>
            スキップ（後で再生成できます）
          </button>
          <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </div>
      )}

      {error && (
        <div className="fixed bottom-4 left-4 right-4 rounded-2xl p-3 text-white font-bold text-center z-[70]"
          style={{ background: '#C73E1D', border: '3px solid white', boxShadow: '0 4px 0 #6B1A0E' }}>
          {error}
          <button onClick={() => setError('')} className="ml-2 underline">とじる</button>
        </div>
      )}
    </div>
  );
}


ReactDOM.render(React.createElement(IshimonZukan), document.getElementById("root"));
</script>
</body>
</html>
