  <title>石モン図鑑</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'M PLUS Rounded 1c', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #FF6B35 0%, #C71F8E 50%, #5A1A78 100%);
      color: white;
      line-height: 1.6;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      min-height: 100vh;
      -webkit-overflow-scrolling: touch;
    }

    /* ロードアニメーション背景 */
    .floating-elements {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .floating-element {
      position: absolute;
      font-size: 20px;
      opacity: 0.15;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(5deg); }
    }

    /* コンテナ */
    .container {
      position: relative;
      z-index: 2;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ヘッダー */
    header {
      text-align: center;
      padding: 40px 20px;
    }

    .logo {
      font-size: 64px;
      margin-bottom: 16px;
      display: inline-block;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-size: 2.5em;
      font-weight: 900;
      margin-bottom: 16px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .tagline {
      font-size: 1.2em;
      opacity: 0.95;
      margin-bottom: 12px;
      line-height: 1.8;
    }

    .subtitle {
      font-size: 0.95em;
      opacity: 0.85;
    }

    /* CTA ボタン */
    .cta-section {
      padding: 30px 20px;
      text-align: center;
    }

    .btn-main {
      display: inline-block;
      padding: 18px 40px;
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      color: #5A1A78;
      text-decoration: none;
      border-radius: 50px;
      font-size: 1.1em;
      font-weight: 900;
      cursor: pointer;
      border: none;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
      margin: 16px;
      display: inline-block;
      transform: scale(1);
    }

    .btn-main:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
    }

    .btn-main:active {
      transform: scale(0.95);
    }

    /* セクション */
    .section {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 28px;
      margin: 24px 0;
      border: 2px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
    }

    .section h2 {
      font-size: 1.5em;
      margin-bottom: 16px;
      color: #FFD700;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section h2::before {
      font-size: 1.3em;
    }

    .section-content {
      font-size: 1em;
      opacity: 0.95;
      line-height: 1.8;
    }

    .features {
      display: grid;
      gap: 16px;
      margin-top: 16px;
    }

    .feature {
      background: rgba(255, 255, 255, 0.05);
      padding: 16px;
      border-radius: 12px;
      border-left: 4px solid #FFD700;
    }

    .feature-title {
      font-weight: 700;
      margin-bottom: 6px;
      color: #FFD700;
    }

    .feature-desc {
      font-size: 0.95em;
      opacity: 0.85;
    }

    /* リンク集 */
    .links-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 20px;
    }

    .link-card {
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      text-decoration: none;
      color: white;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .link-card:hover {
      background: rgba(255, 215, 0, 0.15);
      border-color: rgba(255, 215, 0, 0.5);
      transform: translateY(-3px);
    }

    .link-card-icon {
      font-size: 1.8em;
      margin-bottom: 8px;
    }

    .link-card-title {
      font-weight: 700;
      font-size: 0.95em;
    }

    .link-card-desc {
      font-size: 0.75em;
      opacity: 0.7;
      margin-top: 4px;
    }

    /* SNS セクション */
    .sns-section {
      margin-top: 20px;
    }

    .sns-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .sns-link {
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 16px 12px;
      text-align: center;
      text-decoration: none;
      color: white;
      transition: all 0.3s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .sns-link:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 215, 0, 0.5);
    }

    .sns-link-icon {
      font-size: 1.8em;
    }

    .sns-link-text {
      font-size: 0.9em;
      font-weight: 700;
    }

    /* フッター */
    footer {
      text-align: center;
      padding: 40px 20px;
      opacity: 0.7;
      font-size: 0.9em;
    }

    footer a {
      color: #FFD700;
      text-decoration: none;
      margin: 0 8px;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* レスポンシブ */
    @media (max-width: 600px) {
      h1 {
        font-size: 2em;
      }

      .logo {
        font-size: 48px;
      }

      .tagline {
        font-size: 1em;
      }

      .btn-main {
        font-size: 1em;
        padding: 16px 32px;
        margin: 12px;
      }

      .section {
        padding: 20px;
        margin: 16px 0;
      }

      .section h2 {
        font-size: 1.3em;
      }

      .links-grid {
        grid-template-columns: 1fr;
      }

      .sns-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    /* アニメーション削減 */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <!-- 浮遊要素背景 -->
  <div class="floating-elements" id="floatingElements"></div>

  <div class="container">
    <!-- ヘッダー -->
    <header>
      <div class="logo">🪨</div>
      <h1>石モン図鑑</h1>
      <p class="tagline">この石ころが、<br>一生の宝物になる</p>
      <p class="subtitle">完全無料・アカウント不要</p>
    </header>

    <!-- CTA -->
    <div class="cta-section">
      <button class="btn-main" onclick="window.location.href='/game/'">
        🎮 今すぐ遊ぶ（無料）
      </button>
    </div>

    <!-- 説明セクション -->
    <section class="section">
      <h2>🎯 どんなゲーム？</h2>
      <div class="section-content">
        石の写真を撮るだけで、AIが世界に1体だけの石モンを生み出します。
        <div class="features">
          <div class="feature">
            <div class="feature-title">📸 撮って生成</div>
            <div class="feature-desc">石を撮影するだけで、AIがユニークな石モンを作成</div>
          </div>
          <div class="feature">
            <div class="feature-title">📚 集める</div>
            <div class="feature-desc">世界に1体だけの石モンを集めて図鑑を完成させよう</div>
          </div>
          <div class="feature">
            <div class="feature-title">⚔️ バトル</div>
            <div class="feature-desc">集めた石モンを育ててバトルで競い合う</div>
          </div>
          <div class="feature">
            <div class="feature-title">🌍 冒険</div>
            <div class="feature-desc">旅先でも公園でも日常がぜんぶ冒険に</div>
          </div>
        </div>
      </div>
    </section>

    <!-- 主要リンク -->
    <section class="section">
      <h2>🗺️ リンク</h2>
      <div class="links-grid">
        <a class="link-card" href="/game/">
          <div class="link-card-icon">🎮</div>
          <div class="link-card-title">ゲーム</div>
          <div class="link-card-desc">遊ぶ</div>
        </a>
        <a class="link-card" href="/sitemap.html">
          <div class="link-card-icon">🗺️</div>
          <div class="link-card-title">サイトマップ</div>
          <div class="link-card-desc">すべてのページ</div>
        </a>
      </div>
    </section>

    <!-- SNS -->
    <section class="section sns-section">
      <h2>📱 フォローする</h2>
      <div class="sns-grid">
        <a class="sns-link" href="https://twitter.com/ishimonzukan" target="_blank" rel="noopener noreferrer">
          <div class="sns-link-icon">𝕏</div>
          <div class="sns-link-text">X</div>
        </a>
        <a class="sns-link" href="https://instagram.com/ishimonzukan" target="_blank" rel="noopener noreferrer">
          <div class="sns-link-icon">📷</div>
          <div class="sns-link-text">Instagram</div>
        </a>
      </div>
    </section>
  </div>

  <!-- フッター -->
  <footer>
    <p>© 2024 石モン図鑑</p>
    <div>
      <a href="/sitemap.html">サイトマップ</a>
      <a href="/game/">ゲーム</a>
    </div>
  </footer>

  <script>
    // 浮遊要素の生成
    function generateFloatingElements() {
      const container = document.getElementById('floatingElements');
      const elements = ['🪨', '✨', '⭐', '💫'];
      for (let i = 0; i < 20; i++) {
        const element = document.createElement('div');
        element.className = 'floating-element';
        element.textContent = elements[Math.floor(Math.random() * elements.length)];
        element.style.left = Math.random() * 100 + '%';
        element.style.top = Math.random() * 100 + '%';
        element.style.animationDelay = Math.random() * 3 + 's';
        element.style.animationDuration = (Math.random() * 4 + 4) + 's';
        container.appendChild(element);
      }
    }

    // ページ読み込み時に実行
    window.addEventListener('DOMContentLoaded', () => {
      generateFloatingElements();
    });

    // ボタンのクリック時アニメーション
    document.querySelectorAll('.btn-main, .link-card, .sns-link').forEach(btn => {
      btn.addEventListener('click', function(e) {
        if (!e.target.closest('a') || this.tagName === 'BUTTON') {
          this.style.transform = 'scale(0.95)';
          setTimeout(() => {
            this.style.transform = '';
          }, 100);
        }
      });
    });
  </script>
</body>
