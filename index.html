<!-- window.storage の互換実装（localStorage ベース） -->
<script>
window.storage = {
  async get(key) {
    try {
      const v = localStorage.getItem(key);
      if (v === null) return null;
      return { key, value: v, shared: false };
    } catch (e) { return null; }
  },
  async set(key, value, shared) {
    try {
      localStorage.setItem(key, value);
      return { key, value, shared: !!shared };
    } catch (e) { return null; }
  },
  async delete(key) {
    try {
      localStorage.removeItem(key);
      return { key, deleted: true };
    } catch (e) { return null; }
  },
  async list(prefix) {
    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!prefix || k.startsWith(prefix)) keys.push(k);
      }
      return { keys, prefix };
    } catch (e) { return null; }
  }
};
</script>

// AI画像生成URL構築（fetch不要、imgタグに直接渡せる）
const buildImageUrl = (prompt, seed) => {
  const params = new URLSearchParams({
    width: '512',
    height: '512',
    seed: String(seed || Math.floor(Math.random() * 1000000)),
    nologo: 'true',
    safe: 'true',
    model: 'flux',
  });
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?${params.toString()}`;
};

// AI画像をfetchしてbase64で返す（キャッシュ用）
const generateAiImage = async (prompt, seed) => {
  const url = buildImageUrl(prompt, seed);
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`API ${res.status}`);
    const blob = await res.blob();
    return await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  } catch (e) {
    console.error('AI generation failed:', e);
    return null;
  }
};

// 排出確率: ★5=3%, ★4=12%, ★3=25%, ★2=40%, ★1=20%
const gachaRoll = (guaranteeRare = false) => {
  const r = Math.random();
  let rarity;
  if (guaranteeRare || r < 0.03) rarity = 5;
  else if (r < 0.15) rarity = 4;
  else if (r < 0.40) rarity = 3;
  else if (r < 0.80) rarity = 2;
  else rarity = 1;

  // 50%でモン、50%で装備 (★1は70%モン)
  const isEquip = rarity === 1 ? Math.random() < 0.3 : Math.random() < 0.5;

  if (isEquip) {
    const pool = Object.values(EQUIPMENT).filter(e => e.rarity === rarity);
    const eq = pool.length ? pool[Math.floor(Math.random() * pool.length)] : Object.values(EQUIPMENT)[0];
    return { kind: 'equip', rarity, data: eq };
  } else {
    const pool = GACHA_MON_POOL.filter(m => m.rarity === rarity);
    const fallback = GACHA_MON_POOL.filter(m => m.rarity <= rarity);
    const template = (pool.length ? pool : fallback)[Math.floor(Math.random() * (pool.length || fallback.length))];
    const mon = {
      id: `gacha-${Date.now()}-${Math.random().toString(36).slice(2,6)}`,
      ...template,
      stage: 1, level: 1, exp: 0, wins: 0, losses: 0, equipped: {},
      growthBias: { hp: 0.15, kogeki: 0.15, bougyo: 0.15, speed: 0.15 },
      description: `ガチャで てにいれた ${template.name}！`,
      imageDataUrl: null,
      capturedAt: new Date().toISOString(),
    };
    return { kind: 'mon', rarity, data: mon };
  }
};

// 装備込みのステータス計算
const getEquipBoost = (mon) => {
  const boost = { hp: 0, kogeki: 0, bougyo: 0, speed: 0 };
  if (!mon.equipped) return boost;
  for (const slot of EQUIP_SLOTS) {
    const id = mon.equipped[slot];
    if (id && EQUIPMENT[id]) {
      const b = EQUIPMENT[id].boost;
      if (b.hp) boost.hp += b.hp;
      if (b.kogeki) boost.kogeki += b.kogeki;
      if (b.bougyo) boost.bougyo += b.bougyo;
      if (b.speed) boost.speed += b.speed;
    }
  }
  return boost;
};

const getCurrentStats = (mon) => {
  if (!mon.baseStats) return mon.stats || { hp: 50, kogeki: 50, bougyo: 50, speed: 50 };
  const lv = mon.level || 1;
  const growth = (lv - 1) / (MAX_LEVEL - 1);
  const factor = (key) => 1 + growth * (mon.growthBias?.[key] ?? 0.15);
  const eq = getEquipBoost(mon);
  return {
    hp:     Math.round(mon.baseStats.hp * factor('hp')) + eq.hp,
    kogeki: Math.round(mon.baseStats.kogeki * factor('kogeki')) + eq.kogeki,
    bougyo: Math.round(mon.baseStats.bougyo * factor('bougyo')) + eq.bougyo,
    speed:  Math.round(mon.baseStats.speed * factor('speed')) + eq.speed,
  };
};

// ===== 日付ヘルパー (日本時間ベース) =====
const todayKey = () => {
  const d = new Date();
  // 日本時間で考えるためUTC+9
  const jst = new Date(d.getTime() + 9 * 3600 * 1000);
  return jst.toISOString().slice(0, 10);
};

const daysBetween = (k1, k2) => {
  if (!k1 || !k2) return null;
  const d1 = new Date(k1 + 'T00:00:00Z').getTime();
  const d2 = new Date(k2 + 'T00:00:00Z').getTime();
  return Math.round((d2 - d1) / 86400000);
};

const getTodayMissions = (dateKey) => {
  // 日付からシード生成
  let seed = 0;
  for (let i = 0; i < dateKey.length; i++) seed = (seed * 31 + dateKey.charCodeAt(i)) | 0;
  const random = () => {
    seed = (seed * 1103515245 + 12345) & 0x7fffffff;
    return seed / 0x7fffffff;
  };
  const pool = [...MISSION_TEMPLATES];
  const picked = [];
  for (let i = 0; i < 3 && pool.length; i++) {
    const idx = Math.floor(random() * pool.length);
    picked.push(pool[idx]);
    pool.splice(idx, 1);
  }
  return picked;
};

  const checkLoginBonus = (p, currentCollection) => {

    const diff = daysBetween(p.lastLogin, today);
    let newStreak = diff === 1 ? (p.streak || 0) + 1 : 1;

    // 連続日数でカード枚数が変わる
    let cardCount = 1;
    let label = `${newStreak}日め`;
    if (newStreak === 30) { cardCount = 5; label = '30日 達成！🎉'; }
    else if (newStreak === 20) { cardCount = 4; label = '20日 達成！'; }
    else if (newStreak === 10) { cardCount = 3; label = '10日 達成！'; }
    else if (newStreak === 7)  { cardCount = 3; label = '7日 連続！'; }
    else if (newStreak >= 3)   { cardCount = 2; label = `${newStreak}日 連続！`; }

    const updatedPlayer = {
      ...p,
      lastLogin: today, streak: newStreak,
      gachaCards: (p.gachaCards || 0) + cardCount,
      missions: { date: today, list: getTodayMissions(today), progress: {}, claimed: {}, allClaimed: false },
    };
    setPlayer(updatedPlayer);
    savePlayer(updatedPlayer);
    setShowLoginBonus({ streak: newStreak, cardCount, label });

  const ensureTodayMissions = (p) => {
    const today = todayKey();
    if (p.missions?.date !== today) {
      const updated = { ...p, missions: { date: today, list: getTodayMissions(today), progress: {}, claimed: {}, allClaimed: false } };
      setPlayer(updated);
      savePlayer(updated);
    }
  };

  // ===== ミッション進捗更新 =====
  const updateMission = async (eventType, payload = {}) => {
    setPlayer(prev => {
      ensureTodayMissions(prev);
      const missions = prev.missions || { list: [], progress: {}, claimed: {} };
      const newProgress = { ...missions.progress };
      let changed = false;
      for (const m of missions.list) {
        if (missions.claimed?.[m.id]) continue;
        if (m.type === eventType) {
          if (m.subtype && payload.type !== m.subtype) continue;
          newProgress[m.id] = (newProgress[m.id] || 0) + 1;
          changed = true;
        }
      }
      if (!changed) return prev;
      const updated = { ...prev, missions: { ...missions, progress: newProgress } };
      savePlayer(updated);
      return updated;
    });
  };

  // ミッション報酬を受け取る
  const claimMission = async (missionId) => {
    setPlayer(prev => {
      const m = prev.missions.list.find(x => x.id === missionId);
      if (!m) return prev;
      const progress = prev.missions.progress?.[missionId] || 0;
      if (progress < m.target) return prev;
      if (prev.missions.claimed?.[missionId]) return prev;
      const newClaimed = { ...prev.missions.claimed, [missionId]: true };
      const allDone = prev.missions.list.every(mm => newClaimed[mm.id]);
      const bonusGems = (allDone && !prev.missions.allClaimed) ? 20 : 0;
      const updated = {
        ...prev,
        gems: (prev.gems || 0) + m.reward + bonusGems,
        missions: { ...prev.missions, claimed: newClaimed, allClaimed: allDone || prev.missions.allClaimed },

      return updated;
    });

  // ===== ガチャ実行 =====
  // count: 引く枚数 (1 or 10), useGems: trueならきらめき石消費
  const doGacha = async (count, useGems = false) => {
    const cost = count === 10 ? 500 : 50;
    if (useGems) {
      if ((player.gems || 0) < cost) { setError('きらめき石が たりないよ！'); return; }

      if ((player.gachaCards || 0) < count) { setError('ガチャカードが たりないよ！'); return; }

    // 10連は最後の1枚がレア以上保証
    const results = Array.from({ length: count }, (_, i) =>
      gachaRoll(count === 10 && i === count - 1)
    ).map(r => ({ ...r, revealed: false }));

    setPlayer(prev => {

        gachaCards: useGems ? (prev.gachaCards || 0) : Math.max(0, (prev.gachaCards || 0) - count),

      savePlayer(updated);
      return updated;
    });

    // 1枚ずつ順番にめくるアニメ（0.5秒おき）
    for (let i = 0; i < results.length; i++) {

  const stopCamera = () => {
    if (cameraStream) {
      cameraStream.getTracks().forEach(t => t.stop());

    }

    setCameraError('');
  };

  const capturePhoto = () => {
    const video = videoRef.current;
    const canvas = canvasRef.current;
    if (!video || !canvas) return;
    const max = 512;
    let w = video.videoWidth || 640;
    let h = video.videoHeight || 480;
    if (w > h && w > max) { h = Math.round(h * max / w); w = max; }
    else if (h > max) { w = Math.round(w * max / h); h = max; }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(video, 0, 0, w, h);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
    stopCamera();
    setPreviewImage(dataUrl);

    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const max = 512;
        let { width, height } = img;
        if (width > height && width > max) { height *= max / width; width = max; }
        else if (height > max) { width *= max / height; height = max; }
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        const compressed = canvas.toDataURL('image/jpeg', 0.7);
        setPreviewImage(compressed);
        generateMon(compressed);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

形が独特・大きい・色珍しい→レア度4-5。普通の小石→1-2。ステータス合計はレア度に比例(★1=200、★5=420+)。growthBiasは個性を出すこと。`
              }

  const battleResolve = (myAction) => {

    const enemyAction = ['kogeki', 'bougyo', 'tokugi'][Math.floor(Math.random() * 3)];
    const myStats = getCurrentStats(myMon);
    const enemyStats = getCurrentStats(enemyMon);
    const typeBonus = getTypeMultiplier(myMon.type, enemyMon.type);
    const enemyTypeBonus = getTypeMultiplier(enemyMon.type, myMon.type);

    let log = [], myDmg = 0, enemyDmg = 0;
    log.push(`${turn}ターンめ！`);
    const beats = (a, b) => (

    log.push(`${myMon.name}は ${actionLabel[myAction]}！`);

      myDmg = Math.max(3, Math.round((enemyStats.kogeki - myStats.bougyo / 2) * 0.4 * enemyTypeBonus));
    } else if (beats(myAction, enemyAction)) {
      log.push(`${myMon.name}の こうげきが きまった！`);
      let baseDmg = myStats.kogeki - enemyStats.bougyo / 2;
      if (myAction === 'tokugi') baseDmg *= 1.4;
      enemyDmg = Math.max(5, Math.round(baseDmg * typeBonus));
      if (typeBonus > 1) { log.push('こうかは ばつぐん！'); mySuperEffective = true; }
      if (typeBonus < 1) log.push('こうかは いまひとつ...');
    } else {
      log.push(`${enemyMon.name}の こうげき！`);
      let baseDmg = enemyStats.kogeki - myStats.bougyo / 2;
      if (enemyAction === 'tokugi') baseDmg *= 1.4;
      myDmg = Math.max(5, Math.round(baseDmg * enemyTypeBonus));
      if (enemyTypeBonus > 1) log.push(`${myMon.name}は おおだめーじ！`);
      if (enemyTypeBonus < 1) log.push(`${myMon.name}は すこしだけ ダメージ`);
    }

    else if (myDmg > 0) setAnimatingHit('me');
    setBattleLog(prev => [...prev.slice(-3), ...log]);

    setTimeout(() => {
      const newEnemyHp = Math.max(0, enemyHp - enemyDmg);
      const newMyHp = Math.max(0, myHp - myDmg);
      setEnemyHp(newEnemyHp); setMyHp(newMyHp); setAnimatingHit(null);

                  <span className="text-2xl">🎴</span>
                  <span>ガチャや装備でコレクションを充実！</span>

                <div className="flex items-start gap-2">

                style={{ border: '3px solid #FFD700', outline: 'none' }}
                onKeyDown={e => e.key === 'Enter' && finishOnboarding()}

              <div className="grid grid-cols-2 gap-2">

      if (tab.id === 'home') return view === 'home';
      if (tab.id === 'collection') return view === 'collection';
      if (tab.id === 'battle') return view === 'stages' || view === 'battle';
      if (tab.id === 'gacha') return view === 'gacha';
      if (tab.id === 'profile') return view === 'profile';
      return false;
    };

    return (
      <div className="fixed bottom-0 left-0 right-0 z-[60]"
        style={{
          background: 'linear-gradient(180deg, rgba(20,5,40,0.85), rgba(20,5,40,0.98))',
          backdropFilter: 'blur(12px)',
          borderTop: '2px solid rgba(255,215,0,0.4)',
          paddingBottom: 'env(safe-area-inset-bottom, 0px)',
        }}>
        <div className="flex items-stretch px-1 pt-2 pb-2">
          {tabs.map(tab => {
            const active = isActive(tab);
            return (
              <button key={tab.id}
                onClick={() => {
                  if (tab.action) tab.action();
                  else setView(tab.view);
                }}
                className="flex-1 flex flex-col items-center justify-center py-1 active:scale-90 transition-transform relative"
                style={{
                  background: active ? 'linear-gradient(180deg, rgba(255,215,0,0.25), rgba(255,107,53,0.25))' : 'transparent',
                  borderRadius: '14px',
                  margin: '0 2px',
                  border: active ? '2px solid rgba(255,215,0,0.5)' : '2px solid transparent',
                }}>
                <div className="text-2xl leading-none mb-0.5" style={{ filter: active ? 'drop-shadow(0 0 8px rgba(255,215,0,0.8))' : 'none' }}>
                  {tab.icon}
                </div>
                <div className={`text-[10px] font-black ${active ? 'text-yellow-300' : 'text-white/70'}`}>
                  {tab.label}
                </div>
                {tab.badge !== undefined && tab.badge > 0 && (
                  <div className="absolute top-0 right-2 bg-red-500 text-white rounded-full text-[9px] font-black px-1.5 py-0.5 leading-none"
                    style={{ border: '1.5px solid white', minWidth: '18px', textAlign: 'center' }}>
                    {tab.badge > 99 ? '99+' : tab.badge}
                  </div>
                )}
              </button>
            );
          })}
        </div>
      </div>
    );
  };

  return (
    <div className="min-h-screen relative overflow-hidden"
      style={{
        background: view === 'battle' ? 'transparent' : 'linear-gradient(180deg, #FF6B35 0%, #C71F8E 50%, #5A1A78 100%)',
        fontFamily: 'M PLUS Rounded 1c, sans-serif',
      }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');
        body { -webkit-tap-highlight-color: transparent; }
      `}</style>
      {view !== 'battle' && (
        <div className="absolute inset-0 pointer-events-none">
          {[...Array(30)].map((_, i) => (
            <div key={i} className="absolute" style={{
              top: Math.random() * 100 + '%', left: Math.random() * 100 + '%',
              fontSize: (Math.random() * 14 + 10) + 'px',
              opacity: Math.random() * 0.5 + 0.2,
              animation: `float ${Math.random() * 4 + 3}s ease-in-out infinite`,
              animationDelay: Math.random() * 3 + 's',
            }}>{['✨', '⭐', '💫'][Math.floor(Math.random() * 3)]}</div>
          ))}
        </div>
      )}
      <style>{`@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }`}</style>

      {view === 'home' && <HomeView />}
      {view === 'collection' && <CollectionView />}
      {view === 'ranking' && <RankingView />}
      {view === 'stages' && <StageSelectView />}
      {view === 'battle' && <BattleView />}
      {view === 'profile' && <ProfileView />}
      {view === 'gacha' && <GachaModal />}

      {/* 下部固定タブメニュー（バトル中・カメラ中以外で表示） */}
      {view !== 'battle' && !showCamera && (
        <BottomTabBar />
      )}

      {selected && <MonCard mon={selected} onClose={() => setSelected(null)} />}
      {newMon && !isLoading && !showEvolveAnim && <MonCard mon={newMon} onClose={() => { setNewMon(null); setPreviewImage(null); }} />}
      {isLoading && <LoadingView />}
      {showEvolveAnim && <EvolveAnimView mon={showEvolveAnim} />}

      {/* カメラビュー */}
      {showCamera && (
        <div className="fixed inset-0 z-50 flex flex-col bg-black">
          <video
            ref={videoRef}
            autoPlay
            playsInline
            muted
            className="flex-1 w-full object-cover"
            style={{ background: '#000' }}
          />
          <canvas ref={canvasRef} className="hidden" />
          <div className="absolute bottom-0 left-0 right-0 pb-12 pt-6 flex flex-col items-center gap-4"
            style={{ background: 'linear-gradient(transparent, rgba(0,0,0,0.8))' }}>
            <p className="text-white/80 text-sm font-bold">いしに カメラを むけてね！</p>
            <div className="flex items-center gap-8">
              <button onClick={stopCamera}
                className="bg-white/20 rounded-full p-4 active:bg-white/40 backdrop-blur-sm"
                style={{ border: '2px solid white' }}>
                <X className="w-7 h-7 text-white" strokeWidth={3} />
              </button>
              <button onClick={capturePhoto}
                className="active:scale-90 transition-transform"
                style={{
                  width: 80, height: 80, borderRadius: '50%',
                  background: 'white',
                  border: '5px solid rgba(255,255,255,0.5)',
                  boxShadow: '0 0 0 4px rgba(255,255,255,0.3)',
                }}>
                <Camera className="w-8 h-8 text-gray-800 mx-auto" strokeWidth={2.5} />
              </button>
              <button onClick={() => { stopCamera(); fileRef.current?.click(); }}
                className="bg-white/20 rounded-full p-4 active:bg-white/40 backdrop-blur-sm"
                style={{ border: '2px solid white' }}>
                <BookOpen className="w-7 h-7 text-white" strokeWidth={2.5} />
              </button>
            </div>
            <p className="text-white/50 text-xs">× とじる　　📸 さつえい　　📁 えらぶ</p>
          </div>
        </div>
      )}

      <LoginBonusModal />
      <MissionsModal />
      <ShopModal />
      <ProfileModal />
      <EquipModal />
      <OnboardingModal />

      {/* AI画像生成中のローディング */}
      {aiGenerating && (
        <div className="fixed inset-0 z-[80] flex flex-col items-center justify-center" style={{ background: 'rgba(0,0,0,0.85)' }}>
          <div className="relative">
            <div className="absolute inset-0 rounded-full"
              style={{ background: 'conic-gradient(from 0deg, #C77DFF, #FFD700, #FF6B35, #C77DFF)', filter: 'blur(30px)', animation: 'spin 2s linear infinite' }} />
            <div className="relative w-32 h-32 rounded-full bg-purple-900 flex items-center justify-center"
              style={{ border: '4px solid #FFD700', boxShadow: '0 0 60px rgba(199,125,255,0.8)' }}>
              <Wand2 className="w-12 h-12 text-yellow-300 animate-pulse" />
            </div>
          </div>
          <div className="mt-6 text-yellow-300 font-black text-xl" style={{ textShadow: '0 0 20px #FFAA00' }}>
            AIが えがいてる...
          </div>
          <div className="text-white/70 text-xs font-bold mt-1">5〜15びょう くらい かかるよ</div>
          <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </div>
      )}

      {error && (
        <div className="fixed bottom-4 left-4 right-4 rounded-2xl p-3 text-white font-bold text-center z-[70]"
          style={{ background: '#C73E1D', border: '3px solid white', boxShadow: '0 4px 0 #6B1A0E' }}>
          {error}
          <button onClick={() => setError('')} className="ml-2 underline">とじる</button>
        </div>
      )}
    </div>
  );
}


ReactDOM.render(React.createElement(IshimonZukan), document.getElementById("root"));
</script>
</body>
</html>
